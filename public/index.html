async function markDriverLeft(id){
  const exitReason = prompt("Reason this driver is leaving the company:");
  if(exitReason===null) return;
  if(!exitReason.trim()){ alert("An exit reason is required."); return; }
  const rehireEligible = confirm("Is this driver eligible for rehire in the future?\n\nOK = Yes, eligible.\nCancel = No, not eligible - they won't be allowed to rejoin without an Owner override.");
  if(!confirm(`Confirm: mark this driver as LEFT today.\nExit reason: "${exitReason}"\nRehire eligible: ${rehireEligible?'Yes':'No'}\n\nAny applicable uniform-cost deduction will be calculated automatically and added to their payroll.`)) return;
  try{
    const result = await api(`/drivers/${id}/mark-left`, {method:"POST", body: JSON.stringify({exitReason, rehireEligible})});
    const idx = meta.drivers.findIndex(x=>x.id===id);
    meta.drivers[idx] = result.driver;
    await renderMain();
    if(result.uniformDeduction) alert(`A uniform deduction of ₹${result.uniformDeduction.amount} was added to this driver's payroll (${result.uniformDeduction.label}).`);
  }catch(e){ alert(e.message); }
}
async function reactivateDriver(id, force){
  try{
    const res = await fetch(API+`/drivers/${id}/reactivate`, {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+authToken},
      body: JSON.stringify(force?{force:true}:{})
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
      if(data.blockedByConduct && currentUser.role==="owner" && !force){
        if(confirm(data.error + "\n\nAs Owner, you can override this and reactivate anyway. Proceed?")) return reactivateDriver(id, true);
        return;
      }
      throw new Error(data.error || "Request failed");
    }
    const idx = meta.drivers.findIndex(x=>x.id===id);
    meta.drivers[idx] = data;
    await renderMain();
  }catch(e){ alert(e.message); }
}

// ================= ATTENDANCE BACKUP (HR, Owner) =================
// Separate from the general full-data Backup tab (Owner/Ops Manager) - HR
// needs their own roughly-every-15-days archive of attendance data
// specifically, kept outside the app. Every download is logged (who, when)
// so it's visible whether this is happening on schedule, plus the next
// due date computed straight from that log.
const ATTENDANCE_BACKUP_TARGET_DAYS = 15;
const ATTENDANCE_BACKUP_REMINDER_AFTER_DAYS = 12;
async function fetchAttendanceBackupHistory(){
  try{ return await api("/attendance-backup/history"); }catch(e){ return null; }
}
function nextScheduledDate(lastTakenIso){
  if(!lastTakenIso) return null;
  const d = new Date(lastTakenIso);
  d.setDate(d.getDate() + ATTENDANCE_BACKUP_TARGET_DAYS);
  return d.toISOString().slice(0,10);
}
async function attendanceBackupCardHtml(){
  const history = await fetchAttendanceBackupHistory();
  if(history===null) return "";
  const last = history[0];
  const days = last ? daysSinceIso(last.takenAt) : null;
  const nextDue = last ? nextScheduledDate(last.takenAt) : null;
  let statusHtml;
  if(days===null){
    statusHtml = `<div class="banner error">No attendance backup has ever been downloaded - please take one now.</div>`;
  } else if(days >= ATTENDANCE_BACKUP_TARGET_DAYS){
    statusHtml = `<div class="banner error">It's been ${days} days since the last attendance backup (target: every ${ATTENDANCE_BACKUP_TARGET_DAYS} days) - please download one now. It was due on ${nextDue}.</div>`;
  } else if(days >= ATTENDANCE_BACKUP_REMINDER_AFTER_DAYS){
    statusHtml = `<div class="banner">It's been ${days} days since the last attendance backup - one is due soon, by ${nextDue}.</div>`;
  } else {
    statusHtml = `<div class="banner">Last attendance backup was ${days} day${days===1?'':'s'} ago, by ${last.userName}. Next one due by ${nextDue}.</div>`;
  }
  const rows = history.map(b=>`
    <tr>
      <td>${new Date(b.takenAt).toLocaleString()}</td>
      <td>${b.userName}</td>
      <td>${roleLabel(b.role)}</td>
      <td>${nextScheduledDate(b.takenAt)}</td>
    </tr>`).join("");
  return `
  <div class="card">
    <h2 class="section-title">Attendance Backup</h2>
    <p class="muted">Download a complete archive of every supervisor clock-in/out and driver attendance record roughly every ${ATTENDANCE_BACKUP_TARGET_DAYS} days and keep it somewhere outside the app.</p>
    ${statusHtml}
    <button class="btn" onclick="downloadAttendanceBackup()">Download Attendance Backup</button>
    <table style="margin-top:12px;"><tr><th>Taken</th><th>By</th><th>Role</th><th>Next Scheduled</th></tr>
    ${rows || "<tr><td colspan='4' class='empty'>No attendance backups downloaded yet.</td></tr>"}
    </table>
  </div>`;
}
async function downloadAttendanceBackup(){
  try{
    const headers = {};
    if(authToken) headers["Authorization"] = "Bearer " + authToken;
    const res = await fetch(`${API}/attendance-backup/full`, {headers});
    if(!res.ok){
      const data = await res.json().catch(()=>({}));
      throw new Error(data.error || `Download failed (${res.status})`);
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `padmasri_attendance_backup_${todayStr()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    await renderMain();
  }catch(e){ alert(e.message); }
}
// Shown at the top of HR's Attendance tab (their home tab) and the Owner
// Dashboard - the two "home" views for the roles who can take this backup.
async function attendanceBackupReminderBannerHtml(){
  const history = await fetchAttendanceBackupHistory();
  if(history===null) return "";
  const last = history[0];
  const days = last ? daysSinceIso(last.takenAt) : null;
  if(days!==null && days < ATTENDANCE_BACKUP_REMINDER_AFTER_DAYS) return "";
  const nextDue = last ? nextScheduledDate(last.takenAt) : null;
  const msg = days===null
    ? "No attendance backup has ever been downloaded."
    : `It's been ${days} days since the last attendance backup (target: every ${ATTENDANCE_BACKUP_TARGET_DAYS} days, next due ${nextDue}).`;
  return `<div class="banner ${days!==null && days>=ATTENDANCE_BACKUP_TARGET_DAYS ? 'error' : ''}" style="margin-bottom:14px;">
    ⏰ ${msg} <button class="btn small secondary" onclick="switchTab('attendance')" style="margin-left:8px;">Go to Attendance</button>
  </div>`;
}

// A driver's uniform pair is fully depreciated once 12 months have passed
// since it was issued - at that point HR/Owner need to know so a new pair
// can be requested from the vendor. Computed client-side from the same
// meta.drivers data the Drivers card already has (no dedicated backend
// endpoint - mirrors the expiring_docs dashboard pattern).
function driversNeedingUniformRenewal(){
  return (meta.drivers||[]).filter(d=>{
    if(d.active===false) return false;
    const uniforms = Array.isArray(d.uniformHistory) ? d.uniformHistory : [];
    if(!uniforms.length) return false;
    const current = uniforms[uniforms.length-1];
    const months = monthsBetweenDatesClient(current.issuedDate, todayStr());
    return months!=null && months>=12;
  });
}
function uniformRenewalReminderBannerHtml(){
  const due = driversNeedingUniformRenewal();
  if(!due.length) return "";
  const names = due.slice(0,3).map(d=>d.name).join(", ") + (due.length>3 ? ` +${due.length-3} more` : "");
  return `<div class="banner error" style="margin-bottom:14px;">
    👕 ${due.length} driver${due.length===1?'':'s'} due for a new uniform pair (12+ months since last issue): <b>${names}</b> - notify the uniform vendor to raise a request.
    <button class="btn small secondary" onclick="switchTab('people')" style="margin-left:8px;">Go to People</button>
  </div>`;
}

  opts = opts || {};

    params.set("from", opts.from || opts.to);
    params.set("to", opts.to || opts.from);

  let rows = [];

  } else {

      <td>${e.billUrl? `<a href="${e.billUrl}" target="_blank">View</a>` : '-'}</td>
    </tr>`).join("");
    inner = `<table><tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th><th>Status</th><th>Bill</th></tr>
      ${rows || `<tr><td colspan="6" class="empty">No ${labels[key].toLowerCase()} expenses logged for this vehicle yet.</td></tr>`}</table>`;
  }
  return `<div class="card"><h2 class="section-title">${title}</h2>${inner}</div>`;
}

async function downloadReport(dataset, format){
  const fromEl = document.getElementById(`rep_from_${dataset}`);
  const toEl = document.getElementById(`rep_to_${dataset}`);
  const params = new URLSearchParams({format});
  if(fromEl && fromEl.value) params.set("from", fromEl.value);
  if(toEl && toEl.value) params.set("to", toEl.value);
  try{
    const headers = {};
    if(authToken) headers["Authorization"] = "Bearer " + authToken;
    const res = await fetch(`${API}/reports/${dataset}?${params.toString()}`, {headers});
    if(!res.ok){
      const data = await res.json().catch(()=>({}));
      throw new Error(data.error || `Download failed (${res.status})`);
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${dataset}_${todayStr()}.${format==='xlsx'?'xlsx':'csv'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }catch(e){ alert(e.message); }
}

// Turns a vehicle (+ today's record, if any) into the row shape every
// dashboard drill-down table shares - vehicle, site, client, supervisor,
// driver - so clicking any KPI lands on a consistent, actionable list.
function dashboardRowFor(v, r){
  return {
    vehicleId: v.id, reg: v.reg,
    site: siteName(v.siteId),
    client: v.clientId ? clientName(v.clientId) : "Internal / Fixed Route",
    supervisor: userName(v.supervisorId),
    driver: (r && r.attendance && r.attendance.driver) || driverName(v.driverId),
    record: r || null,
  };
}
function dashboardMetricRows(metric){
  if(metric==="compliant") return vehicles.filter(v=>records[v.id]&&records[v.id].verification.status==='approved').map(v=>dashboardRowFor(v, records[v.id]));
  if(metric==="pending") return vehicles.filter(v=>records[v.id]&&records[v.id].verification.status==='pending').map(v=>dashboardRowFor(v, records[v.id]));
  if(metric==="not_submitted") return vehicles.filter(v=>!records[v.id]).map(v=>dashboardRowFor(v, null));
  if(metric==="breath_fail") return vehicles.filter(v=>records[v.id]&&records[v.id].breathalyzer&&records[v.id].breathalyzer.result==='fail').map(v=>dashboardRowFor(v, records[v.id]));
  if(metric==="absent") return vehicles.filter(v=>records[v.id]&&records[v.id].attendance&&records[v.id].attendance.status==='absent').map(v=>dashboardRowFor(v, records[v.id]));
  if(metric==="uniform") return vehicles.filter(v=>records[v.id]&&records[v.id].attendance&&records[v.id].attendance.uniform==='non_compliant').map(v=>dashboardRowFor(v, records[v.id]));
  if(metric==="below_mileage") return vehicles.filter(v=>records[v.id]&&records[v.id].fuel&&records[v.id].fuel.belowStandard).map(v=>dashboardRowFor(v, records[v.id]));
  if(metric==="expiring_docs"){
    const rows = [];
    vehicles.forEach(v=>{
      Object.entries(v.docs||{}).forEach(([k,doc])=>{
        if(!doc.expiry) return;
        const dleft = daysUntil(doc.expiry);
        if(dleft<15) rows.push(Object.assign(dashboardRowFor(v, records[v.id]), {docType:k, daysLeft:dleft, expiry:doc.expiry}));
      });
    });
    return rows;
  }
  if(metric==="leaves_pending") return leaves.filter(l=>l.status==='pending');
  return [];
}

async function ownerDashboardScreen(){
  const recs = vehicles.map(v=>records[v.id]).filter(Boolean);
  const total = vehicles.length;
  const submitted = recs.length;
  const compliantList = dashboardMetricRows("compliant");
  const pendingList = dashboardMetricRows("pending");
  const notSubmittedList = dashboardMetricRows("not_submitted");
  const breathFailList = dashboardMetricRows("breath_fail");
  const absentList = dashboardMetricRows("absent");
  const uniformList = dashboardMetricRows("uniform");
  const expiringDocs = dashboardMetricRows("expiring_docs");
  const leavesPendingList = dashboardMetricRows("leaves_pending");
  const approved = compliantList.length;
  const pending = pendingList.length;
  const rejected = recs.filter(r=>r.verification.status==='rejected').length;
  const compliantPct = submitted? Math.round((approved/submitted)*100) : 0;
  const byClient = {};
  vehicles.forEach(v=>{ const c = v.clientId? clientName(v.clientId) : "Internal / Fixed Route"; byClient[c] = (byClient[c]||0)+1; });

  // Idle = hasn't moved today: either no record submitted at all yet, or a
  // record was submitted but zero distance was logged.
  const idleVehicles = vehicles.map(v=>{
    const r = records[v.id];
    if(!r) return {vehicle:v, reason:"Not submitted today"};
    if(r.fuel && r.fuel.distance===0) return {vehicle:v, reason:"Zero distance logged today"};
    return null;
  }).filter(Boolean);

  const tempDriverExpenses = expenses.filter(e=>e.category==="Temporary Driver");

  setTimeout(()=>drawCharts(approved,pending,rejected, breathFailList.length, submitted-breathFailList.length), 0);
  // Kick the AI Insights fetch off in the background so it never blocks the
  // rest of the dashboard from rendering - the card shows its own loading
  // state and fills in whenever the response lands. Only auto-fires once
  // per session (or after a manual Refresh resets it via loadAiInsights).
  if(aiInsights===null && !aiInsightsLoading && !aiInsightsError) setTimeout(()=>loadAiInsights(false), 0);

  const kpi = (cls, num, label, metric) => `<div class="cmd-kpi ${cls}" style="cursor:pointer" onclick="goto('dashboard_detail',{metric:'${metric}'})" title="Click for the full list">
    <div class="num">${num}</div><div class="label">${label} &rsaquo;</div></div>`;

  // A rough, transparent heuristic (not a precise metric) - starts at 100
  // and loses points for today's compliance gaps, so the Owner gets one
  // number that moves the way the detail below would suggest it should.
  const healthPenalty = Math.min(30, total? Math.round(((total-submitted)/total)*30) : 0)
    + Math.min(20, pending*2)
    + Math.min(15, breathFailList.length*5)
    + Math.min(10, absentList.length*2)
    + Math.min(10, expiringDocs.length)
    + Math.min(15, idleVehicles.length*2);
  const healthScore = Math.max(0, 100 - healthPenalty);
  const healthTier = healthScore>=85 ? 'good' : healthScore>=60 ? 'warn' : 'bad';
  const healthColor = healthTier==='good' ? '#8fd18f' : healthTier==='warn' ? '#f0c869' : '#f0908a';

  return `
  <div class="cmd-hero">
    <div class="cmd-hero-top">
      <div>
        <h1>Fleet Operating System</h1>
        <p class="cmd-sub">Padmasri Travels &middot; ${vehicles.length} vehicles across ${meta.sites.length} site${meta.sites.length===1?'':'s'} &middot; live as of ${new Date().toLocaleTimeString()}</p>
      </div>
      <div class="cmd-score">
        <div class="cmd-score-num" style="color:${healthColor}">${healthScore}</div>
        <div class="cmd-score-label">Fleet Health</div>
      </div>
    </div>
    <div class="cmd-kpi-row">
      ${kpi('good', compliantPct+'%', 'Fully compliant today', 'compliant')}
      ${kpi('warn', pending, 'Pending verification', 'pending')}
      ${kpi(total-submitted>0?'bad':'good', total-submitted, 'Not submitted yet today', 'not_submitted')}
      ${kpi('bad', expiringDocs.length, 'Documents expiring &lt;15 days', 'expiring_docs')}
    </div>
  </div>

  ${await backupReminderBannerHtml()}
  ${await attendanceBackupReminderBannerHtml()}
  ${uniformRenewalReminderBannerHtml()}

  ${aiInsightsSectionHtml()}

  <div class="grid cols-4">
    ${kpi('bad', breathFailList.length, 'Breathalyzer failures today', 'breath_fail')}
    ${kpi(absentList.length?'bad':'good', absentList.length, 'Drivers absent today', 'absent')}
    ${kpi(uniformList.length?'warn':'good', uniformList.length, 'Uniform non-compliance', 'uniform')}
    ${kpi('', leavesPendingList.length, 'Leave requests pending', 'leaves_pending')}
  </div>

  ${await priorityDashboardHtml(idleVehicles, expiringDocs, tempDriverExpenses)}

  <div class="charts-grid" style="margin-top:18px;">
    <div class="card"><h2 class="section-title">Verification funnel</h2><canvas id="chartFunnel" height="180"></canvas></div>
    <div class="card"><h2 class="section-title">Breathalyzer pass/fail</h2><canvas id="chartBreath" height="180"></canvas></div>
  </div>

  <div class="card">
    <h2 class="section-title">Vehicles by client</h2>
    <table><tr><th>Client</th><th>Vehicles</th></tr>${Object.entries(byClient).map(([c,n])=>`<tr><td>${c}</td><td>${n}</td></tr>`).join("")}</table>
  </div>

  <div class="card"><h2 class="section-title">Recent activity (last 1 hour)</h2><p class="muted">The full audit trail lives on the Audit Log tab, filterable by date - this is just a quick pulse of what's happening right now.</p>${await auditTableHtml({sinceMinutes: 60, limit: 100})}</div>
  `;
}

async function sendAiChatMessage(){
  const box = document.getElementById("aiChatInputBox");

  if(!text || aiChatBusy) return;
  aiChatHistory.push({role:"user", content:text});
  aiChatBusy = true; aiChatError = "";
  await renderMain();
  scrollAiChatToBottom();
  try{
    const res = await api("/smart-assistant/query", {method:"POST", body: JSON.stringify({message:text})});
    aiChatHistory.push({role:"assistant", content: res.reply, tool: res.tool || ""});
  }catch(e){

  }
  aiChatBusy = false;
  await renderMain();

async function restoreBackup(id, label){
  if(!confirm(`Restore all app data to the backup from ${label}?\n\nThis REPLACES everything currently in the app (all vehicles, records, people, expenses, etc.) with that snapshot. This cannot be undone except by restoring a different backup. Are you sure?`)) return;
  // A restore wipes and replaces ALL current data - re-confirming the
  // password here is a deliberate second gate, separate from just being
  // logged in as Owner, so a wrong click can't wipe the fleet's data by
  // accident.
  const password = prompt("This will replace ALL current data. Re-enter your password to confirm the restore:");
  if(password===null) return;
  try{
    const result = await api("/verify-password", {method:"POST", body: JSON.stringify({password})});
    if(!result.ok){ alert(result.error || "Incorrect password - restore cancelled."); return; }
  }catch(e){ alert(e.message || "Could not verify password - restore cancelled."); return; }
  try{
    await api(`/admin/backups/${id}/restore`, {method:"POST"});
    alert("Restored. Reloading the app now.");
    await boot();
  }catch(e){ alert(e.message); }
}

// ================= FULL DATA BACKUP DOWNLOAD (Owner, Operations Manager) =================
// Separate from the automatic Mongo snapshots above - this is a complete,
// downloadable export the Owner/Ops Manager take themselves roughly every
// 15 days and keep outside the app as an independent copy. Every download
// is logged so it's visible who took one and when.
const BACKUP_TARGET_DAYS = 15;
const BACKUP_REMINDER_AFTER_DAYS = 12;
function daysSinceIso(iso){
  if(!iso) return null;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}
async function fetchBackupHistory(){
  try{ return await api("/backup/history"); }catch(e){ return null; }
}
async function backupDownloadsScreen(){
  const history = await fetchBackupHistory();
  const rows = (history||[]).map(b=>`
    <tr>
      <td>${new Date(b.takenAt).toLocaleString()}</td>
      <td>${b.userName}</td>
      <td>${roleLabel(b.role)}</td>
    </tr>`).join("");
  const last = history && history[0];
  const days = last ? daysSinceIso(last.takenAt) : null;
  let statusHtml;
  if(days===null){
    statusHtml = `<div class="banner error">No full backup has ever been downloaded - please take one now.</div>`;
  } else if(days >= BACKUP_TARGET_DAYS){
    statusHtml = `<div class="banner error">It's been ${days} days since the last full backup (target: every ${BACKUP_TARGET_DAYS} days) - please download one now.</div>`;
  } else if(days >= BACKUP_REMINDER_AFTER_DAYS){
    statusHtml = `<div class="banner">It's been ${days} days since the last full backup - one is due soon (target: every ${BACKUP_TARGET_DAYS} days).</div>`;
  } else {
    statusHtml = `<div class="banner">Last full backup was ${days} day${days===1?'':'s'} ago - you're on schedule.</div>`;
  }
  return `
  <h1 class="page-title">Backup</h1>
  <div class="banner">Download a complete copy of all fleet data (vehicles, people, records, expenses, documents, everything) roughly every ${BACKUP_TARGET_DAYS} days and keep it somewhere outside the app - separate from the app's own automatic 30-day rolling snapshots.</div>
  <div class="card">
    ${statusHtml}
    <button class="btn" onclick="downloadFullBackup()">Download Full Backup</button>
  </div>
  <div class="card">
    <h2 class="section-title">Backup download history</h2>
    <table><tr><th>Taken</th><th>By</th><th>Role</th></tr>
    ${rows || "<tr><td colspan='3' class='empty'>No backups downloaded yet.</td></tr>"}
    </table>
  </div>
  ${currentUser.role==="owner" ? await backupsCardHtml() : ""}`;
}
async function downloadFullBackup(){
  try{
    const headers = {};
    if(authToken) headers["Authorization"] = "Bearer " + authToken;
    const res = await fetch(`${API}/backup/full`, {headers});
    if(!res.ok){
      const data = await res.json().catch(()=>({}));
      throw new Error(data.error || `Download failed (${res.status})`);
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `padmasri_backup_${todayStr()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    await renderMain();
  }catch(e){ alert(e.message); }
}
// Shared reminder banner shown at the top of both the Owner Dashboard and
// the Operations Manager's Operations screen - their two "home" views.
async function backupReminderBannerHtml(){
  const history = await fetchBackupHistory();
  if(history===null) return ""; // not visible to this role, or request failed - stay silent
  const last = history[0];
  const days = last ? daysSinceIso(last.takenAt) : null;
  if(days!==null && days < BACKUP_REMINDER_AFTER_DAYS) return "";
  const msg = days===null
    ? "No full data backup has ever been downloaded."
    : `It's been ${days} days since the last full data backup (target: every ${BACKUP_TARGET_DAYS} days).`;
  return `<div class="banner ${days!==null && days>=BACKUP_TARGET_DAYS ? 'error' : ''}" style="margin-bottom:14px;">
    ⏰ ${msg} <button class="btn small secondary" onclick="switchTab('backup')" style="margin-left:8px;">Go to Backup</button>
  </div>`;
}
function drawCharts(approved,pending,rejected,fails,passes){
  const f = document.getElementById("chartFunnel");

  if(!f || !b || typeof Chart==="undefined") return;
  if(f._chart) f._chart.destroy();
  if(b._chart) b._chart.destroy();

// ================= ODOMETER VERIFICATION =================
// Site Supervisor (their own vehicles), Data Team (fallback for vehicles
// with no Supervisor - status-only for everyone else's), and Ops
// Manager/Owner (everything) all land on the same screen; the backend does
// the actual scoping/redaction, this just renders whatever it hands back.
// Once a reading shows VERIFIED there is no edit/undo control anywhere -
// that's enforced server-side, not just hidden here.
async function odometerVerificationScreen(){
  const allRows = await api("/driver-shifts");
  // Three zones, not a single pending/done flag: a shift only counts as
  // Approved once its opening reading is verified, and only moves into
  // Completed once BOTH the opening AND the closing readings are verified -
  // approving just one of the two is not enough to be "done".
  const zones = { pending: [], approved: [], completed: [] };
  allRows.forEach(r => zones[odometerVerificationZone(r)].push(r));
  const zoneSectionHtml = (title, badgeClass, list, emptyMsg) => `
    <h2 class="section-title" style="margin-top:18px;">${title} <span class="badge ${badgeClass}">${list.length}</span></h2>
    ${list.length===0 ? `<div class="card"><div class="empty">${emptyMsg}</div></div>` : list.map(odometerShiftCardHtml).join("")}`;
  return `
  <h1 class="page-title">Odometer Verification</h1>
  <div class="banner">Check each driver's odometer photo before approving - once approved, a reading can never be edited again. If a driver genuinely couldn't enter a reading themselves, use Manual Entry after they read out their 6-digit code to you (this applies a ₹100 penalty on the driver for the missed entry).</div>
  ${zoneSectionHtml("Pending Verification", "pending", zones.pending, "Nothing pending verification.")}
  ${zoneSectionHtml("Approved - Awaiting Closing Reading", "in_process", zones.approved, "Nothing waiting on a closing reading right now.")}
  <div class="card" style="margin-top:18px;">
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
      <input type="checkbox" ${odometerVerifyShowCompleted?"checked":""} onchange="toggleOdometerVerifyShowCompleted(this.checked)" />
      Show completed shifts (${zones.completed.length} - both opening and closing approved)
    </label>
  </div>
  ${odometerVerifyShowCompleted ? zoneSectionHtml("Completed", "completed", zones.completed, "No completed shifts yet.") : ""}
  `;
}
// A shift is Pending until its opening reading is verified. Once the
// opening reading is verified it moves to Approved - even if the closing
// reading is still outstanding. It only reaches Completed once BOTH the
// opening AND the closing readings are verified; approving just one side
// is never enough to land in Completed.
function odometerVerificationZone(r){
  const openVerified = r.open.hasReading && r.open.verified;
  if(!openVerified) return "pending";
  const closeVerified = r.close.hasReading && r.close.verified;
  if(closeVerified) return "completed";
  return "approved";
}
async function toggleOdometerVerifyShowCompleted(checked){
  odometerVerifyShowCompleted = checked;
  await renderMain();
}
function driverLocationLineHtml(loc){
  if(!loc) return "Location: not available yet";
  const sourceLabel = {live:"Live tracking", closing_reading:"From closing reading", opening_reading:"From opening reading", login:"From login"}[loc.source] || "Last known";
  const when = loc.ts ? new Date(loc.ts).toLocaleString() : "";
  return `Location (${sourceLabel}${when? ', '+when:''}): ${mapsLocationLinkHtml(loc.lat, loc.lng, "Open in Maps")}`;
}
function odometerShiftCardHtml(r){
  return `
  <div class="card">
    <h2 class="section-title">${r.driverName}${r.driverPhone? ' &middot; '+r.driverPhone:''} - ${r.vehicleReg||'No vehicle assigned'} <span class="muted" style="font-weight:400;">(${r.date||'-'})</span></h2>
    <div class="muted" style="margin-bottom:8px;">${r.hasSupervisor ? `Supervisor: ${r.supervisorName}` : '<span class="badge rejected">No Supervisor Assigned</span>'}</div>
    <div class="muted" style="margin-bottom:8px;">${driverLocationLineHtml(r.lastLocation)}</div>
    ${odometerPointBlockHtml(r.id,'open',r.open,r.canAct)}
    ${odometerPointBlockHtml(r.id,'close',r.close,r.canAct)}
  </div>`;
}
function odometerPointBlockHtml(shiftId, point, p, canAct){
  const label = point==='open' ? 'Opening Reading' : 'Closing Reading';
  // Data Team, supervised vehicle: status-only, no odometer/photo leaked.
  if(p.odometer===undefined){
    if(!p.hasReading) return `<div class="doc-row" style="display:block;"><b>${label}</b>: <span class="muted">Not entered yet</span></div>`;
    return `<div class="doc-row" style="display:block;"><b>${label}</b>: ${p.verified ? `<span class="badge approved">VERIFIED</span> by ${p.verifiedByName}` : `<span class="badge pending">PENDING VERIFICATION</span>`}</div>`;
  }
  if(!p.hasReading){
    return `<div class="doc-row" style="display:block;">
      <b>${label}</b>: <span class="muted">Not entered yet</span>
      ${canAct ? `<button class="btn small secondary" style="margin-left:8px;" onclick="manualOdometerEntry('${shiftId}','${point}')">Manual Entry (driver's code required)</button>` : ""}
    </div>`;
  }
  return `<div class="doc-row" style="display:block;">
    <b>${label}</b>: ${p.odometer} km ${p.enteredBy==='supervisor' ? '<span class="badge pending">MANUAL ENTRY</span>' : ''}
    ${p.photoUrl ? ` &middot; <a href="${p.photoUrl}" target="_blank">View photo</a>` : ''}
    <br/>
    ${p.verified
      ? `<span class="badge approved">VERIFIED</span> <span class="muted">by ${p.verifiedByName}${p.verifiedAt? ' at '+new Date(p.verifiedAt).toLocaleString():''}</span>`
      : (canAct ? `<span class="badge pending">PENDING</span> <button class="btn small" onclick="verifyOdometerReading('${shiftId}','${point}')">Approve</button>` : `<span class="badge pending">PENDING</span>`)}
  </div>`;
}
async function verifyOdometerReading(shiftId, point){
  if(!confirm(`Have you checked the photo? Approve this ${point==='open'?'opening':'closing'} odometer reading - this can't be undone.`)) return;
  try{
    await api(`/driver-shifts/${shiftId}/verify`, {method:"PATCH", body: JSON.stringify({point})});
    await renderMain();
  }catch(e){ alert(e.message); }
}
async function manualOdometerEntry(shiftId, point){
  const odometer = prompt(`${point==='open'?'Opening':'Closing'} odometer reading (km):`);
  if(odometer===null || odometer==="") return;
  const pin = prompt("Enter the 6-digit code the driver read out to you:");
  if(pin===null || pin==="") return;
  try{
    await api(`/driver-shifts/${shiftId}/manual-odometer`, {method:"POST", body: JSON.stringify({point, odometer:Number(odometer), pin})});
    alert("Reading recorded and verified. A ₹100 penalty has been applied to the driver for this month.");
    await renderMain();
  }catch(e){ alert(e.message); }
}

// ================= PAYROLL =================
// Two pieces per person, mirroring the server: a recurring profile (base
// salary + components like ESI/PF/Gratuity - set up once by HR, applies
// automatically every month with no re-entry) and ad-hoc entries tied to
// a specific month (traffic challans, fuel theft, cleanliness penalties,
// other penalties, or a bonus). Every payslip is computed fresh from the
// two, never hand-typed. Everyone can always see/download their own; HR
// can see and edit everyone's; Owner sees everyone's but can't edit;
// Operations Manager and Site Supervisor can see drivers only (Site
// Supervisor limited to their own supervised drivers).
const PAYROLL_ADHOC_CATEGORIES = [
  {key:"traffic_challan", label:"Traffic Challan"},
  {key:"fuel_theft", label:"Fuel Deduction (Theft)"},
  {key:"cleanliness_penalty", label:"Vehicle Cleanliness Penalty"},
  {key:"other_penalty", label:"Other Penalty"},
  {key:"bonus", label:"Bonus / Incentive"},
  {key:"other_earning", label:"Other Earning"},
];
let payrollMonth = todayStr().slice(0,7);
let editingPayrollKey = null; // `${personType}:${personId}` currently expanded in the management table
function money(n){ return "₹" + Number(n||0).toLocaleString("en-IN"); }
function canEditPayrollFrontend(){ return currentUser.role==="hr"; }
async function setPayrollMonth(v){ payrollMonth = v || todayStr().slice(0,7); await renderMain(); }
async function fetchPayslip(personType, personId, month){
  try{ return await api(`/payroll/payslip/${personType}/${personId}?month=${month}`); }catch(e){ return null; }
}
async function fetchPayrollProfile(personType, personId){
  try{ return await api(`/payroll/profile/${personType}/${personId}`); }catch(e){ return null; }
}
async function fetchPayrollSummary(month){
  try{ return await api(`/payroll/summary?month=${month}`); }catch(e){ return null; }
}
async function fetchPayrollApproval(personType, personId, month){
  try{ return await api(`/payroll/approval/${personType}/${personId}?month=${month}`); }catch(e){ return null; }
}
async function approvePayslip(personType, personId){
  try{
    await api("/payroll/approve", {method:"POST", body: JSON.stringify({personType, personId, month:payrollMonth})});
    await renderMain();
  }catch(e){ alert(e.message); }
}
function payslipTableHtml(payslip){
  if(!payslip) return `<div class="empty">Could not load payslip.</div>`;
  const canEdit = canEditPayrollFrontend();
  const rows = [
    ...payslip.earnings.map(e=>`<tr><td>${e.label}</td><td>Earning</td><td>${money(e.amount)}</td><td></td></tr>`),
    ...payslip.deductions.map(d=>`<tr><td>${d.label}</td><td>Deduction</td><td>-${money(d.amount)}</td><td>${d.source==='adhoc' && canEdit ? `<button class="btn small danger" onclick="deletePayrollAdhoc('${d.id}')">Remove</button>` : ''}</td></tr>`),
  ].join("");
  return `
  <table><tr><th>Item</th><th>Type</th><th>Amount</th><th></th></tr>${rows}</table>
  <div class="muted" style="margin-top:8px;">Gross: ${money(payslip.grossPay)} &nbsp;|&nbsp; Deductions: ${money(payslip.totalDeductions)} &nbsp;|&nbsp; <b>Net Pay: ${money(payslip.netPay)}</b></div>
  ${!payslip.hasProfile ? `<div class="muted">No payroll formula has been set up for this person yet.</div>` : ''}`;
}
async function myPayslipCardHtml(){
  const payslip = await fetchPayslip("user", currentUser.id, payrollMonth);
  return `
  <div class="card">
    <h2 class="section-title">My Payslip - ${payrollMonth}</h2>
    ${payslipTableHtml(payslip)}
    <div class="controls" style="margin-top:10px;">
      <button class="btn small secondary" onclick="downloadPayslip('user','${currentUser.id}','pdf')">Download PDF</button>
      <button class="btn small secondary" onclick="downloadPayslip('user','${currentUser.id}','csv')">Download CSV</button>
      <button class="btn small secondary" onclick="downloadPayslip('user','${currentUser.id}','xlsx')">Download Excel</button>
    </div>
  </div>`;
}
async function downloadPayslip(personType, personId, format){
  try{
    const headers = {};
    if(authToken) headers["Authorization"] = "Bearer " + authToken;
    const res = await fetch(`${API}/payroll/payslip/${personType}/${personId}/download?month=${payrollMonth}&format=${format}`, {headers});
    if(!res.ok){
      const data = await res.json().catch(()=>({}));
      throw new Error(data.error || `Download failed (${res.status})`);
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `payslip_${personId}_${payrollMonth}.${format==='xlsx'?'xlsx':format==='pdf'?'pdf':'csv'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }catch(e){ alert(e.message); }
}
function togglePayrollDetail(personType, personId){
  const key = `${personType}:${personId}`;
  editingPayrollKey = editingPayrollKey===key ? null : key;
  renderMain();
}
async function payrollManagementHtml(){
  const summary = await fetchPayrollSummary(payrollMonth);
  if(!summary || !summary.rows.length) return "";
  const canEdit = canEditPayrollFrontend();
  const staffRows = summary.rows.filter(r=>r.personType==="user");
  const driverRows = summary.rows.filter(r=>r.personType==="driver");
  const rowHtml = async (r) => {
    const key = `${r.personType}:${r.personId}`;
    const detail = editingPayrollKey===key ? await payrollDetailHtml(r.personType, r.personId) : "";
    return `<tr>
      <td><b>${r.name}</b></td>
      <td>${r.subLabel}</td>
      <td>${r.hasProfile ? money(r.grossPay) : '<span class="muted">No formula set</span>'}</td>
      <td>${r.hasProfile ? money(r.totalDeductions) : '-'}</td>
      <td>${r.hasProfile ? `<b>${money(r.netPay)}</b>` : '-'}</td>
      <td>
        <button class="btn small secondary" onclick="togglePayrollDetail('${r.personType}','${r.personId}')">${editingPayrollKey===key?'Close':(canEdit?'Manage':'View')}</button>
        <button class="btn small secondary" onclick="downloadPayslip('${r.personType}','${r.personId}','pdf')">PDF</button>
        <button class="btn small secondary" onclick="downloadPayslip('${r.personType}','${r.personId}','csv')">CSV</button>
        <button class="btn small secondary" onclick="downloadPayslip('${r.personType}','${r.personId}','xlsx')">Excel</button>
      </td>
    </tr>
    ${detail ? `<tr><td colspan="6">${detail}</td></tr>` : ''}`;
  };
  let staffHtml = "";
  for(const r of staffRows) staffHtml += await rowHtml(r);
  let driverHtml = "";
  for(const r of driverRows) driverHtml += await rowHtml(r);

  return `
  ${staffRows.length ? `
  <div class="card">
    <h2 class="section-title">Staff Payroll</h2>
    <table><tr><th>Name</th><th>Role</th><th>Gross</th><th>Deductions</th><th>Net Pay</th><th></th></tr>${staffHtml}</table>
  </div>` : ''}
  ${driverRows.length ? `
  <div class="card">
    <h2 class="section-title">Driver Payroll</h2>
    <table><tr><th>Name</th><th>Role</th><th>Gross</th><th>Deductions</th><th>Net Pay</th><th></th></tr>${driverHtml}</table>
  </div>` : ''}`;
}
function payrollComponentRowHtml(c){
  c = c || {label:"", type:"deduction", mode:"percent", value:0, enabled:true};
  return `<div class="f pf-component-row" style="border:1px solid #ddd;padding:6px;margin:4px 0;border-radius:6px;">
    <input type="text" placeholder="Label (e.g. ESI)" class="pfc_label" value="${c.label}" style="width:110px" />
    <select class="pfc_type" style="width:100px">
      <option value="deduction" ${c.type==='deduction'?'selected':''}>Deduction</option>
      <option value="earning" ${c.type==='earning'?'selected':''}>Earning</option>
    </select>
    <select class="pfc_mode" style="width:90px">
      <option value="percent" ${c.mode==='percent'?'selected':''}>% of base</option>
      <option value="fixed" ${c.mode==='fixed'?'selected':''}>Fixed ₹</option>
    </select>
    <input type="number" min="0" step="0.01" placeholder="Value" class="pfc_value" value="${c.value}" style="width:80px" />
    <label style="font-weight:normal;"><input type="checkbox" class="pfc_enabled" ${c.enabled?'checked':''} /> Enabled</label>
    <button type="button" class="btn small danger" onclick="this.closest('.pf-component-row').remove()">Remove</button>
  </div>`;
}
function addPayrollComponentRow(personType, personId){
  const container = document.getElementById(`pf_components_${personType}_${personId}`);
  if(!container) return;
  const wrap = document.createElement("div");
  wrap.innerHTML = payrollComponentRowHtml(null);
  container.appendChild(wrap.firstElementChild);
}
async function savePayrollProfile(evt, personType, personId){
  evt.preventDefault();
  const base = document.getElementById(`pf_base_${personType}_${personId}`).value;
  const container = document.getElementById(`pf_components_${personType}_${personId}`);
  const rows = Array.from(container.querySelectorAll(".pf-component-row"));
  const components = rows.map(row=>({
    label: row.querySelector(".pfc_label").value,
    type: row.querySelector(".pfc_type").value,
    mode: row.querySelector(".pfc_mode").value,
    value: Number(row.querySelector(".pfc_value").value),
    enabled: row.querySelector(".pfc_enabled").checked,
  })).filter(c=>c.label && String(c.label).trim());
  try{
    await api(`/payroll/profile/${personType}/${personId}`, {method:"PATCH", body: JSON.stringify({baseSalary: Number(base), components})});
    await renderMain();
  }catch(e){ alert(e.message); }
  return false;
}
async function addPayrollAdhoc(evt, personType, personId){
  evt.preventDefault();
  const category = document.getElementById(`adhoc_cat_${personType}_${personId}`).value;
  const amount = document.getElementById(`adhoc_amt_${personType}_${personId}`).value;
  const note = document.getElementById(`adhoc_note_${personType}_${personId}`).value;
  try{
    await api("/payroll/adhoc", {method:"POST", body: JSON.stringify({personType, personId, month: payrollMonth, category, amount: Number(amount), note})});
    await renderMain();
  }catch(e){ alert(e.message); }
  return false;
}
async function deletePayrollAdhoc(id){
  if(!confirm("Remove this entry?")) return;
  try{
    await api(`/payroll/adhoc/${id}`, {method:"DELETE"});
    await renderMain();
  }catch(e){ alert(e.message); }
}
async function payrollDetailHtml(personType, personId){
  const [profile, payslip, approval] = await Promise.all([
    fetchPayrollProfile(personType, personId),
    fetchPayslip(personType, personId, payrollMonth),
    fetchPayrollApproval(personType, personId, payrollMonth),
  ]);
  const canEdit = canEditPayrollFrontend();
  const components = profile ? profile.components : [];
  return `
  <div class="card" style="margin:8px 0; background:#fafafa;">
    <h3 style="margin-top:0;">${payslip ? payslip.name : personId} - Payroll Formula</h3>
    ${canEdit ? `
    <form onsubmit="return savePayrollProfile(event,'${personType}','${personId}')">
      <div class="f"><label>Base Salary</label><input type="number" min="0" id="pf_base_${personType}_${personId}" value="${profile? profile.baseSalary : ''}" required style="width:120px" /></div>
      <div id="pf_components_${personType}_${personId}">
        ${components.map(c=>payrollComponentRowHtml(c)).join("")}
      </div>
      <button type="button" class="btn small secondary" onclick="addPayrollComponentRow('${personType}','${personId}')">+ Add component</button>
      <div style="margin-top:10px;">
        <button class="btn small" type="submit">Save Formula</button>
      </div>
    </form>
    ` : `
    <table><tr><th>Base Salary</th><td>${profile? money(profile.baseSalary) : '-'}</td></tr></table>
    <table><tr><th>Component</th><th>Type</th><th>Mode</th><th>Value</th><th>Enabled</th></tr>
    ${components.map(c=>`<tr><td>${c.label}</td><td>${c.type}</td><td>${c.mode}</td><td>${c.mode==='percent'?c.value+'%':money(c.value)}</td><td>${c.enabled?'Yes':'No'}</td></tr>`).join("") || "<tr><td colspan='5' class='empty'>No components set.</td></tr>"}
    </table>
    `}
    <h3>This Month's Payslip (${payrollMonth})</h3>
    ${payslipTableHtml(payslip)}
    ${canEdit && personType==="driver" ? `
    <div class="banner ${approval? 'ok':''}" style="margin-top:10px;">
      ${approval
        ? `Approved by ${approval.approvedByName} on ${new Date(approval.approvedAt).toLocaleString("en-IN")} - the driver can now download this exact payslip in their app.`
        : `Not approved yet - the driver won't see or be able to download this month's payslip in the driver app until you approve it.`}
      <div style="margin-top:8px;"><button class="btn small" onclick="approvePayslip('${personType}','${personId}')">${approval? "Re-Approve With Latest Figures" : "Approve This Month's Payslip"}</button></div>
    </div>
    ` : ''}
    ${canEdit ? `
    <h3>Add One-Time Entry (this month)</h3>
    <form class="inline-form" onsubmit="return addPayrollAdhoc(event,'${personType}','${personId}')">
      <div class="f"><label>Category</label><select id="adhoc_cat_${personType}_${personId}">
        ${PAYROLL_ADHOC_CATEGORIES.map(c=>`<option value="${c.key}">${c.label}</option>`).join("")}
      </select></div>
      <div class="f"><label>Amount</label><input type="number" min="1" id="adhoc_amt_${personType}_${personId}" required style="width:100px" /></div>
      <div class="f"><label>Note (optional)</label><input type="text" id="adhoc_note_${personType}_${personId}" style="width:160px" /></div>
      <button class="btn small" type="submit">+ Add</button>
    </form>
    ` : ''}
  </div>`;
}
async function payrollScreen(){
  return `
  <h1 class="page-title">Payroll</h1>
  <div class="card">
    <div class="check-row">
      <div class="label">Month</div>
      <div class="controls">
        <input type="month" value="${payrollMonth}" max="${todayStr().slice(0,7)}" onchange="setPayrollMonth(this.value)" />
