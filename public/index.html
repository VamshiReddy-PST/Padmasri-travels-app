<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Padmasri Travels - Fleet Supervisor App</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1f3864" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --navy:#1f3864; --accent:#2e74b5; --accent-light:#eaf2fb; --green:#1e8e3e;
    --amber:#b8860b; --red:#c0392b; --grey:#666; --bg:#f4f6f9; --card:#ffffff;
    --border:#e1e6ec;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:#1a1a1a;}
  #app{max-width:1180px;margin:0 auto;min-height:100vh;background:var(--bg);}
  header.topbar{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  header.topbar .brand{font-weight:700;font-size:17px;display:flex;align-items:center;gap:8px;}
  header.topbar .brand .dot{width:9px;height:9px;border-radius:50%;background:#4caf50;display:inline-block;}
  header.topbar .who{font-size:13px;opacity:.9;text-align:right;}
  header.topbar button.logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;margin-left:10px;}
  header.topbar button.logout:hover{background:rgba(255,255,255,.28);}
  nav.tabbar{background:#0d2545;display:flex;gap:2px;padding:0 16px;overflow-x:auto;}
  nav.tabbar button{background:transparent;border:none;color:#bcd3ee;padding:11px 16px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  nav.tabbar button.active{color:#fff;border-bottom-color:#4caf50;font-weight:600;}
  main{padding:18px 20px 60px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
  h1.page-title{font-size:20px;margin:4px 0 16px;color:var(--navy);}
  h2.section-title{font-size:15px;margin:0 0 10px;color:var(--navy);border-bottom:2px solid var(--accent-light);padding-bottom:6px;}
  .grid{display:grid;gap:14px;}
  .grid.cols-4{grid-template-columns:repeat(4,1fr);}
  .grid.cols-3{grid-template-columns:repeat(3,1fr);}
  .grid.cols-2{grid-template-columns:repeat(2,1fr);}
  @media(max-width:900px){.grid.cols-4{grid-template-columns:repeat(2,1fr);}.grid.cols-3{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:600px){.grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr;}}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .kpi .num{font-size:26px;font-weight:700;color:var(--navy);}
  .kpi .label{font-size:12px;color:var(--grey);margin-top:2px;}
  .kpi.warn .num{color:var(--amber);}
  .kpi.bad .num{color:var(--red);}
  .kpi.good .num{color:var(--green);}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .badge.pending{background:#fff4d6;color:var(--amber);}
  .badge.approved{background:#e2f4e6;color:var(--green);}
  .badge.rejected{background:#fbe4e1;color:var(--red);}
  .badge.pass{background:#e2f4e6;color:var(--green);}
  .badge.fail{background:#fbe4e1;color:var(--red);}
  .badge.ok{background:#e2f4e6;color:var(--green);}
  .badge.low{background:#fbe4e1;color:var(--red);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  table th{text-align:left;background:var(--accent-light);color:var(--navy);padding:8px 10px;font-size:12px;}
  table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
  table tr:hover td{background:#fafbfd;}
  .btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;}
  .btn:hover{background:var(--navy);}
  .btn.secondary{background:#fff;color:var(--accent);border:1px solid var(--accent);}
  .btn.danger{background:var(--red);}
  .btn.small{padding:4px 10px;font-size:12px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .vehicle-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
  .vehicle-card{border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;background:#fff;}
  .vehicle-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(46,116,181,.12);}
  .vehicle-card .reg{font-weight:700;color:var(--navy);font-size:15px;}
  .vehicle-card .route{font-size:12px;color:var(--grey);margin:3px 0 8px;}
  .checklist-group{margin-bottom:18px;}
  .check-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f2f5;gap:10px;flex-wrap:wrap;}
  .check-row .label{font-size:13.5px;flex:1;min-width:180px;}
  .check-row .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  select,input[type=text],input[type=date],input[type=number],input[type=tel]{padding:6px 8px;border:1px solid #ccd3db;border-radius:5px;font-size:13px;}
  .toggle{display:flex;border:1px solid #ccd3db;border-radius:5px;overflow:hidden;}
  .toggle button{border:none;background:#fff;padding:5px 10px;font-size:12px;cursor:pointer;}
  .toggle button.active-ok{background:var(--green);color:#fff;}
  .toggle button.active-bad{background:var(--red);color:#fff;}
  .photo-btn{border:1px dashed #aab6c5;background:#fbfcfe;border-radius:5px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--accent);}
  .thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
  .thumbs img{width:44px;height:44px;object-fit:cover;border-radius:5px;border:1px solid var(--border);}
  .role-pick{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0;}
  .role-pick label{border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;font-size:13px;display:flex;flex-direction:column;gap:3px;}
  .role-pick label.sel{border-color:var(--accent);background:var(--accent-light);}
  .role-pick label span.small{color:var(--grey);font-size:11px;}
  .login-wrap{max-width:420px;margin:60px auto;}
  .login-wrap .logo{text-align:center;font-size:22px;font-weight:800;color:var(--navy);margin-bottom:4px;}
  .login-wrap .sub{text-align:center;color:var(--grey);font-size:13px;margin-bottom:22px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--grey);margin-bottom:4px;}
  .field input,.field select{width:100%;}
  .banner{background:#fff8e6;border:1px solid #f0dca0;color:#7a5a00;padding:10px 14px;border-radius:8px;font-size:12.5px;margin-bottom:16px;}
  .banner.error{background:#fbe4e1;border-color:#eab3ab;color:#7a2115;}
  .muted{color:var(--grey);font-size:12px;}
  .flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .empty{text-align:center;color:var(--grey);padding:30px 10px;font-size:13px;}
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:900px){.charts-grid{grid-template-columns:1fr;}}
  .footer-note{font-size:11px;color:#9aa4b2;text-align:center;padding:20px;}
  .selfie-thumb{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
  .clock-btns{display:flex;gap:10px;flex-wrap:wrap;}
  .clock-status{padding:14px;border-radius:8px;background:var(--accent-light);font-size:13px;margin-bottom:14px;}
  form.inline-form{display:flex;gap:8px;flex-wrap:wrap;align-items:end;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);}
  form.inline-form .f{display:flex;flex-direction:column;gap:3px;}
  form.inline-form label{font-size:11px;color:var(--grey);}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" multiple />
<input type="file" id="selfieInput" accept="image/*" capture="user" style="display:none" />
<input type="file" id="billInput" accept="image/*" capture="environment" style="display:none" />
<script>
/* =========================================================================
   FLEET SUPERVISOR APP - talks to the shared backend in server.js.
   Every screen reads/writes through fetch() calls to /api/* so that all
   users see the same data - this is the real, shareable version.
   ========================================================================= */

const API = "/api";
let authToken = localStorage.getItem("fleetAuthToken") || null;
let currentUser = null;
let meta = { clients: [], sites: [], drivers: [], users: [] };
let vehicles = [];
let records = {};
let odometerLogs = {};
let leaves = [];
let expenses = [];
let view = { tab: null, name: "home" };
let loading = false;
let lastError = "";

function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysUntil(dateStr){
  if(!dateStr) return 9999;
  const d = new Date(dateStr), n = new Date(todayStr());
  return Math.round((d-n)/86400000);
}

async function api(path, opts={}){
  const headers = Object.assign({"Content-Type":"application/json"}, opts.headers||{});
  if(authToken) headers["Authorization"] = "Bearer " + authToken;
  const res = await fetch(API+path, Object.assign({}, opts, {headers}));
  if(res.status === 401){
    doLogout(true);
    throw new Error("Session expired - please log in again.");
  }
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || ("Request failed ("+res.status+")"));
  return data;
}

function roleLabel(r){
  return {site_supervisor:"Site Supervisor", area_supervisor:"Area Supervisor", ops_manager:"Operations Manager", data_team:"Data Team", owner:"Owner", hr:"HR", bookings:"Bookings Department"}[r] || r;
}
function userName(id){ const u = meta.users.find(x=>x.id===id); return u? u.name : "-"; }
function siteName(id){ const s = meta.sites.find(x=>x.id===id); return s? s.name : "Unassigned"; }
function driverName(id){ const d = meta.drivers.find(x=>x.id===id); return d? d.name : "Unassigned"; }
function clientName(id){ const c = meta.clients.find(x=>x.id===id); return c? c.name : "-"; }

// ---------- bootstrap ----------
async function boot(){
  if(!authToken){ renderLogin(); return; }
  try{
    const m = await api("/meta");
    meta = m; currentUser = m.me;
    view.tab = defaultTab(currentUser.role);
    await loadCoreData();
    render();
  }catch(e){
    doLogout(true);
  }
}
function defaultTab(role){
  return {site_supervisor:"my_vehicles", area_supervisor:"queue", ops_manager:"operations", data_team:"corrections", hr:"attendance", owner:"dashboard", bookings:"usage"}[role];
}
async function loadCoreData(){
  const [v, r, o, l, ex] = await Promise.all([
    api("/vehicles"),
    api("/records?date="+todayStr()),
    api("/odometer?date="+todayStr()),
    api("/leaves"),
    api("/expenses"),
  ]);
  vehicles = v; records = r; odometerLogs = o; leaves = l; expenses = ex;
}

function doLogout(silent){
  authToken = null; currentUser = null; ownerAssignUnlocked = false;
  localStorage.removeItem("fleetAuthToken");
  if(!silent) api("/logout", {method:"POST"}).catch(()=>{});
  view = {tab:null, name:"home"};
  renderLogin();
}

// ---------- LOGIN ----------
let loginUsers = [];
let selectedLoginUser = null;
async function renderLogin(){
  const app = document.getElementById("app");
  app.innerHTML = `<div class="login-wrap"><div class="logo">🧭 Padmasri Travels</div><div class="sub">Loading team list...</div></div>`;
  try{
    loginUsers = await api("/users/login-list");
  }catch(e){ loginUsers = []; }
  const cards = loginUsers.map(u => `
    <label class="${selectedLoginUser===u.id?'sel':''}" onclick="selectLoginUser('${u.id}', event)">
      <b>${u.name}</b>
      <span class="small">${roleLabel(u.role)}</span>
    </label>
  `).join("");
  app.innerHTML = `
  <div class="login-wrap">
    <div class="logo">🧭 Padmasri Travels</div>
    <div class="sub">Sign in with your own login</div>
    <div class="card">
      ${lastError ? `<div class="banner error">${lastError}</div>` : ""}
      <div class="role-pick">${cards || "<div class='empty'>Could not reach the server.</div>"}</div>
      <div class="field">
        <label>PIN</label>
        <input type="password" inputmode="numeric" id="pinInput" placeholder="Your PIN" />
      </div>
      <button class="btn" style="width:100%" onclick="doLogin()" id="loginBtn">Sign in</button>
      <div class="muted" style="margin-top:10px;">Everyone gets their own login - this is what makes the audit trail (who changed what, when) meaningful.</div>
    </div>
  </div>`;
}
function selectLoginUser(id, evt){
  selectedLoginUser = id;
  document.querySelectorAll(".role-pick label").forEach(l=>l.classList.remove("sel"));
  if(evt && evt.currentTarget) evt.currentTarget.classList.add("sel");
}
async function doLogin(){
  lastError = "";
  if(!selectedLoginUser){ lastError = "Pick your name first."; renderLogin(); return; }
  const pin = document.getElementById("pinInput").value;
  const btn = document.getElementById("loginBtn");
  btn.disabled = true; btn.textContent = "Signing in...";
  try{
    const res = await fetch(API+"/login", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({id:selectedLoginUser, pin})});
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || "Login failed");
    authToken = data.token;
    localStorage.setItem("fleetAuthToken", authToken);
    await boot();
  }catch(e){
    lastError = e.message;
    renderLogin();
  }
}

// ---------- shell ----------
function tabsFor(role){
  if(role==="site_supervisor") return [["my_vehicles","My Vehicles"],["my_attendance","My Attendance"],["my_expenses","My Expenses"],["usage","Vehicle Usage"],["assignments","Overview"],["routes","Routes"]];
  if(role==="area_supervisor") return [["queue","Verification Queue"],["expenses_view","Team Expenses"],["usage","Vehicle Usage"],["assignments","Overview"],["reports","Reports"],["routes","Routes"]];
  if(role==="ops_manager") return [["operations","Operations"],["expenses","Expenses"],["assignments","Overview"],["people","People"],["reports","Reports"],["backup","Backup"]];
  if(role==="data_team") return [["corrections","Corrections"],["expenses_view","Expenses"],["assignments","Overview"],["people","People"],["audit","Audit Log"]];
  if(role==="hr") return [["attendance","Attendance"],["people","People"]];
  if(role==="owner") return [["dashboard","Dashboard"],["expenses","Expenses"],["assignments","Overview"],["people","People"],["attendance","Attendance"],["audit","Audit Log"],["reports","Reports"],["backup","Backup"]];
  if(role==="bookings") return [["usage","Vehicle Usage"]];
  return [];
}

async function render(){
  const app = document.getElementById("app");
  const u = currentUser;
  const tabs = tabsFor(u.role);
  app.innerHTML = `
    <header class="topbar">
      <div class="brand"><span class="dot"></span> Padmasri Travels</div>
      <div style="display:flex;align-items:center;">
        <div class="who">${u.name}<br><span style="opacity:.75">${roleLabel(u.role)}</span></div>
        <button class="logout" onclick="doLogout()">Log out</button>
      </div>
    </header>
    <nav class="tabbar">
      ${tabs.map(([k,l])=>`<button class="${view.tab===k?'active':''}" onclick="switchTab('${k}')">${l}</button>`).join("")}
    </nav>
    <main id="main"><div class="empty">Loading...</div></main>
    <div class="footer-note">Shared data - everyone signed into this app sees the same fleet records.</div>
  `;
  await renderMain();
}
async function switchTab(tab){ view = {tab, name:"home"}; ownerAssignUnlocked = false; assignmentsViewDate = todayStr(); await render(); window.scrollTo(0,0); }
async function goto(name, params){ view = Object.assign({tab: view.tab}, {name}, params||{}); await renderMain(); window.scrollTo(0,0); }

async function renderMain(){
  const main = document.getElementById("main");
  try{
    main.innerHTML = await routeView();
  }catch(e){
    main.innerHTML = `<div class="banner error">${e.message}</div>`;
  }
}

async function routeView(){
  const role = currentUser.role;
  const tab = view.tab;
  if(role==="site_supervisor"){
    if(tab==="my_vehicles") return view.name==="vehicle_detail" ? vehicleChecklistScreen(view.vehicleId) : supervisorHome();
    if(tab==="my_attendance") return myAttendanceScreen();
    if(tab==="my_expenses") return myExpensesScreen();
    if(tab==="usage") return vehicleUsageScreen();
    if(tab==="assignments") return supervisorAssignmentsScreen();
    if(tab==="routes") return routesViewScreen();
  }
  if(role==="area_supervisor"){
    if(tab==="queue") return areaQueueScreen();
    if(tab==="expenses_view") return expensesScreen(false);
    if(tab==="usage") return vehicleUsageScreen();
    if(tab==="assignments") return supervisorAssignmentsScreen();
    if(tab==="reports") return reportsScreen();
    if(tab==="routes") return routesViewScreen();
  }
  if(role==="ops_manager"){
    if(tab==="operations") return operationsScreen();
    if(tab==="expenses") return expensesScreen(true);
    if(tab==="assignments") return assignmentsScreen();
    if(tab==="people") return peopleScreen();
    if(tab==="reports") return reportsScreen();
    if(tab==="backup") return backupDownloadsScreen();
  }
  if(role==="data_team"){
    if(tab==="corrections") return correctionsScreen();
    if(tab==="expenses_view") return expensesScreen(false);
    if(tab==="assignments") return assignmentsScreen();
    if(tab==="people") return peopleScreen();
    if(tab==="audit") return auditScreen();
  }
  if(role==="hr"){
    if(tab==="attendance") return hrAttendanceScreen();
    if(tab==="people") return peopleScreen();
  }
  if(role==="owner"){
    if(tab==="dashboard") return view.name==="dashboard_detail" ? dashboardDetailScreen(view.metric) : ownerDashboardScreen();
    if(tab==="expenses") return expensesScreen(true);
    if(tab==="assignments") return assignmentsScreen();
    if(tab==="people") return peopleScreen();
    if(tab==="attendance") return hrAttendanceScreen();
    if(tab==="audit") return auditScreen();
    if(tab==="reports") return reportsScreen();
    if(tab==="backup") return backupDownloadsScreen();
  }
  if(role==="bookings"){
    if(tab==="usage") return vehicleUsageScreen();
  }
  return "<div class='empty'>Nothing here.</div>";
}

// ================= VEHICLE USAGE (Site Supervisor, Area Supervisor, Bookings Department) =================
// A lighter-weight editor than the full Assignments screen - these three
// roles can flip a vehicle's Usage (Fixed / Client on demand / Booking)
// without touching site/driver/client assignment, which stays restricted
// to Operations Manager, Data Team and (PIN-gated) Owner.
const USAGE_LABELS = {fixed_route:"Fixed Route", client_on_demand:"Client on demand", booking:"Booking"};
// Recorded whenever fuel is filled, so the day's total spend can be broken
// out by station brand and by how it was paid for.
const FUEL_STATIONS = ["IOCL","BPCL","HPCL","Other"];
const FUEL_PAYMENT_MODES = ["Cash","UPI","Card","Other"];
function vehicleUsageScreen(){
  const rows = vehicles.map(v=>`
    <tr>
      <td><b>${v.reg}</b></td>
      <td>${v.route || siteName(v.siteId)}</td>
      <td>${v.clientId? clientName(v.clientId) : '-'}</td>
      <td>${driverName(v.driverId)}</td>
      <td>
        <select onchange="setVehicleUsage('${v.id}', this.value)">
          ${Object.entries(USAGE_LABELS).map(([val,label])=>`<option value="${val}" ${v.usage===val?'selected':''}>${label}</option>`).join("")}
        </select>
      </td>
    </tr>`).join("");
  return `
  <h1 class="page-title">Vehicle Usage</h1>
  <div class="banner">Set whether each vehicle runs a Fixed route, is used Client on demand, or is a Booking. Other vehicle/route/assignment details are managed by Operations Manager.</div>
  <div class="card">
    <table><tr><th>Vehicle</th><th>Route/Site</th><th>Client</th><th>Driver</th><th>Usage</th></tr>
    ${rows || "<tr><td colspan='5' class='empty'>No vehicles visible to you yet.</td></tr>"}
    </table>
  </div>`;
}
async function setVehicleUsage(vehicleId, usage){
  try{
    const v = await api(`/vehicles/${vehicleId}/usage`, {method:"PATCH", body: JSON.stringify({usage})});
    const idx = vehicles.findIndex(x=>x.id===vehicleId); if(idx>-1) vehicles[idx] = v;
  }catch(e){ alert(e.message); await renderMain(); }
}

// ================= SITE SUPERVISOR =================
function supervisorHome(){
  const mine = vehicles;
  const cards = mine.map(v=>{
    const rec = records[v.id];
    const status = rec ? rec.verification.status : "not_submitted";
    const badgeClass = status==="not_submitted" ? "pending" : status;
    const label = status==="not_submitted" ? "NOT SUBMITTED TODAY" : status.toUpperCase();
    return `<div class="vehicle-card" onclick="goto('vehicle_detail',{vehicleId:'${v.id}'})">
      <div class="reg">${v.reg}</div>
      <div class="route">${v.route || siteName(v.siteId)} · Driver: ${driverName(v.driverId)}</div>
      <span class="badge ${badgeClass}">${label}</span>
    </div>`;
  }).join("");
  return `
  <h1 class="page-title">My Vehicles - ${mine.length} allotted</h1>
  <div class="banner">Complete the daily checklist, document check, breathalyzer test, attendance, and fuel/mileage entry for each vehicle before it goes on route.</div>
  <div class="vehicle-list">${cards || "<div class='empty'>No vehicles allotted to you yet - ask Operations to assign one.</div>"}</div>
  `;
}

// in-memory draft for the vehicle currently being edited (not saved until Submit)
let draft = null;
function ensureDraft(vehicleId){
  if(draft && draft.vehicleId === vehicleId) return draft;
  const existing = records[vehicleId];
  // Merge onto the defaults (rather than replacing wholesale) so a record
  // that's missing a key - e.g. one saved through a partial/older API call -
  // can't crash the checklist screen with "Cannot read properties of undefined".
  const defaultSafety = {
    fireExtinguisher:{present:true, expiry:""}, firstAid:{present:true}, stepney:{present:true},
    jack:{present:true}, jackRod:{present:true}, wheelSpanner:{present:true}, chargingSockets:{present:true},
  };
  const defaultCondition = {
    suspension:"ok", seatCovers:"ok", curtains:"ok", seatPushBack:"ok", batteryWater:"ok", engineOil:"ok", coolant:"ok", airPressure:"ok", tyreWear:"ok",
  };
  draft = {
    vehicleId,
    safety: Object.assign({}, defaultSafety, (existing && existing.safety) ? JSON.parse(JSON.stringify(existing.safety)) : {}),
    condition: Object.assign({}, defaultCondition, (existing && existing.condition) ? JSON.parse(JSON.stringify(existing.condition)) : {}),

  return draft;
}

// Day-start / day-close odometer - separate from the fuel checklist above,
// saved immediately (like clock in/out) rather than held in the draft, so a
// supervisor can log the start reading in the morning and the close reading
// in the evening without redoing the whole vehicle checklist.
function dayOdometerCard(vehicleId){
  const log = odometerLogs[vehicleId] || {};

  const close = log.dayClose;
  return `

          : `<input type="number" id="odoStart_${vehicleId}" style="width:100px" placeholder="e.g. 45260" />

async function saveOdometer(vehicleId, type){
  const input = document.getElementById(type==="start" ? `odoStart_${vehicleId}` : `odoClose_${vehicleId}`);
  const value = input ? input.value : "";
  if(value === "" || Number(value) < 0){ alert("Enter a valid odometer reading."); return; }
  try{
    const entry = await api(`/odometer/${vehicleId}/${type}`, {method:"POST", body: JSON.stringify({value})});
    odometerLogs[vehicleId] = entry;
    await renderMain();
  }catch(e){ alert(e.message); }
}

function draftSet(path, value){
  const parts = path.split(".");
  let obj = draft;
  for(let i=0;i<parts.length-1;i++) obj = obj[parts[i]];
  obj[parts[parts.length-1]] = value;
  renderMain();
}

function updateBreathalyzer(reading){
  draft.breathalyzer.reading = Number(reading).toFixed(2);
  draft.breathalyzer.result = Number(reading) > 0.02 ? "fail" : "pass";
  renderMain();
}
function photoButton(tag){
  return `<button class="photo-btn" type="button" onclick="startPhotoCapture('${tag}')">📷 Add photo</button>`;
}
let photoTargetTag = null;
function startPhotoCapture(tag){ photoTargetTag = tag; document.getElementById("photoInput").click(); }
document.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById("photoInput").addEventListener("change", handlePhotoFiles);
  document.getElementById("selfieInput").addEventListener("change", handleSelfieFile);
  document.getElementById("billInput").addEventListener("change", handleBillFile);
});
function handlePhotoFiles(e){
  const files = Array.from(e.target.files||[]);
  if(!files.length || !draft) return;
  draft.photoTags[photoTargetTag] = draft.photoTags[photoTargetTag] || [];
  let remaining = files.length;
  files.forEach(f=>{
    downscaleImage(f, 480, 0.7, (dataUrl)=>{
      draft.photoTags[photoTargetTag].push(dataUrl);
      remaining--;
      if(remaining===0) renderMain();
    });
  });
  e.target.value = "";
}
function downscaleImage(file, maxW, quality, cb){
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement("canvas");
      canvas.width = img.width*scale; canvas.height = img.height*scale;
      canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
      cb(canvas.toDataURL("image/jpeg",quality));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
async function updateDoc(vehicleId, docType, expiry){
  try{
    await api(`/vehicles/${vehicleId}/docs`, {method:"PATCH", body: JSON.stringify({docType, expiry})});
    const v = vehicles.find(x=>x.id===vehicleId);
    v.docs[docType].expiry = expiry;
    renderMain();
  }catch(e){ alert(e.message); }
}
async function submitVehicle(vehicleId){
  if(Number(draft.fuel.litres) > 0 && !(draft.photoTags.fuelReceipt||[]).length){
    alert("You entered litres filled, so a photo of the fuel receipt is required before you can submit.");
    return;
  }
  const t = draft.attendance.tempDriver;
  if(draft.attendance.status==='absent' && t && t.arranged && Number(t.amount) > 0 && !(draft.photoTags.tempDriverPayment||[]).length){
    alert("You entered an amount paid to the temporary driver, so a photo of the payment (UPI screenshot) is required before you can submit.");
    return;
  }
  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Submitting...`;
  try{
    const rec = await api("/records", {method:"POST", body: JSON.stringify(draft)});
    records[vehicleId] = rec;
    draft = null;
    if(rec.fuel.belowStandard){
      alert(`Heads up: this vehicle's mileage today is ${rec.fuel.mileage} km/l, below the standard of ${vehicles.find(v=>v.id===vehicleId).standardMileage} km/l. Warn the driver.`);
    }
    if(rec.autoExpense){
      expenses.unshift(rec.autoExpense);
      alert(`A ₹${rec.autoExpense.amount} expense request for the temporary driver has been sent to Operations for approval.`);
    }
    await goto("list");
  }catch(e){
    alert(e.message);
    btn.disabled = false; btn.textContent = "Submit for verification";
  }
}

let clockTargetType = null;
function doClock(type){
  clockTargetType = type;
  document.getElementById("selfieInput").click();

function handleSelfieFile(e){
  const file = e.target.files[0];
  e.target.value = "";
  if(!file) return;
  downscaleImage(file, 360, 0.7, (selfieDataUrl)=>{
    if(!navigator.geolocation){
      completeClock(clockTargetType, selfieDataUrl, null, null);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos)=> completeClock(clockTargetType, selfieDataUrl, pos.coords.latitude, pos.coords.longitude),
      ()=>{ if(confirm("Could not get your location (permission denied or unavailable). Continue without location?")) completeClock(clockTargetType, selfieDataUrl, null, null); },
      {enableHighAccuracy:true, timeout:10000}
    );
  });
}
async function completeClock(type, selfie, lat, lng){
  try{
    const entry = await api(`/attendance/${type}`, {method:"POST", body: JSON.stringify({selfie, lat, lng})});
    let msg = type==='clockin' ? "Clocked in." : "Clocked out.";
    if(entry.withinGeofence===false) msg += " Note: you appear to be away from your assigned site.";
    alert(msg);
    await renderMain();
  }catch(e){ alert(e.message); }
}

    await renderMain();
  }catch(e){ alert(e.message); }
}

async function areaQueueScreen(){

  return `

function flagsSummary(r,v){
  const flags = [];
  if(r.breathalyzer && r.breathalyzer.result==='fail') flags.push("🚨 Breathalyzer FAIL");
  if(r.safety && r.safety.fireExtinguisher && !r.safety.fireExtinguisher.present) flags.push("Fire ext. missing");
  if(r.fuel && r.fuel.belowStandard) flags.push("Mileage low");
  return flags.length? flags.join(", ") : "<span class='muted'>none</span>";
}
async function verify(vehicleId, date, status){
  let comment = "";
  if(status==="rejected"){ comment = prompt("Reason for rejection (sent back to the supervisor):","Please recheck and resubmit."); if(comment===null) return; }
  try{
    const rec = await api(`/records/${vehicleId}/${date}/verify`, {method:"PATCH", body: JSON.stringify({status, comment})});
    records[vehicleId] = rec;
    await renderMain();
  }catch(e){ alert(e.message); }
}

// Reads a <input type=file> into a base64 data: URL, same technique as the
// daily checklist's photo capture, but standalone since this editor isn't
// backed by the checklist's `draft` object.
function readFileAsDataUrl(fileInput){
  return new Promise((resolve,reject)=>{
    const file = fileInput.files && fileInput.files[0];
    if(!file){ resolve(null); return; }
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function lastUpdatedLabel(doc){
  return doc && doc.updatedAt ? `Last updated: ${new Date(doc.updatedAt).toLocaleString()}` : "Last updated: never";
}
// Selecting "State Permit" hides/disables the district fields (a permit is

  if(countEl) countEl.disabled = stateChecked;
  if(namesEl) namesEl.disabled = stateChecked;
}

async function saveVehicleDoc(vehicleId, docType){

  if(docType!=="RC"){
    body.expiry = document.getElementById(`doc_${docType}_expiry_${vehicleId}`).value;
  }
  if(docType==="Permit"){
    body.isStatePermit = document.getElementById(`doc_Permit_state_${vehicleId}`).checked;

      body.districtCount = document.getElementById(`doc_Permit_districtCount_${vehicleId}`).value;

    const fileInput = document.getElementById(`doc_${docType}_copy_${vehicleId}`);

    if(dataUrl) body.copy = dataUrl;
  }
  try{
    const v = await api(`/vehicles/${vehicleId}/docs`, {method:"PATCH", body: JSON.stringify(body)});
    const idx = vehicles.findIndex(x=>x.id===vehicleId); vehicles[idx] = v;

// away so the next visit is read-only again.
let ownerAssignUnlocked = false;
const ROLE_OPTIONS = [
  ["site_supervisor","Site Supervisor"],["area_supervisor","Area Supervisor"],["ops_manager","Operations Manager"],
  ["data_team","Data Team"],["hr","HR"],["owner","Owner"],["bookings","Bookings Department"],
];
// Mirrors the server's rule in server.js (canManageUserRole): Owner can
// manage anyone. HR - the primary staff onboarder - can manage Site
// Supervisor, Area Supervisor, Operations Manager, Data Team and Bookings
// Department accounts (everyone except Owner and other HR). Ops Manager can
// manage everyone except Owner, Ops Manager and HR. This is purely a UI
// convenience (hide buttons/options that would just get a 403 back) - the
// server enforces the real rule regardless of what the UI shows.
const ROLE_MANAGEMENT_ALLOWED = {
  hr: ["site_supervisor","area_supervisor","ops_manager","data_team","bookings"],
  ops_manager: ["site_supervisor","area_supervisor","data_team","bookings"],
};
function canManageRole(actorRole, targetRole){
  if(actorRole==="owner") return true;
  const allowed = ROLE_MANAGEMENT_ALLOWED[actorRole];
  return !!allowed && allowed.includes(targetRole);
}
function roleOptionsHtml(selected, actorRole){
  const opts = ROLE_OPTIONS.filter(([v])=> canManageRole(actorRole, v) || v===selected);
  return opts.map(([v,l])=>`<option value="${v}" ${selected===v?'selected':''}>${l}</option>`).join("");
}
function siteOptionsHtml(selected){
  return `<option value="">-</option>` + meta.sites.map(s=>`<option value="${s.id}" ${selected===s.id?'selected':''}>${s.name}</option>`).join("");

function driverMileageLabel(summary){
  if(!summary || !summary.fillCount) return `<span class="muted">No fuel records yet</span>`;
  const belowNote = summary.belowStandardCount>0 ? ` <span class="badge low">${summary.belowStandardCount} below standard</span>` : "";

// ================= ATTENDANCE BACKUP (HR, Owner) =================
// Separate from the general full-data Backup tab (Owner/Ops Manager) - HR
// needs their own roughly-every-15-days archive of attendance data
// specifically, kept outside the app. Every download is logged (who, when)
// so it's visible whether this is happening on schedule, plus the next
// due date computed straight from that log.
const ATTENDANCE_BACKUP_TARGET_DAYS = 15;
const ATTENDANCE_BACKUP_REMINDER_AFTER_DAYS = 12;
async function fetchAttendanceBackupHistory(){
  try{ return await api("/attendance-backup/history"); }catch(e){ return null; }
}
function nextScheduledDate(lastTakenIso){
  if(!lastTakenIso) return null;
  const d = new Date(lastTakenIso);
  d.setDate(d.getDate() + ATTENDANCE_BACKUP_TARGET_DAYS);
  return d.toISOString().slice(0,10);
}
async function attendanceBackupCardHtml(){
  const history = await fetchAttendanceBackupHistory();
  if(history===null) return "";
  const last = history[0];
  const days = last ? daysSinceIso(last.takenAt) : null;
  const nextDue = last ? nextScheduledDate(last.takenAt) : null;
  let statusHtml;
  if(days===null){
    statusHtml = `<div class="banner error">No attendance backup has ever been downloaded - please take one now.</div>`;
  } else if(days >= ATTENDANCE_BACKUP_TARGET_DAYS){
    statusHtml = `<div class="banner error">It's been ${days} days since the last attendance backup (target: every ${ATTENDANCE_BACKUP_TARGET_DAYS} days) - please download one now. It was due on ${nextDue}.</div>`;
  } else if(days >= ATTENDANCE_BACKUP_REMINDER_AFTER_DAYS){
    statusHtml = `<div class="banner">It's been ${days} days since the last attendance backup - one is due soon, by ${nextDue}.</div>`;
  } else {
    statusHtml = `<div class="banner">Last attendance backup was ${days} day${days===1?'':'s'} ago, by ${last.userName}. Next one due by ${nextDue}.</div>`;
  }
  const rows = history.map(b=>`
    <tr>
      <td>${new Date(b.takenAt).toLocaleString()}</td>
      <td>${b.userName}</td>
      <td>${roleLabel(b.role)}</td>
      <td>${nextScheduledDate(b.takenAt)}</td>
    </tr>`).join("");
  return `
  <div class="card">
    <h2 class="section-title">Attendance Backup</h2>
    <p class="muted">Download a complete archive of every supervisor clock-in/out and driver attendance record roughly every ${ATTENDANCE_BACKUP_TARGET_DAYS} days and keep it somewhere outside the app.</p>
    ${statusHtml}
    <button class="btn" onclick="downloadAttendanceBackup()">Download Attendance Backup</button>
    <table style="margin-top:12px;"><tr><th>Taken</th><th>By</th><th>Role</th><th>Next Scheduled</th></tr>
    ${rows || "<tr><td colspan='4' class='empty'>No attendance backups downloaded yet.</td></tr>"}
    </table>
  </div>`;
}
async function downloadAttendanceBackup(){
  try{
    const headers = {};
    if(authToken) headers["Authorization"] = "Bearer " + authToken;
    const res = await fetch(`${API}/attendance-backup/full`, {headers});
    if(!res.ok){
      const data = await res.json().catch(()=>({}));
      throw new Error(data.error || `Download failed (${res.status})`);
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `padmasri_attendance_backup_${todayStr()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    await renderMain();
  }catch(e){ alert(e.message); }

  if(days!==null && days < ATTENDANCE_BACKUP_REMINDER_AFTER_DAYS) return "";
  const nextDue = last ? nextScheduledDate(last.takenAt) : null;

    ? "No attendance backup has ever been downloaded."
    : `It's been ${days} days since the last attendance backup (target: every ${ATTENDANCE_BACKUP_TARGET_DAYS} days, next due ${nextDue}).`;
  return `<div class="banner ${days!==null && days>=ATTENDANCE_BACKUP_TARGET_DAYS ? 'error' : ''}" style="margin-bottom:14px;">

}

async function downloadReport(dataset, format){
  const fromEl = document.getElementById(`rep_from_${dataset}`);
  const toEl = document.getElementById(`rep_to_${dataset}`);
  const params = new URLSearchParams({format});
  if(fromEl && fromEl.value) params.set("from", fromEl.value);
  if(toEl && toEl.value) params.set("to", toEl.value);
  try{
    const headers = {};
    if(authToken) headers["Authorization"] = "Bearer " + authToken;
    const res = await fetch(`${API}/reports/${dataset}?${params.toString()}`, {headers});
    if(!res.ok){
      const data = await res.json().catch(()=>({}));
      throw new Error(data.error || `Download failed (${res.status})`);
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${dataset}_${todayStr()}.${format==='xlsx'?'xlsx':'csv'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }catch(e){ alert(e.message); }
}

// Turns a vehicle (+ today's record, if any) into the row shape every
// dashboard drill-down table shares - vehicle, site, client, supervisor,
// driver - so clicking any KPI lands on a consistent, actionable list.
function dashboardRowFor(v, r){
  return {
    vehicleId: v.id, reg: v.reg,
    site: siteName(v.siteId),
    client: v.clientId ? clientName(v.clientId) : "Internal / Fixed Route",
    supervisor: userName(v.supervisorId),
    driver: (r && r.attendance && r.attendance.driver) || driverName(v.driverId),
    record: r || null,
  };
}
function dashboardMetricRows(metric){
  if(metric==="compliant") return vehicles.filter(v=>records[v.id]&&records[v.id].verification.status==='approved').map(v=>dashboardRowFor(v, records[v.id]));
  if(metric==="pending") return vehicles.filter(v=>records[v.id]&&records[v.id].verification.status==='pending').map(v=>dashboardRowFor(v, records[v.id]));
  if(metric==="not_submitted") return vehicles.filter(v=>!records[v.id]).map(v=>dashboardRowFor(v, null));
  if(metric==="breath_fail") return vehicles.filter(v=>records[v.id]&&records[v.id].breathalyzer&&records[v.id].breathalyzer.result==='fail').map(v=>dashboardRowFor(v, records[v.id]));
  if(metric==="absent") return vehicles.filter(v=>records[v.id]&&records[v.id].attendance&&records[v.id].attendance.status==='absent').map(v=>dashboardRowFor(v, records[v.id]));
  if(metric==="uniform") return vehicles.filter(v=>records[v.id]&&records[v.id].attendance&&records[v.id].attendance.uniform==='non_compliant').map(v=>dashboardRowFor(v, records[v.id]));
  if(metric==="below_mileage") return vehicles.filter(v=>records[v.id]&&records[v.id].fuel&&records[v.id].fuel.belowStandard).map(v=>dashboardRowFor(v, records[v.id]));
  if(metric==="expiring_docs"){
    const rows = [];
    vehicles.forEach(v=>{
      Object.entries(v.docs||{}).forEach(([k,doc])=>{
        if(!doc.expiry) return;
        const dleft = daysUntil(doc.expiry);
        if(dleft<15) rows.push(Object.assign(dashboardRowFor(v, records[v.id]), {docType:k, daysLeft:dleft, expiry:doc.expiry}));
      });
    });
    return rows;
  }
  if(metric==="leaves_pending") return leaves.filter(l=>l.status==='pending');
  return [];
}

  return `

    <p class="muted">Each vehicle class/fuel combination gets its own average - a single blended fleet figure hides which class is actually underperforming. Only the lowest-mileage vehicles in each group are listed.</p>
    <div class="grid cols-2" style="gap:14px;">

  return `
  <div class="card">
    <h2 class="section-title">Backups (last 30 days)</h2>
    <p class="muted">Taken automatically once a day. Restoring replaces ALL current app data with that snapshot - use only to undo a serious mistake.</p>
    <table><tr><th>Taken</th><th>Reason</th><th></th></tr>${rows || "<tr><td colspan='3' class='empty'>No backups yet - the first is taken shortly after the server starts.</td></tr>"}</table>
  </div>`;
}
async function restoreBackup(id, label){
  if(!confirm(`Restore all app data to the backup from ${label}?\n\nThis REPLACES everything currently in the app (all vehicles, records, people, expenses, etc.) with that snapshot. This cannot be undone except by restoring a different backup. Are you sure?`)) return;
  // A restore wipes and replaces ALL current data - re-confirming the PIN
  // here is a deliberate second gate, separate from just being logged in as
  // Owner, so a wrong click can't wipe the fleet's data by accident.
  const pin = prompt("This will replace ALL current data. Re-enter your PIN to confirm the restore:");
  if(pin===null) return;
  try{
    const result = await api("/verify-pin", {method:"POST", body: JSON.stringify({pin})});
    if(!result.ok){ alert(result.error || "Incorrect PIN - restore cancelled."); return; }
  }catch(e){ alert(e.message || "Could not verify PIN - restore cancelled."); return; }
  try{
    await api(`/admin/backups/${id}/restore`, {method:"POST"});
    alert("Restored. Reloading the app now.");
    await boot();
  }catch(e){ alert(e.message); }
}

// ================= FULL DATA BACKUP DOWNLOAD (Owner, Operations Manager) =================
// Separate from the automatic Mongo snapshots above - this is a complete,
// downloadable export the Owner/Ops Manager take themselves roughly every
// 15 days and keep outside the app as an independent copy. Every download
// is logged so it's visible who took one and when.
const BACKUP_TARGET_DAYS = 15;
const BACKUP_REMINDER_AFTER_DAYS = 12;
function daysSinceIso(iso){
  if(!iso) return null;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}
async function fetchBackupHistory(){
  try{ return await api("/backup/history"); }catch(e){ return null; }
}
async function backupDownloadsScreen(){
  const history = await fetchBackupHistory();
  const rows = (history||[]).map(b=>`
    <tr>
      <td>${new Date(b.takenAt).toLocaleString()}</td>
      <td>${b.userName}</td>
      <td>${roleLabel(b.role)}</td>
    </tr>`).join("");
  const last = history && history[0];
  const days = last ? daysSinceIso(last.takenAt) : null;
  let statusHtml;
  if(days===null){
    statusHtml = `<div class="banner error">No full backup has ever been downloaded - please take one now.</div>`;
  } else if(days >= BACKUP_TARGET_DAYS){
    statusHtml = `<div class="banner error">It's been ${days} days since the last full backup (target: every ${BACKUP_TARGET_DAYS} days) - please download one now.</div>`;
  } else if(days >= BACKUP_REMINDER_AFTER_DAYS){
    statusHtml = `<div class="banner">It's been ${days} days since the last full backup - one is due soon (target: every ${BACKUP_TARGET_DAYS} days).</div>`;
  } else {
    statusHtml = `<div class="banner">Last full backup was ${days} day${days===1?'':'s'} ago - you're on schedule.</div>`;
  }
  return `
  <h1 class="page-title">Backup</h1>
  <div class="banner">Download a complete copy of all fleet data (vehicles, people, records, expenses, documents, everything) roughly every ${BACKUP_TARGET_DAYS} days and keep it somewhere outside the app - separate from the app's own automatic 30-day rolling snapshots.</div>
  <div class="card">
    ${statusHtml}
    <button class="btn" onclick="downloadFullBackup()">Download Full Backup</button>
  </div>
  <div class="card">
    <h2 class="section-title">Backup download history</h2>
    <table><tr><th>Taken</th><th>By</th><th>Role</th></tr>
    ${rows || "<tr><td colspan='3' class='empty'>No backups downloaded yet.</td></tr>"}
    </table>
  </div>
  ${currentUser.role==="owner" ? await backupsCardHtml() : ""}`;
}
async function downloadFullBackup(){
  try{
    const headers = {};
    if(authToken) headers["Authorization"] = "Bearer " + authToken;
    const res = await fetch(`${API}/backup/full`, {headers});
    if(!res.ok){
      const data = await res.json().catch(()=>({}));
      throw new Error(data.error || `Download failed (${res.status})`);
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `padmasri_backup_${todayStr()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    await renderMain();
  }catch(e){ alert(e.message); }
}
// Shared reminder banner shown at the top of both the Owner Dashboard and
// the Operations Manager's Operations screen - their two "home" views.
async function backupReminderBannerHtml(){
  const history = await fetchBackupHistory();
  if(history===null) return ""; // not visible to this role, or request failed - stay silent
  const last = history[0];
  const days = last ? daysSinceIso(last.takenAt) : null;
  if(days!==null && days < BACKUP_REMINDER_AFTER_DAYS) return "";
  const msg = days===null
    ? "No full data backup has ever been downloaded."
    : `It's been ${days} days since the last full data backup (target: every ${BACKUP_TARGET_DAYS} days).`;
  return `<div class="banner ${days!==null && days>=BACKUP_TARGET_DAYS ? 'error' : ''}" style="margin-bottom:14px;">
    ⏰ ${msg} <button class="btn small secondary" onclick="switchTab('backup')" style="margin-left:8px;">Go to Backup</button>
  </div>`;
}
function drawCharts(approved,pending,rejected,fails,passes){
  const f = document.getElementById("chartFunnel");
  const b = document.getElementById("chartBreath");
  if(!f || !b || typeof Chart==="undefined") return;
  if(f._chart) f._chart.destroy();
  if(b._chart) b._chart.destroy();
  f._chart = new Chart(f, {type:"bar", data:{labels:["Approved","Pending","Rejected"], datasets:[{data:[approved,pending,rejected], backgroundColor:["#1e8e3e","#b8860b","#c0392b"]}]}, options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
  b._chart = new Chart(b, {type:"doughnut", data:{labels:["Pass","Fail"], datasets:[{data:[passes,fails], backgroundColor:["#1e8e3e","#c0392b"]}]}});
}
