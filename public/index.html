<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Padmasri Travels - Fleet Supervisor App</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2B2E1F" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@1,500;1,600;1,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#2B2E1F; --accent:#4C6A2B; --accent-dark:#3A5220; --accent-light:#E9EDA8; --green:#2E7D32;
    --amber:#b8860b; --red:#c0392b; --grey:#6b6b5e; --bg:#FBF8E3; --card:#ffffff;
    --border:#ECE6C8; --purple:#6C63FF; --purple-dark:#4A43C7; --purple-light:#E7E5FF;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Poppins',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:#1a1a1a;}
  .accent-script{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:600;}
  #app{max-width:1180px;margin:0 auto;min-height:100vh;background:var(--bg);}
  header.topbar{background:var(--ink);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  header.topbar .brand{font-weight:700;font-size:17px;display:flex;align-items:center;gap:8px;}
  header.topbar .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent-light);display:inline-block;}
  header.topbar .who{font-size:13px;opacity:.9;text-align:right;}
  header.topbar button.logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;margin-left:10px;}
  header.topbar button.logout:hover{background:rgba(255,255,255,.28);}
  nav.tabbar{background:#20241A;display:flex;gap:2px;padding:0 16px;flex-wrap:wrap;}
  nav.tabbar button{background:transparent;border:none;color:#c7cba0;padding:11px 16px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  nav.tabbar button.active{color:#fff;border-bottom-color:var(--accent-light);font-weight:600;}
  /* Related tabs fold into a dropdown (see NAV_GROUPS) so the header never
     needs horizontal scrolling no matter how many tabs a role has. */
  nav.tabbar details.nav-group{position:relative;}
  nav.tabbar details.nav-group summary{list-style:none;cursor:pointer;color:#c7cba0;padding:11px 14px;font-size:13px;border-bottom:3px solid transparent;white-space:nowrap;user-select:none;display:flex;align-items:center;gap:5px;}
  nav.tabbar details.nav-group summary::-webkit-details-marker{display:none;}
  nav.tabbar details.nav-group summary.active,nav.tabbar details.nav-group[open] summary{color:#fff;}
  nav.tabbar details.nav-group summary.active{border-bottom-color:var(--accent-light);font-weight:600;}
  nav.tabbar .nav-caret{font-size:9px;opacity:.7;}
  nav.tabbar .nav-group-menu{position:absolute;top:100%;left:0;background:#20241A;border:1px solid rgba(255,255,255,.15);border-radius:0 0 10px 10px;min-width:200px;z-index:20;box-shadow:0 10px 24px rgba(0,0,0,.35);padding:4px;}
  nav.tabbar .nav-group-menu button{display:block;width:100%;text-align:left;padding:9px 12px;border-radius:6px;border-bottom:none;}
  nav.tabbar .nav-group-menu button:hover{background:rgba(255,255,255,.08);color:#fff;}
  nav.tabbar .nav-group-menu button.active{background:rgba(255,255,255,.12);}
  main{padding:18px 20px 60px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:16px;box-shadow:0 4px 14px rgba(43,46,31,.05);}
  h1.page-title{font-size:20px;margin:4px 0 16px;color:var(--ink);}
  h2.section-title{font-size:15px;margin:0 0 10px;color:var(--ink);border-bottom:2px solid var(--accent-light);padding-bottom:6px;}
  .grid{display:grid;gap:14px;}
  .grid.cols-4{grid-template-columns:repeat(4,1fr);}
  .grid.cols-3{grid-template-columns:repeat(3,1fr);}
  .grid.cols-2{grid-template-columns:repeat(2,1fr);}
  @media(max-width:900px){.grid.cols-4{grid-template-columns:repeat(2,1fr);}.grid.cols-3{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:600px){.grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr;}}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;}
  .kpi .num{font-size:26px;font-weight:700;color:var(--ink);}
  .kpi .label{font-size:12px;color:var(--grey);margin-top:2px;}
  .kpi.warn .num{color:var(--amber);}
  .kpi.bad .num{color:var(--red);}
  .kpi.good .num{color:var(--green);}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .badge.pending{background:#FBF3D6;color:var(--amber);}
  .badge.approved{background:#E9F3DC;color:var(--green);}
  .badge.rejected{background:#fbe4e1;color:var(--red);}
  .badge.pass{background:#E9F3DC;color:var(--green);}
  .badge.fail{background:#fbe4e1;color:var(--red);}
  .badge.ok{background:#E9F3DC;color:var(--green);}
  .badge.low{background:#fbe4e1;color:var(--red);}
  .badge.in_process{background:var(--purple-light);color:var(--purple-dark);}
  .badge.completed{background:#E9F3DC;color:var(--green);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  table th{text-align:left;background:var(--accent-light);color:var(--ink);padding:8px 10px;font-size:12px;}
  table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
  table tr:hover td{background:#FCFBF2;}
  .btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;}
  .btn:hover{background:var(--accent-dark);}
  .btn.secondary{background:#fff;color:var(--accent);border:1px solid var(--accent);}
  .btn.danger{background:var(--red);}
  .btn.small{padding:4px 10px;font-size:12px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .vehicle-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
  .vehicle-card{border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;background:#fff;}
  .vehicle-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(76,106,43,.12);}
  .vehicle-card .reg{font-weight:700;color:var(--ink);font-size:15px;}
  .vehicle-card .route{font-size:12px;color:var(--grey);margin:3px 0 8px;}
  .checklist-group{margin-bottom:18px;}
  .check-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F1ECD4;gap:10px;flex-wrap:wrap;}
  .check-row .label{font-size:13.5px;flex:1;min-width:180px;}
  .check-row .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  select,input[type=text],input[type=date],input[type=number],input[type=tel]{padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:13px;}
  .toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .toggle button{border:none;background:#fff;padding:5px 10px;font-size:12px;cursor:pointer;}
  .toggle button.active-ok{background:var(--green);color:#fff;}
  .toggle button.active-bad{background:var(--red);color:#fff;}
  .photo-btn{border:1px dashed #C9C2A0;background:#FCFBF2;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--accent);}
  .thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
  .thumbs img{width:44px;height:44px;object-fit:cover;border-radius:8px;border:1px solid var(--border);}
  .role-pick{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0;}
  .role-pick label{border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;font-size:13px;display:flex;flex-direction:column;gap:3px;}
  .role-pick label.sel{border-color:var(--accent);background:var(--accent-light);}
  .role-pick label span.small{color:var(--grey);font-size:11px;}
  .login-wrap{max-width:420px;margin:60px auto;}
  .login-wrap.wide{max-width:1080px;}
  .login-wrap .logo{text-align:center;font-size:22px;font-weight:800;color:var(--ink);margin-bottom:4px;}
  .login-wrap .sub{text-align:center;color:var(--grey);font-size:13px;margin-bottom:22px;}
  .portal-hero{background:linear-gradient(135deg,#20241A 0%,var(--ink) 45%,#3A5220 100%);border-radius:22px;padding:38px 30px 34px;margin-bottom:0;box-shadow:0 12px 34px rgba(43,46,31,.25);position:relative;overflow:hidden;}
  .portal-hero::before{content:"";position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(233,237,168,.25),transparent 70%);}
  .portal-hero::after{content:"";position:absolute;bottom:-80px;left:-40px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,.22),transparent 70%);}
  .portal-hero .logo{color:#fff;font-size:25px;position:relative;z-index:1;}
  .portal-hero .sub{color:#dfe3c2;margin-bottom:28px;position:relative;z-index:1;}
  .portal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;position:relative;z-index:1;}
  @media(max-width:900px){.portal-grid{grid-template-columns:1fr 1fr;}}
  @media(max-width:640px){.portal-grid{grid-template-columns:1fr;}}
  .portal-card{background:rgba(255,255,255,.97);border-radius:18px;padding:26px 22px;text-align:left;cursor:pointer;border:2px solid transparent;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;display:flex;flex-direction:column;gap:10px;}
  .portal-card:hover{transform:translateY(-4px);box-shadow:0 14px 30px rgba(0,0,0,.18);}
  .portal-card:active{transform:translateY(-1px);}
  .portal-card .portal-icon{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;}
  .portal-card.driver .portal-icon{background:linear-gradient(135deg,#f6a821,#c9720a);}
  .portal-card.staff .portal-icon{background:linear-gradient(135deg,var(--accent),var(--ink));}
  .portal-card.subvendor .portal-icon{background:linear-gradient(135deg,var(--purple),var(--purple-dark));}
  .portal-card .portal-title{font-size:18px;font-weight:800;color:var(--ink);}
  .portal-card .portal-desc{font-size:12.5px;color:var(--grey);line-height:1.5;}
  .portal-card .portal-cta{margin-top:auto;font-size:12.5px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:5px;}
  .portal-card.driver .portal-cta{color:#c9720a;}
  .portal-card.subvendor .portal-cta{color:var(--purple-dark);}
  .portal-card.driver:hover{border-color:#f6a821;}
  .portal-card.staff:hover{border-color:var(--accent);}
  .portal-card.subvendor:hover{border-color:var(--purple);}
  .portal-footnote{text-align:center;color:#a7ab86;font-size:11.5px;margin-top:20px;position:relative;z-index:1;}
  .portal-back{background:transparent;border:none;color:var(--accent);font-size:12.5px;cursor:pointer;padding:0 0 14px;display:flex;align-items:center;gap:4px;font-weight:600;}
  .portal-back:hover{text-decoration:underline;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--grey);margin-bottom:4px;}
  .field input,.field select{width:100%;}
  .banner{background:#FBF3D6;border:1px solid #EBDA9B;color:#7a5a00;padding:10px 14px;border-radius:10px;font-size:12.5px;margin-bottom:16px;}
  .banner.error{background:#fbe4e1;border-color:#eab3ab;color:#7a2115;}
  .muted{color:var(--grey);font-size:12px;}
  .flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .empty{text-align:center;color:var(--grey);padding:30px 10px;font-size:13px;}
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:900px){.charts-grid{grid-template-columns:1fr;}}
  .footer-note{font-size:11px;color:#9a9576;text-align:center;padding:20px;}
  .selfie-thumb{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
  .clock-btns{display:flex;gap:10px;flex-wrap:wrap;}
  .clock-status{padding:14px;border-radius:12px;background:var(--accent-light);font-size:13px;margin-bottom:14px;}
  form.inline-form{display:flex;gap:8px;flex-wrap:wrap;align-items:end;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);}
  form.inline-form .f{display:flex;flex-direction:column;gap:3px;}
  form.inline-form label{font-size:11px;color:var(--grey);}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* ---- Document scanner (auto edge-detect + perspective correct + PDF) ---- */
  .scanner-modal-backdrop{position:fixed;inset:0;background:rgba(20,20,20,.72);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;}
  .scanner-modal{background:#fff;border-radius:16px;padding:20px;max-width:440px;width:100%;max-height:88vh;overflow:auto;text-align:center;}
  .scanner-modal h3{margin:0 0 10px;font-size:16px;color:var(--ink);}
  .scanner-modal img{max-width:100%;max-height:52vh;border-radius:8px;border:1px solid var(--border);object-fit:contain;background:#eee;}
  .scanner-modal .muted{margin:10px 0;}
  .scanner-modal .btn-row{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
  /* ---- AI Assistant + command-center dashboard ---- */
  .ai-hero{background:linear-gradient(135deg,#20241A 0%,var(--ink) 45%,#3A2F6B 100%);border-radius:20px;padding:26px 26px 22px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden;box-shadow:0 12px 30px rgba(43,46,31,.22);}
  .ai-hero::before{content:"";position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,.35),transparent 70%);}
  .ai-hero::after{content:"";position:absolute;bottom:-70px;left:-30px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(233,237,168,.18),transparent 70%);}
  .ai-hero h1{margin:0 0 4px;font-size:19px;position:relative;z-index:1;}
  .ai-hero p{margin:0;color:#dcd9f7;font-size:12.5px;position:relative;z-index:1;}
  .ai-chat-window{display:flex;flex-direction:column;gap:10px;max-height:480px;overflow-y:auto;padding:4px 2px;margin-bottom:12px;}
  .ai-msg{max-width:82%;padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
  .ai-msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
  .ai-msg.assistant{align-self:flex-start;background:var(--purple-light);color:var(--ink);border-bottom-left-radius:4px;}
  .ai-msg .ai-tag{display:block;font-size:10.5px;font-weight:700;color:var(--purple-dark);margin-bottom:3px;letter-spacing:.03em;text-transform:uppercase;}
  .ai-tools-used{font-size:11px;color:var(--purple-dark);margin-top:6px;opacity:.85;}
  .ai-suggest-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .ai-suggest-chip{background:#fff;border:1px solid var(--purple);color:var(--purple-dark);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;}
  .ai-suggest-chip:hover{background:var(--purple-light);}
  .ai-input-row{display:flex;gap:8px;align-items:flex-end;}
  .ai-input-row textarea{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:12px;font-size:13.5px;font-family:inherit;resize:none;min-height:44px;max-height:120px;}
  .ai-input-row .btn{min-width:64px;height:44px;}
  .ai-insights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;}
  .ai-insight-card{border-left:4px solid var(--purple);background:#fff;border:1px solid var(--border);border-left-width:4px;border-radius:12px;padding:12px 14px;}
  .ai-insight-card.critical{border-left-color:var(--red);}
  .ai-insight-card.warning{border-left-color:var(--amber);}
  .ai-insight-card.good{border-left-color:var(--green);}
  .ai-insight-card.info{border-left-color:var(--purple);}
  .ai-insight-card .ai-insight-title{font-weight:700;font-size:13px;color:var(--ink);margin-bottom:3px;}
  .ai-insight-card .ai-insight-detail{font-size:12.5px;color:var(--grey);line-height:1.5;}
  .cmd-hero{background:linear-gradient(135deg,#20241A 0%,var(--ink) 55%,#3A5220 100%);border-radius:22px;padding:28px 26px 24px;margin-bottom:18px;color:#fff;position:relative;overflow:hidden;box-shadow:0 14px 34px rgba(43,46,31,.25);}
  .cmd-hero::before{content:"";position:absolute;top:-70px;right:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(233,237,168,.22),transparent 70%);}
  .cmd-hero::after{content:"";position:absolute;bottom:-90px;left:-50px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,.22),transparent 70%);}
  .cmd-hero-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;position:relative;z-index:1;}
  .cmd-hero h1{margin:0 0 4px;font-size:21px;}
  .cmd-hero .cmd-sub{color:#dfe3c2;font-size:12.5px;margin:0;}
  .cmd-score{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);border-radius:16px;padding:12px 18px;text-align:center;min-width:120px;}
  .cmd-score .cmd-score-num{font-size:30px;font-weight:800;line-height:1;}
  .cmd-score .cmd-score-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:#cfd3ac;margin-top:4px;}
  .cmd-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px;position:relative;z-index:1;}
  @media(max-width:900px){.cmd-kpi-row{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:600px){.cmd-kpi-row{grid-template-columns:1fr;}}
  .cmd-kpi{background:rgba(255,255,255,.94);border-radius:14px;padding:12px 14px;cursor:pointer;transition:transform .15s ease;}
  .cmd-kpi:hover{transform:translateY(-2px);}
  .cmd-kpi .num{font-size:22px;font-weight:800;color:var(--ink);}
  .cmd-kpi .label{font-size:11px;color:var(--grey);margin-top:2px;}
  .cmd-kpi.warn .num{color:var(--amber);}
  .cmd-kpi.bad .num{color:var(--red);}
  .cmd-kpi.good .num{color:var(--green);}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" multiple />
<input type="file" id="selfieInput" accept="image/*" capture="user" style="display:none" />
<input type="file" id="billInput" accept="image/*" capture="environment" style="display:none" />
<input type="file" id="scannerFileInput" accept="image/*" capture="environment" style="display:none" onchange="handleScannerFile(event)" />
<div id="scannerOverlay"></div>
<script>
/* =========================================================================
   FLEET SUPERVISOR APP - talks to the shared backend in server.js.
   Every screen reads/writes through fetch() calls to /api/* so that all
   users see the same data - this is the real, shareable version.
   ========================================================================= */

const API = "/api";
let authToken = localStorage.getItem("fleetAuthToken") || null;
let currentUser = null;
let meta = { clients: [], sites: [], drivers: [], users: [] };
let vehicles = [];
let records = {};
let odometerLogs = {};
let leaves = [];
let expenses = [];
let view = { tab: null, name: "home" };
let loading = false;
let lastError = "";
let loginPortal = null; // null = chooser screen, "staff" = staff/supervisor login form

// ---- AI Assistant (Owner only) ----
let aiChatHistory = []; // [{role:"user"|"assistant", content:string, toolsUsed?:string[]}]
let aiChatBusy = false;
let aiChatError = "";
let aiInsights = null; // {generatedAt, insights:[...]} once loaded
let aiInsightsLoading = false;
let aiInsightsError = "";
// Deliberately minimal - only used for the AI Assistant's own message
// bubbles, since that's the one place in the app where text can flow
// through an LLM (which might be asked to quote back other people's
// free-text data) before being rendered.
function aiEscapeHtml(str){
  return String(str==null?"":str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysUntil(dateStr){
  if(!dateStr) return 9999;
  const d = new Date(dateStr), n = new Date(todayStr());
  return Math.round((d-n)/86400000);
}

async function api(path, opts={}){
  const headers = Object.assign({"Content-Type":"application/json"}, opts.headers||{});
  if(authToken) headers["Authorization"] = "Bearer " + authToken;
  const res = await fetch(API+path, Object.assign({}, opts, {headers}));
  if(res.status === 401){
    doLogout(true);
    throw new Error("Session expired - please log in again.");
  }
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || ("Request failed ("+res.status+")"));
  return data;
}

function roleLabel(r){

// ================= DOCUMENT SCANNER =================
// Tap the camera icon -> take/pick a photo -> OpenCV.js finds the
// document's 4 edges automatically, perspective-corrects it into a clean
// top-down rectangle, and the result is turned into a one-page PDF for the
// user to confirm before it's uploaded. Fully automatic (no manual
// crop/straighten step) per an explicit product decision. Built as a
// generic reusable flow - openDocumentScanner(onConfirm) can be wired up
// to any upload spot in the app, first used for the Workshop bulk-purchase
// invoice upload. Both OpenCV.js and jsPDF are loaded lazily from a CDN
// only the first time the scanner is actually used, so they never slow
// down normal app loads.
let _cvLoadPromise = null;
function ensureOpenCvLoaded(){
  if(window.cv && window.cv.Mat) return Promise.resolve();
  if(_cvLoadPromise) return _cvLoadPromise;
  _cvLoadPromise = new Promise((resolve, reject)=>{
    const script = document.createElement("script");
    script.src = "https://docs.opencv.org/4.9.0/opencv.js";
    script.async = true;
    script.onload = ()=>{
      const waitReady = ()=>{
        if(window.cv && window.cv.Mat) resolve();
        else if(window.cv && "onRuntimeInitialized" in window.cv) window.cv.onRuntimeInitialized = resolve;
        else setTimeout(waitReady, 50);
      };
      waitReady();
    };
    script.onerror = ()=>{ _cvLoadPromise = null; reject(new Error("Could not load the document scanner. Check your internet connection and try again.")); };
    document.head.appendChild(script);
  });
  return _cvLoadPromise;
}
let _jsPdfLoadPromise = null;
function ensureJsPdfLoaded(){
  if(window.jspdf && window.jspdf.jsPDF) return Promise.resolve();
  if(_jsPdfLoadPromise) return _jsPdfLoadPromise;
  _jsPdfLoadPromise = new Promise((resolve, reject)=>{
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    script.onload = resolve;
    script.onerror = ()=>{ _jsPdfLoadPromise = null; reject(new Error("Could not load the PDF generator. Check your internet connection and try again.")); };
    document.head.appendChild(script);
  });
  return _jsPdfLoadPromise;
}
function loadImageFromFile(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>resolve(img);
      img.onerror = ()=>reject(new Error("Could not read that photo - please try again."));
      img.src = reader.result;
    };
    reader.onerror = ()=>reject(new Error("Could not read that photo - please try again."));
    reader.readAsDataURL(file);
  });
}
// Orders 4 arbitrary corner points as [top-left, top-right, bottom-right,
// bottom-left] - required because approxPolyDP returns them in whatever
// order it traced the contour, not a consistent one.
function orderScanCorners(pts){
  const bySum = pts.slice().sort((a,b)=> (a.x+a.y)-(b.x+b.y));
  const tl = bySum[0], br = bySum[3];
  const byDiff = pts.slice().sort((a,b)=> (a.x-a.y)-(b.x-b.y));
  const bl = byDiff[0], tr = byDiff[3];
  return [tl, tr, br, bl];
}
// The core auto-scan: grayscale -> blur -> edge detect -> find the
// largest 4-sided contour -> perspective-warp it flat. Falls back to using
// the whole photo (no crop) if no confident document edge is found, so the
// feature never dead-ends the user - it just skips the auto-crop step.
function autoScanImageToCanvas(imgEl){
  const cv = window.cv;
  const src = cv.imread(imgEl);
  const toDelete = [src];
  try{
    const ratio = Math.min(1, 1000 / src.cols);
    const resized = new cv.Mat(); toDelete.push(resized);
    cv.resize(src, resized, new cv.Size(Math.round(src.cols*ratio), Math.round(src.rows*ratio)), 0, 0, cv.INTER_AREA);

    const gray = new cv.Mat(); toDelete.push(gray);
    cv.cvtColor(resized, gray, cv.COLOR_RGBA2GRAY);
    const blurred = new cv.Mat(); toDelete.push(blurred);
    cv.GaussianBlur(gray, blurred, new cv.Size(5,5), 0);
    const edged = new cv.Mat(); toDelete.push(edged);
    cv.Canny(blurred, edged, 50, 150);
    const kernel = cv.Mat.ones(3,3,cv.CV_8U); toDelete.push(kernel);
    const dilated = new cv.Mat(); toDelete.push(dilated);
    cv.dilate(edged, dilated, kernel);

    const contours = new cv.MatVector();
    const hierarchy = new cv.Mat(); toDelete.push(hierarchy);
    cv.findContours(dilated, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

    let bestApprox = null, bestArea = 0;
    for(let i=0;i<contours.size();i++){
      const cnt = contours.get(i);
      const peri = cv.arcLength(cnt, true);
      const approx = new cv.Mat();
      cv.approxPolyDP(cnt, approx, 0.02*peri, true);
      if(approx.rows===4){
        const area = cv.contourArea(approx);
        if(area > bestArea && area > 0.15 * resized.cols * resized.rows){
          bestArea = area;
          if(bestApprox) bestApprox.delete();
          bestApprox = approx;
        } else approx.delete();
      } else approx.delete();
      cnt.delete();
    }
    contours.delete();

    let corners;
    if(bestApprox){
      const pts = [];
      for(let i=0;i<4;i++) pts.push({x: bestApprox.intPtr(i,0)[0]/ratio, y: bestApprox.intPtr(i,0)[1]/ratio});
      bestApprox.delete();
      corners = orderScanCorners(pts);
    } else {
      corners = [{x:0,y:0},{x:src.cols,y:0},{x:src.cols,y:src.rows},{x:0,y:src.rows}];
    }

    const [tl,tr,br,bl] = corners;
    const maxWidth = Math.max(Math.hypot(br.x-bl.x, br.y-bl.y), Math.hypot(tr.x-tl.x, tr.y-tl.y));
    const maxHeight = Math.max(Math.hypot(tr.x-br.x, tr.y-br.y), Math.hypot(tl.x-bl.x, tl.y-bl.y));

    const srcTri = cv.matFromArray(4,1,cv.CV_32FC2,[tl.x,tl.y, tr.x,tr.y, br.x,br.y, bl.x,bl.y]); toDelete.push(srcTri);
    const dstTri = cv.matFromArray(4,1,cv.CV_32FC2,[0,0, maxWidth,0, maxWidth,maxHeight, 0,maxHeight]); toDelete.push(dstTri);
    const M = cv.getPerspectiveTransform(srcTri, dstTri); toDelete.push(M);
    const dst = new cv.Mat(); toDelete.push(dst);
    cv.warpPerspective(src, dst, M, new cv.Size(maxWidth, maxHeight));

    const outCanvas = document.createElement("canvas");
    cv.imshow(outCanvas, dst);
    return outCanvas;
  } finally {
    toDelete.forEach(m=>{ try{ m.delete(); }catch(e){} });
  }
}
async function canvasToPdfDataUrl(canvas){
  await ensureJsPdfLoaded();
  const { jsPDF } = window.jspdf;
  const imgData = canvas.toDataURL("image/jpeg", 0.85);
  const pxToMm = px => px * 0.264583; // ~96dpi assumption - fine for a fit-to-image single-page PDF
  const w = Math.max(10, pxToMm(canvas.width)), h = Math.max(10, pxToMm(canvas.height));
  const doc = new jsPDF({orientation: w>h?"l":"p", unit:"mm", format:[w,h]});
  doc.addImage(imgData, "JPEG", 0, 0, w, h);
  return doc.output("datauristring");
}
let scannerOnConfirm = null;
let scannerCanvas = null;
// Entry point: pass a callback that receives the final PDF data URL once
// the user confirms the scan looks right.
function openDocumentScanner(onConfirm){
  scannerOnConfirm = onConfirm;
  document.getElementById("scannerFileInput").click();
}
async function handleScannerFile(e){
  const file = e.target.files[0];
  e.target.value = "";
  if(!file) return;
  renderScannerModal("loading", "Reading photo...");
  try{
    const imgEl = await loadImageFromFile(file);
    renderScannerModal("loading", "Loading scanner engine (first time only, may take a moment)...");
    await ensureOpenCvLoaded();
    renderScannerModal("loading", "Detecting document edges...");
    await new Promise(r=>setTimeout(r, 30)); // let the loading message paint before the CPU-heavy scan
    scannerCanvas = autoScanImageToCanvas(imgEl);
    renderScannerModal("preview");
  }catch(err){
    renderScannerModal("error", err.message || "Could not scan this photo.");
  }
}
function closeScannerModal(){
  scannerOnConfirm = null;
  scannerCanvas = null;
  document.getElementById("scannerOverlay").innerHTML = "";
}
function retakeScan(){
  scannerCanvas = null;
  document.getElementById("scannerOverlay").innerHTML = "";
  document.getElementById("scannerFileInput").click();
}
async function confirmScan(){
  if(!scannerCanvas) return;
  renderScannerModal("loading", "Creating PDF...");
  try{
    const pdfDataUrl = await canvasToPdfDataUrl(scannerCanvas);
    const cb = scannerOnConfirm;
    closeScannerModal();
    if(cb) cb(pdfDataUrl);
  }catch(err){
    renderScannerModal("error", err.message || "Could not create the PDF.");
  }
}
function renderScannerModal(state, message){
  const overlay = document.getElementById("scannerOverlay");
  if(!overlay) return;
  if(state==="loading"){
    overlay.innerHTML = `<div class="scanner-modal-backdrop"><div class="scanner-modal">
      <h3>Scanning Document</h3>
      <div class="spinner" style="width:26px;height:26px;border-width:3px;"></div>
      <p class="muted">${message||""}</p>
    </div></div>`;
  } else if(state==="preview"){
    overlay.innerHTML = `<div class="scanner-modal-backdrop"><div class="scanner-modal">
      <h3>Does this look right?</h3>
      <img src="${scannerCanvas.toDataURL('image/jpeg',0.85)}" />
      <p class="muted">The edges were detected and straightened automatically. Retake if the crop looks wrong.</p>
      <div class="btn-row">
        <button class="btn secondary" onclick="retakeScan()">Retake</button>
        <button class="btn" onclick="confirmScan()">Looks Good - Use This</button>
      </div>
    </div></div>`;
  } else if(state==="error"){
    overlay.innerHTML = `<div class="scanner-modal-backdrop"><div class="scanner-modal">
      <h3>Couldn't Scan That</h3>
      <p class="muted">${message||""}</p>
      <div class="btn-row">
        <button class="btn secondary" onclick="closeScannerModal()">Cancel</button>
        <button class="btn" onclick="retakeScan()">Try Again</button>
      </div>
    </div></div>`;
  } else {
    overlay.innerHTML = "";
  }
}

// Everyone signs in with their email address (or, if they don't have one,
// their mobile number) plus their own password - no more picking your name
// off a shared list. Mirrors the server's passwordPolicyError() exactly so
// the person sees the same rule in the same words, whether typing it here
// or in the mandatory change-password screen after logging in.
const PASSWORD_MIN_LENGTH = 9;
function passwordPolicyError(password){
  if(!password || password.length < PASSWORD_MIN_LENGTH) return `Password must be more than 8 characters (at least ${PASSWORD_MIN_LENGTH}).`;
  if(!/[a-zA-Z]/.test(password)) return "Password must include at least one letter.";
  if(!/[0-9]/.test(password)) return "Password must include at least one number.";
  if(!/[^a-zA-Z0-9]/.test(password)) return "Password must include at least one symbol (e.g. ! @ # $ %).";
  return null;
}

  return `<div class="muted" style="margin-top:4px;">Strong password: more than 8 characters, with letters, numbers and symbols - and different from any password you've used before.</div>`;
}

// Same form and validation used two ways: (1) mandatory, full-page, and
// blocking (renderForcedPasswordChange - first login or right after an
// Owner reset, server-enforced so there's no way to skip it), and (2)
// voluntary, reached via the "Change Password" button in the header at
// any time (changePasswordScreen, part of the normal tab-routed app).

  return `

    </div>
    <div class="field">

async function renderForcedPasswordChange(){
  const app = document.getElementById("app");
  app.innerHTML = `
  <div class="login-wrap">
    <div class="logo">🧭 Padmasri Travels</div>
    <div class="sub">Set a new password to continue</div>

      <button class="btn" style="width:100%" onclick="submitForcedPasswordChange()" id="forcedPwBtn">Set New Password</button>

async function submitForcedPasswordChange(){
  pwChangeError = "";
  const currentPassword = document.getElementById("forcedCurrent").value;
  const newPassword = document.getElementById("forcedNew").value;
  const confirm = document.getElementById("forcedConfirm").value;
  if(newPassword !== confirm){ pwChangeError = "New password and confirmation don't match."; renderForcedPasswordChange(); return; }
  const policyErr = passwordPolicyError(newPassword);
  if(policyErr){ pwChangeError = policyErr; renderForcedPasswordChange(); return; }
  const btn = document.getElementById("forcedPwBtn");
  btn.disabled = true; btn.textContent = "Saving...";
  try{

  }catch(e){
    pwChangeError = e.message;

}

// Tabs that belong together get folded into one dropdown so the header
// never needs horizontal scrolling, no matter how many tabs a role has
// (Owner has the most - 15 flat tabs used to overflow the bar). Any tab
// not listed in a group (a role's main/home screen, plus AI Assistant)
// stays as its own top-level button so it's never buried a click deeper.
// Built once, shared by every role - a role simply won't render a group
// that has none of its tabs in it.
const NAV_GROUPS = [
  { key:"trips_vehicles", icon:"🚐", label:"Trips & Vehicles", tabs:["trips","usage","assignments","routes","subvendor_expenses"] },
  { key:"verification", icon:"🛠️", label:"Verification & Repairs", tabs:["odometer_verify","repairs","workshop"] },
  { key:"money", icon:"💰", label:"Money", tabs:["expenses","expenses_view","my_expenses","payroll","subvendors","reports","backup"] },
  { key:"people", icon:"👥", label:"People", tabs:["people","attendance","my_attendance"] },
  { key:"admin", icon:"📋", label:"Admin", tabs:["audit"] },
];
function navBarHtml(tabs){
  const tabMap = new Map(tabs); // key -> label, and lets us know which keys actually exist for this role
  const grouped = new Set();
  const groupsHtml = NAV_GROUPS.map(g=>{
    const items = g.tabs.filter(k=>tabMap.has(k));
    if(!items.length) return "";
    items.forEach(k=>grouped.add(k));
    const isActive = items.includes(view.tab);
    return `<details class="nav-group" name="ownerNav">
      <summary class="${isActive?'active':''}">${g.icon} ${g.label} <span class="nav-caret">&#9662;</span></summary>
      <div class="nav-group-menu">
        ${items.map(k=>`<button class="${view.tab===k?'active':''}" onclick="switchTab('${k}')">${tabMap.get(k)}</button>`).join("")}
      </div>
    </details>`;
  }).join("");
  const standaloneHtml = tabs.filter(([k])=>!grouped.has(k)).map(([k,l])=>`<button class="${view.tab===k?'active':''}" onclick="switchTab('${k}')">${l}</button>`).join("");
  return standaloneHtml + groupsHtml;
}
async function render(){
  const app = document.getElementById("app");
  const u = currentUser;
  const tabs = tabsFor(u.role);
  app.innerHTML = `
    <header class="topbar">
      <div class="brand"><span class="dot"></span> Padmasri <span class="accent-script">Travels</span></div>
      <div style="display:flex;align-items:center;">
        <div class="who">${u.name}<br><span style="opacity:.75">${roleLabel(u.role)}</span></div>
        <button class="btn small secondary" style="margin-right:8px;" onclick="goto('change_password')">Change Password</button>
        <button class="logout" onclick="doLogout()">Log out</button>
      </div>
    </header>
    <nav class="tabbar">
      ${navBarHtml(tabs)}
    </nav>
    <main id="main"><div class="empty">Loading...</div></main>
    <div class="footer-note">Shared data - everyone signed into this app sees the same fleet records.</div>
  `;
  await renderMain();
}
async function switchTab(tab){ view = {tab, name:"home"}; ownerAssignUnlocked = false; assignmentsViewDate = todayStr(); await render(); window.scrollTo(0,0); }
async function goto(name, params){ view = Object.assign({tab: view.tab}, {name}, params||{}); await renderMain(); window.scrollTo(0,0); }

async function renderMain(){
  const main = document.getElementById("main");
  try{
    main.innerHTML = await routeView();
  }catch(e){
    main.innerHTML = `<div class="banner error">${e.message}</div>`;
  }
}

// ================= VEHICLE USAGE (Site Supervisor, Area Supervisor, Bookings Department) =================
// A lighter-weight editor than the full Assignments screen - these three
// roles can flip a vehicle's Usage (Fixed / Client on demand / Booking)
// without touching site/driver/client assignment, which stays restricted
// to Operations Manager, Data Team and (password-gated) Owner.
const USAGE_LABELS = {fixed_route:"Fixed Route", client_on_demand:"Client on demand", booking:"Booking"};
// Recorded whenever fuel is filled, so the day's total spend can be broken
// out by station brand and by how it was paid for.
const FUEL_STATIONS = ["IOCL","BPCL","HPCL","Other"];
const FUEL_PAYMENT_MODES = ["Cash","UPI","Card","Other"];
function vehicleUsageScreen(){
  const rows = vehicles.map(v=>`
    <tr>
      <td><b>${v.reg}</b></td>
      <td>${v.route || siteName(v.siteId)}</td>
      <td>${v.clientId? clientName(v.clientId) : '-'}</td>
      <td>${driverName(v.driverId)}</td>
      <td>
        <select onchange="setVehicleUsage('${v.id}', this.value)">
          ${Object.entries(USAGE_LABELS).map(([val,label])=>`<option value="${val}" ${v.usage===val?'selected':''}>${label}</option>`).join("")}
        </select>
      </td>
    </tr>`).join("");
  return `
  <h1 class="page-title">Vehicle Usage</h1>
  <div class="banner">Set whether each vehicle runs a Fixed route, is used Client on demand, or is a Booking. Other vehicle/route/assignment details are managed by Operations Manager.</div>
  <div class="card">
    <table><tr><th>Vehicle</th><th>Route/Site</th><th>Client</th><th>Driver</th><th>Usage</th></tr>
    ${rows || "<tr><td colspan='5' class='empty'>No vehicles visible to you yet.</td></tr>"}
    </table>
  </div>`;
}
async function setVehicleUsage(vehicleId, usage){
  try{
    const v = await api(`/vehicles/${vehicleId}/usage`, {method:"PATCH", body: JSON.stringify({usage})});
    const idx = vehicles.findIndex(x=>x.id===vehicleId); if(idx>-1) vehicles[idx] = v;
  }catch(e){ alert(e.message); await renderMain(); }
}

// ================= SITE SUPERVISOR =================
function supervisorHome(){

  const cards = mine.map(v=>{

    return `<div class="vehicle-card" onclick="goto('vehicle_detail',{vehicleId:'${v.id}'})">

// in-memory draft for the vehicle currently being edited (not saved until Submit)
let draft = null;
function ensureDraft(vehicleId){
  if(draft && draft.vehicleId === vehicleId) return draft;
  const existing = records[vehicleId];
  // Merge onto the defaults (rather than replacing wholesale) so a record
  // that's missing a key - e.g. one saved through a partial/older API call -
  // can't crash the checklist screen with "Cannot read properties of undefined".
  const defaultSafety = {
    fireExtinguisher:{present:true, expiry:""}, firstAid:{present:true}, stepney:{present:true},
    jack:{present:true}, jackRod:{present:true}, wheelSpanner:{present:true}, chargingSockets:{present:true},
  };
  const defaultCondition = {
    suspension:"ok", seatCovers:"ok", curtains:"ok", seatPushBack:"ok", batteryWater:"ok", engineOil:"ok", coolant:"ok", airPressure:"ok", tyreWear:"ok",
  };
  draft = {
    vehicleId,
    safety: Object.assign({}, defaultSafety, (existing && existing.safety) ? JSON.parse(JSON.stringify(existing.safety)) : {}),
    condition: Object.assign({}, defaultCondition, (existing && existing.condition) ? JSON.parse(JSON.stringify(existing.condition)) : {}),
    photoTags: {},
    breathalyzer: Object.assign({driver:"", reading:"0.00", result:"pass"}, (existing && existing.breathalyzer) || {}),
    attendance: Object.assign({
      driver:"", status:"present", uniform:"compliant",
      tempDriver: {arranged:false, name:"", phone:"", upiId:"", amount:""},
    }, (existing && existing.attendance) || {}),
    fuel: {odometer:"", fuelPrice:"", litres:"", fillLevel:"full", station:"", paymentMode:""},
  };
  return draft;
}

// Day-start / day-close odometer - separate from the fuel checklist above,
// saved immediately (like clock in/out) rather than held in the draft, so a
// supervisor can log the start reading in the morning and the close reading
// in the evening without redoing the whole vehicle checklist.
function dayOdometerCard(vehicleId){
  const log = odometerLogs[vehicleId] || {};
  const start = log.dayStart;
  const close = log.dayClose;
  return `
  <div class="card">
    <h2 class="section-title">Day Odometer Readings</h2>
    <p class="muted">Log the odometer at the start of the day (before the vehicle goes out) and again at the close of the day - separate from the fuel entry above.</p>
    <div class="check-row">
      <div class="label">Day start (km)</div>
      <div class="controls">
        ${start
          ? `<span class="badge ok">${start.value} km · ${new Date(start.ts).toLocaleTimeString()}</span>`
          : `<input type="number" id="odoStart_${vehicleId}" style="width:100px" placeholder="e.g. 45260" />
             <button class="btn small" onclick="saveOdometer('${vehicleId}','start')">Save</button>`}
      </div>
    </div>
    <div class="check-row">
      <div class="label">Day close (km)</div>
      <div class="controls">
        ${close
          ? `<span class="badge ok">${close.value} km · ${new Date(close.ts).toLocaleTimeString()}</span>`
          : `<input type="number" id="odoClose_${vehicleId}" style="width:100px" placeholder="e.g. 45310" />
             <button class="btn small" onclick="saveOdometer('${vehicleId}','close')">Save</button>`}
      </div>
    </div>
  </div>`;
}
async function saveOdometer(vehicleId, type){
  const input = document.getElementById(type==="start" ? `odoStart_${vehicleId}` : `odoClose_${vehicleId}`);
  const value = input ? input.value : "";
  if(value === "" || Number(value) < 0){ alert("Enter a valid odometer reading."); return; }
  try{
    const entry = await api(`/odometer/${vehicleId}/${type}`, {method:"POST", body: JSON.stringify({value})});
    odometerLogs[vehicleId] = entry;
    await renderMain();
  }catch(e){ alert(e.message); }
}

function vehicleChecklistScreen(vehicleId){
  const v = vehicles.find(x=>x.id===vehicleId);
  if(!v) return "<div class='empty'>Vehicle not found.</div>";
  const d = ensureDraft(vehicleId);
  const existingRec = records[vehicleId];
  if(!d.breathalyzer.driver) d.breathalyzer.driver = driverName(v.driverId);
  if(!d.attendance.driver) d.attendance.driver = driverName(v.driverId);

  const docsRows = Object.entries(v.docs||{}).map(([k,doc])=>{
    const dleft = daysUntil(doc.expiry);
    const cls = (dleft < 15) ? 'low' : 'ok';
    return `<div class="check-row">
      <div class="label"><b>${k}</b> - ${doc.number||'(no number on file)'}</div>
      <div class="controls">
        <input type="date" value="${doc.expiry||''}" onchange="updateDoc('${vehicleId}','${k}',this.value)" />
        <span class="badge ${cls}">${doc.expiry? (dleft<0? 'EXPIRED' : dleft+' days left') : 'not set'}</span>
      </div>
    </div>`;
  }).join("");

  const safetyRows = [
    ["fireExtinguisher","Fire Extinguisher (present + validity)"],["firstAid","First Aid Kit"],["stepney","Stepney (spare tyre)"],
    ["jack","Jack"],["jackRod","Jack Rod"],["wheelSpanner","Wheel Spanner"],["chargingSockets","Charging Sockets"],
  ].map(([key,label])=>{
    const present = d.safety[key].present;
    return `<div class="check-row">
      <div class="label">${label}</div>
      <div class="controls">
        <div class="toggle">
          <button class="${present? 'active-ok':''}" onclick="draftSet('safety.${key}.present', true)">Present</button>
          <button class="${!present? 'active-bad':''}" onclick="draftSet('safety.${key}.present', false)">Missing</button>
        </div>

        ${photoButton(key)}
      </div>
    </div>`;
  }).join("");

  const condRows = [
    ["suspension","Suspension","ok","attention"],["seatCovers","Seat Covers","ok","worn"],["curtains","Curtains","ok","damaged"],
    ["seatPushBack","Seat Push-Back (all seats)","ok","attention"],["batteryWater","Battery Water","ok","low"],
    ["engineOil","Engine Oil","ok","low"],["coolant","Coolant","ok","low"],["airPressure","Air Pressure (all tyres)","ok","low"],["tyreWear","Tyre Wear & Tear","ok","attention"],
  ].map(([key,label,goodV,badV])=>{
    const val = d.condition[key];
    return `<div class="check-row">
      <div class="label">${label}</div>
      <div class="controls">
        <div class="toggle">
          <button class="${val===goodV?'active-ok':''}" onclick="draftSet('condition.${key}','${goodV}')">${goodV}</button>
          <button class="${val===badV?'active-bad':''}" onclick="draftSet('condition.${key}','${badV}')">${badV}</button>
        </div>
        ${photoButton(key)}
      </div>
    </div>`;
  }).join("");

  const statusBadge = existingRec ? `<span class="badge ${existingRec.verification.status}">${existingRec.verification.status.toUpperCase()} (today, already submitted - resubmitting will update it)</span>` : `<span class="badge pending">NOT SUBMITTED YET TODAY</span>`;

  return `
  <button class="btn secondary small" onclick="goto('list')">&larr; Back to vehicles</button>
  <h1 class="page-title">${v.reg} <span class="muted" style="font-size:13px;">· ${v.route || siteName(v.siteId)} · Driver: ${driverName(v.driverId)}</span></h1>
  ${statusBadge}
  ${existingRec && existingRec.verification.comment ? `<div class="banner" style="margin-top:10px;">Area Supervisor note: "${existingRec.verification.comment}"</div>` : ""}

  ${dayOdometerCard(vehicleId)}

  <div class="card checklist-group"><h2 class="section-title">1. Vehicle Documents</h2>${docsRows}</div>
  <div class="card checklist-group"><h2 class="section-title">2. Safety Equipment</h2>${safetyRows}</div>
  <div class="card checklist-group">
    <h2 class="section-title">3. Vehicle Condition</h2>${condRows}
    <div class="check-row">
      <div class="label">Full vehicle photos (exterior 4 angles + interior)</div>
      <div class="controls">${photoButton("full")} <span class="thumbs">${(d.photoTags.full||[]).map(s=>`<img src="${s}"/>`).join("")}</span></div>
    </div>
  </div>

  <div class="card">
    <h2 class="section-title">4. Breathalyzer Test</h2>
    <div class="check-row">
      <div class="label">Driver / Reading (mg/L)</div>
      <div class="controls">
        <input type="text" value="${d.breathalyzer.driver}" style="width:110px" onchange="draftSet('breathalyzer.driver', this.value)" />
        <input type="number" step="0.01" value="${d.breathalyzer.reading}" style="width:80px" onchange="updateBreathalyzer(this.value)" />
        <span class="badge ${d.breathalyzer.result}">${d.breathalyzer.result.toUpperCase()}</span>

  <div class="card">
    <h2 class="section-title">5. Attendance & Uniform</h2>
    <div class="check-row">
      <div class="label">Attendance</div>

        <button class="${d.attendance.status==='absent'?'active-bad':''}" onclick="draftSet('attendance.status','absent')">Absent</button>
      </div></div>
    </div>
    <div class="check-row">
      <div class="label">Uniform</div>
      <div class="controls"><div class="toggle">
        <button class="${d.attendance.uniform==='compliant'?'active-ok':''}" onclick="draftSet('attendance.uniform','compliant')">Compliant</button>
        <button class="${d.attendance.uniform==='non_compliant'?'active-bad':''}" onclick="draftSet('attendance.uniform','non_compliant')">Non-compliant</button>

    </div>
    ${d.attendance.status==='absent' ? tempDriverRows(d) : ""}

  <div class="card">
    <h2 class="section-title">6. Fuel & Mileage</h2>
    <div class="muted" style="margin-bottom:6px;">Last recorded odometer: <b>${v.lastOdometer != null ? v.lastOdometer+' km' : 'not set yet'}</b>. Mileage is calculated automatically from the distance since then.</div>

    <div class="check-row"><div class="label">Fuel price (₹/litre)</div><div class="controls"><input type="number" step="0.1" value="${d.fuel.fuelPrice}" style="width:90px" onchange="draftSet('fuel.fuelPrice', this.value)" /></div></div>
    <div class="check-row"><div class="label">Litres filled</div><div class="controls"><input type="number" step="0.1" value="${d.fuel.litres}" style="width:80px" onchange="draftSet('fuel.litres', this.value)" /></div></div>
    ${Number(d.fuel.litres)>0 ? `
    <div class="check-row"><div class="label">Fuel station</div><div class="controls">
      <select onchange="draftSet('fuel.station', this.value)">
        <option value="">- select -</option>
        ${FUEL_STATIONS.map(s=>`<option value="${s}" ${d.fuel.station===s?'selected':''}>${s}</option>`).join("")}
      </select>
    </div></div>
    <div class="check-row"><div class="label">Payment mode</div><div class="controls">
      <select onchange="draftSet('fuel.paymentMode', this.value)">
        <option value="">- select -</option>
        ${FUEL_PAYMENT_MODES.map(p=>`<option value="${p}" ${d.fuel.paymentMode===p?'selected':''}>${p}</option>`).join("")}
      </select>
    </div></div>` : ""}
    <div class="check-row"><div class="label">Tank filled to</div><div class="controls">
      <select onchange="draftSet('fuel.fillLevel', this.value)">
        <option value="full" ${d.fuel.fillLevel==='full'?'selected':''}>Full tank</option>
        <option value="half" ${d.fuel.fillLevel==='half'?'selected':''}>Half tank</option>
        <option value="quarter" ${d.fuel.fillLevel==='quarter'?'selected':''}>Quarter tank</option>

      </select>
    </div></div>
    <div class="check-row">
      <div class="label">Fuel receipt photo ${Number(d.fuel.litres)>0 ? '<b style="color:var(--danger,#c0392b)">(required - fuel was filled)</b>' : '(only needed if you fill fuel)'}</div>
      <div class="controls">${photoButton("fuelReceipt")} <span class="thumbs">${(d.photoTags.fuelReceipt||[]).map(s=>`<img src="${s}"/>`).join("")}</span></div>
    </div>
    <div class="muted">Distance and average mileage will be calculated by the server when you submit, and you'll be warned here if it's below standard.</div>
  </div>

  <div class="flex-between" style="margin-top:10px;">
    <span class="muted">Submitting sends this vehicle's record for verification.</span>
    <button class="btn" id="submitBtn" onclick="submitVehicle('${vehicleId}')">Submit for verification</button>
  </div>
  `;
}
function draftSet(path, value){
  const parts = path.split(".");
  let obj = draft;
  for(let i=0;i<parts.length-1;i++) obj = obj[parts[i]];
  obj[parts[parts.length-1]] = value;
  renderMain();
}
// Shown when a driver is marked Absent - lets the supervisor record a paid
// temporary replacement. If an amount is entered, submitting the checklist
// automatically raises an expense request for that amount under this
// supervisor's name, tagged with which regular driver it's covering for, so
// Operations/Data Team/Owner know to deduct it from that driver's pay.
function tempDriverRows(d){
  const t = d.attendance.tempDriver;
  return `
  <div class="check-row">
    <div class="label">Temporary driver arranged &amp; paid today?</div>
    <div class="controls"><div class="toggle">
      <button class="${!t.arranged?'active-ok':''}" onclick="draftSet('attendance.tempDriver.arranged', false)">No</button>
      <button class="${t.arranged?'active-bad':''}" onclick="draftSet('attendance.tempDriver.arranged', true)">Yes</button>
    </div></div>
  </div>
  ${t.arranged ? `
  <div class="check-row"><div class="label">Temporary driver name</div><div class="controls"><input type="text" value="${t.name}" style="width:160px" onchange="draftSet('attendance.tempDriver.name', this.value)" /></div></div>

function photoButton(tag){

let photoTargetTag = null;
function startPhotoCapture(tag){ photoTargetTag = tag; document.getElementById("photoInput").click(); }
document.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById("photoInput").addEventListener("change", handlePhotoFiles);
  document.getElementById("selfieInput").addEventListener("change", handleSelfieFile);
  document.getElementById("billInput").addEventListener("change", handleBillFile);
});
function handlePhotoFiles(e){
  const files = Array.from(e.target.files||[]);
  if(!files.length || !draft) return;
  draft.photoTags[photoTargetTag] = draft.photoTags[photoTargetTag] || [];
  let remaining = files.length;
  files.forEach(f=>{
    downscaleImage(f, 480, 0.7, (dataUrl)=>{
      draft.photoTags[photoTargetTag].push(dataUrl);
      remaining--;
      if(remaining===0) renderMain();
    });
  });
  e.target.value = "";
}
function downscaleImage(file, maxW, quality, cb){
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement("canvas");
      canvas.width = img.width*scale; canvas.height = img.height*scale;
      canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
      cb(canvas.toDataURL("image/jpeg",quality));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function handleSelfieFile(e){
  const file = e.target.files[0];
  e.target.value = "";

  downscaleImage(file, 360, 0.7, (selfieDataUrl)=>{
    if(!navigator.geolocation){
      completeClock(clockTargetType, selfieDataUrl, null, null);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos)=> completeClock(clockTargetType, selfieDataUrl, pos.coords.latitude, pos.coords.longitude),
      ()=>{ if(confirm("Could not get your location (permission denied or unavailable). Continue without location?")) completeClock(clockTargetType, selfieDataUrl, null, null); },
      {enableHighAccuracy:true, timeout:10000}
    );
  });
}
async function completeClock(type, selfie, lat, lng){
  try{

    if(entry.withinGeofence===false) msg += " Note: you appear to be away from your assigned site.";
    alert(msg);
    await renderMain();
  }catch(e){ alert(e.message); }
}

async function decideExpense(id, status){

  try{
    const ex = await api(`/expenses/${id}/decide`, {method:"PATCH", body: JSON.stringify({status, comment})});
    const idx = expenses.findIndex(x=>x.id===id); expenses[idx] = ex;
    await renderMain();
  }catch(e){ alert(e.message); }
}

async function addVehicle(evt){
  evt.preventDefault();
  const body = {
    reg: document.getElementById("newVehicleReg").value,
    vehicleType: document.getElementById("newVehicleType").value,
    fuelType: document.getElementById("newVehicleFuel").value,
    usage: document.getElementById("newVehicleUsage").value,
    make: document.getElementById("newVehicleMake").value,
    model: document.getElementById("newVehicleModel").value,
    engineNo: document.getElementById("newVehicleEngineNo").value,
    chassisNo: document.getElementById("newVehicleChassisNo").value,
    rcDate: document.getElementById("newVehicleRcDate").value,
    seatingCapacity: document.getElementById("newVehicleSeating").value,
  };
  // The vehicle record is only useful if the full onboarding data is
  // present - block submission client-side with a clear message rather
  // than relying solely on the server's 400 (which still applies too).
  const requiredLabels = {
    reg: "Registration number", vehicleType: "Vehicle Type", fuelType: "Fuel Type", usage: "Usage",
    make: "Make", model: "Model", engineNo: "Engine No", chassisNo: "Chassis No",
    rcDate: "RC Date", seatingCapacity: "Seating Capacity",
  };
  const missing = Object.entries(requiredLabels).filter(([k])=>!String(body[k]||"").trim()).map(([,label])=>label);
  if(missing.length){
    alert("Cannot add vehicle - missing required field(s): " + missing.join(", "));
    return false;
  }
  try{
    const v = await api("/vehicles", {method:"POST", body: JSON.stringify(body)});
    vehicles.push(v);
    await renderMain();
  }catch(e){ alert(e.message); }
  return false;
}

const DOC_TYPES = ["RC","Permit","Insurance","Fitness","Tax","PUC","TemporaryPermit","BorderTax"];
// These 5 get a photo/scan of the physical document attached + a visible
// "last updated" stamp - Insurance does not (matches the server's
// DOC_COPY_TYPES list).

// Reads a <input type=file> into a base64 data: URL, same technique as the
// daily checklist's photo capture, but standalone since this editor isn't
// backed by the checklist's `draft` object.
function readFileAsDataUrl(fileInput){
  return new Promise((resolve,reject)=>{
    const file = fileInput.files && fileInput.files[0];
    if(!file){ resolve(null); return; }
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function lastUpdatedLabel(doc){
  return doc && doc.updatedAt ? `Last updated: ${new Date(doc.updatedAt).toLocaleString()}` : "Last updated: never";

// 1-2 district limit enforced via min/max on the number input.

  const stateChecked = document.getElementById(`doc_Permit_state_${vehicleId}`).checked;
  const countEl = document.getElementById(`doc_Permit_districtCount_${vehicleId}`);
  const namesEl = document.getElementById(`doc_Permit_districtNames_${vehicleId}`);
  if(countEl) countEl.disabled = stateChecked;
  if(namesEl) namesEl.disabled = stateChecked;

          <label style="margin-left:8px;"><input type="checkbox" id="doc_Permit_state_${v.id}" ${stateChecked?'checked':''} onchange="onPermitStateToggle('${v.id}')" /> State Permit</label>

          <input type="text" placeholder="District names (comma separated)" value="${doc.districtNames||''}" style="width:220px" id="doc_Permit_districtNames_${v.id}" ${stateChecked?'disabled':''} />
        ` : ""}
        <button class="btn small secondary" onclick="saveVehicleDoc('${v.id}','${docType}')">Save</button>
      </div>
      ${DOC_COPY_TYPES.includes(docType) ? `
      <div class="controls" style="margin-top:4px;">
        <input type="file" accept="image/*" id="doc_${docType}_copy_${v.id}" style="width:220px" />

      </div>` : ""}
    </div>`;
  }).join("");

  return `
  <div class="card" style="margin-top:14px;background:var(--panel-alt,#f7f7f9);">
    <h2 class="section-title">${v.reg} - Vehicle Details</h2>
    <div class="check-row"><div class="label">Make</div><div class="controls"><input type="text" id="vd_make_${v.id}" value="${v.make||''}" /></div></div>
    <div class="check-row"><div class="label">Model</div><div class="controls"><input type="text" id="vd_model_${v.id}" value="${v.model||''}" /></div></div>
    <div class="check-row"><div class="label">Engine No.</div><div class="controls"><input type="text" id="vd_engineNo_${v.id}" value="${v.engineNo||''}" /></div></div>
    <div class="check-row"><div class="label">Chassis No.</div><div class="controls"><input type="text" id="vd_chassisNo_${v.id}" value="${v.chassisNo||''}" /></div></div>
    <div class="check-row"><div class="label">RC Date (registration date)</div><div class="controls"><input type="date" id="vd_rcDate_${v.id}" value="${v.rcDate||''}" /></div></div>
    <div class="check-row"><div class="label">Seating Capacity</div><div class="controls"><input type="number" id="vd_seating_${v.id}" min="1" value="${v.seatingCapacity!=null?v.seatingCapacity:''}" style="width:80px" /></div></div>
    <div class="check-row"><div class="label">Vehicle Type</div><div class="controls">
      <select id="vd_vehicleType_${v.id}" onchange="onVdVehicleTypeChange('${v.id}')">
        <option value="Bus" ${v.vehicleType==='Bus'?'selected':''}>Bus</option>
        <option value="Cab" ${v.vehicleType==='Cab'?'selected':''}>Cab</option>
      </select>
    </div></div>
    <div class="check-row"><div class="label">Fuel Type</div><div class="controls">
      <select id="vd_fuelType_${v.id}" ${v.vehicleType==='Bus'?'disabled':''}>
        ${["Diesel","Petrol","CNG","EV","Hybrid"].map(f=>`<option value="${f}" ${v.fuelType===f?'selected':''}>${f}</option>`).join("")}
      </select>
    </div></div>
    <button class="btn small" onclick="saveVehicleDetails('${v.id}')">Save onboarding details</button>

    <h2 class="section-title" style="margin-top:16px;">Documents</h2>
    ${docRows}
  </div>`;
}
function onVdVehicleTypeChange(vehicleId){
  const typeEl = document.getElementById(`vd_vehicleType_${vehicleId}`);
  const fuelEl = document.getElementById(`vd_fuelType_${vehicleId}`);
  if(!typeEl || !fuelEl) return;
  if(typeEl.value === "Bus"){
    fuelEl.value = "Diesel";
    fuelEl.disabled = true;
  } else {
    fuelEl.disabled = false;
  }
}
async function saveVehicleDetails(vehicleId){
  const g = (id) => document.getElementById(id).value;
  const body = {
    make: g(`vd_make_${vehicleId}`),
    model: g(`vd_model_${vehicleId}`),
    engineNo: g(`vd_engineNo_${vehicleId}`),
    chassisNo: g(`vd_chassisNo_${vehicleId}`),
    rcDate: g(`vd_rcDate_${vehicleId}`),
    seatingCapacity: g(`vd_seating_${vehicleId}`),
    vehicleType: g(`vd_vehicleType_${vehicleId}`),
    fuelType: g(`vd_fuelType_${vehicleId}`),
  };
  try{
    const v = await api(`/vehicles/${vehicleId}/details`, {method:"PATCH", body: JSON.stringify(body)});
    const idx = vehicles.findIndex(x=>x.id===vehicleId); vehicles[idx] = v;
    alert("Onboarding details saved.");
    await renderMain();
  }catch(e){ alert(e.message); }
}
async function saveVehicleDoc(vehicleId, docType){
  const number = document.getElementById(`doc_${docType}_number_${vehicleId}`).value;
  const body = {docType, number};
  if(docType!=="RC"){
    body.expiry = document.getElementById(`doc_${docType}_expiry_${vehicleId}`).value;
  }
  if(docType==="Permit"){
    body.isStatePermit = document.getElementById(`doc_Permit_state_${vehicleId}`).checked;
    if(!body.isStatePermit){
      body.districtCount = document.getElementById(`doc_Permit_districtCount_${vehicleId}`).value;
      body.districtNames = document.getElementById(`doc_Permit_districtNames_${vehicleId}`).value;
    }
  }
  if(DOC_COPY_TYPES.includes(docType)){
    const fileInput = document.getElementById(`doc_${docType}_copy_${vehicleId}`);
    const dataUrl = fileInput ? await readFileAsDataUrl(fileInput) : null;
    if(dataUrl) body.copy = dataUrl;
  }
  try{
    const v = await api(`/vehicles/${vehicleId}/docs`, {method:"PATCH", body: JSON.stringify(body)});
    const idx = vehicles.findIndex(x=>x.id===vehicleId); vehicles[idx] = v;
    alert(`${docType} saved.`);
    await renderMain();
  }catch(e){ alert(e.message); }
}

let editingUserId = null;
let editingVehicleId = null;
let editingClientRoutesId = null;
// The Owner's Assignments tab opens read-only (accidental taps shouldn't be
// able to change a vehicle/route/supervisor) - this flips true only after
// the Owner re-confirms their own PIN, and is reset whenever they navigate
// away so the next visit is read-only again.
let ownerAssignUnlocked = false;
let subvendors = [];
let editingSubvendorId = null;
// Completed shifts pile up fast (every driver, every day) and there's
// nothing actionable in them, so they're hidden behind this toggle by
// default - Pending and Approved (the two zones that actually need
// someone's attention) are always shown in full.
let odometerVerifyShowCompleted = false;
const ROLE_OPTIONS = [
  ["site_supervisor","Site Supervisor"],["area_supervisor","Area Supervisor"],["ops_manager","Operations Manager"],
  ["data_team","Data Team"],["hr","HR"],["owner","Owner"],["bookings","Bookings Department"],
  ["workshop_manager","Workshop Manager"],["workshop_supervisor","Workshop Supervisor"],["mechanic","Mechanic"],["helper","Helper"],["electrician","Electrician"],
];
// Mirrors the server's rule in server.js (canManageUserRole): Owner can
// manage anyone. HR - the primary staff onboarder - can manage Site
// Supervisor, Area Supervisor, Operations Manager, Data Team and Bookings
// Department accounts (everyone except Owner and other HR). Ops Manager can
// manage everyone except Owner, Ops Manager and HR. This is purely a UI
// convenience (hide buttons/options that would just get a 403 back) - the
// server enforces the real rule regardless of what the UI shows.
const ROLE_MANAGEMENT_ALLOWED = {
  hr: ["site_supervisor","area_supervisor","ops_manager","data_team","bookings",...WORKSHOP_STAFF_ROLES],
  ops_manager: ["site_supervisor","area_supervisor","data_team","bookings",...WORKSHOP_STAFF_ROLES],
};
function canManageRole(actorRole, targetRole){
  if(actorRole==="owner") return true;
  const allowed = ROLE_MANAGEMENT_ALLOWED[actorRole];
  return !!allowed && allowed.includes(targetRole);
}
function roleOptionsHtml(selected, actorRole){
  const opts = ROLE_OPTIONS.filter(([v])=> canManageRole(actorRole, v) || v===selected);
  return opts.map(([v,l])=>`<option value="${v}" ${selected===v?'selected':''}>${l}</option>`).join("");
}
function siteOptionsHtml(selected){
  return `<option value="">-</option>` + meta.sites.map(s=>`<option value="${s.id}" ${selected===s.id?'selected':''}>${s.name}</option>`).join("");
}
async function peopleScreen(){
  const myRole = currentUser.role;
  const canEditAtAll = myRole==="owner" || myRole==="ops_manager" || myRole==="hr";
  const rows = meta.users.map(u=>{
    const inactive = u.active===false;
    const canEditThisOne = canEditAtAll && canManageRole(myRole, u.role);
    return `<tr style="${inactive?'opacity:.5':''}">
      <td>${u.name}${inactive? ' <span class="badge low">INACTIVE</span>' : ''}</td>
      <td>${roleLabel(u.role)}</td>
      <td>${u.siteId? siteName(u.siteId): (u.supervises&&u.supervises.length? u.supervises.map(userName).join(", ") : "-")}</td>
      <td>${u.email || "-"}</td>
      <td>${u.phone || "-"}</td>
      <td>${u.dateOfJoining || "-"}</td>
      <td>
        ${canEditThisOne ? `
          <button class="btn small secondary" onclick="startEditPerson('${u.id}')">Edit</button>
          ${inactive
            ? `<button class="btn small" onclick="setPersonActive('${u.id}', true)">Reactivate</button>`
            : `<button class="btn small danger" onclick="setPersonActive('${u.id}', false)">Deactivate</button>`}
        ` : `<span class="muted">${canEditAtAll ? 'Only the Owner can edit this' : ''}</span>`}
        ${myRole==="owner" ? `<button class="btn small secondary" onclick="resetStaffPassword('${u.id}','${u.name.replace(/'/g,"\\'")}')">Reset Password</button>` : ''}
      </td>
    </tr>`;
  }).join("");

  const editing = editingUserId ? meta.users.find(u=>u.id===editingUserId) : null;

  return `
  <h1 class="page-title">People</h1>
  <div class="card">
    <h2 class="section-title">Staff (${meta.users.length})</h2>
    <table><tr><th>Name</th><th>Role</th><th>Site / Supervises</th><th>Email</th><th>Mobile Number</th><th>Date of Joining</th><th></th></tr>${rows}</table>

    ${canEditAtAll ? `
    <form class="inline-form" onsubmit="return ${editing ? 'saveEditPerson(event)' : 'addPerson(event)'}">
      <div class="f"><label>Name</label><input type="text" id="newPersonName" value="${editing? editing.name : ''}" required /></div>
      <div class="f"><label>Role</label><select id="newPersonRole">${roleOptionsHtml(editing? editing.role : 'site_supervisor', myRole)}</select></div>
      <div class="f"><label>Site (if Site Supervisor)</label><select id="newPersonSite">${siteOptionsHtml(editing? editing.siteId : null)}</select></div>
      <div class="f"><label>Email</label><input type="email" id="newPersonEmail" value="${editing? (editing.email||'') : ''}" style="width:200px" /></div>
      <div class="f"><label>Mobile Number</label><input type="tel" id="newPersonPhone" value="${editing? (editing.phone||'') : ''}" style="width:130px" /></div>
      <div class="f"><label>Date of Joining</label><input type="date" id="newPersonDoj" value="${editing? (editing.dateOfJoining||'') : ''}" style="width:140px" /></div>
      ${editing ? '' : `<div class="f"><label>Temporary Password</label><input type="password" id="newPersonPassword" required autocomplete="new-password" /></div>`}
      <button class="btn small" type="submit">${editing? 'Save changes' : '+ Add person'}</button>
      ${editing? `<button type="button" class="btn small secondary" onclick="cancelEditPerson()">Cancel</button>` : ''}
    </form>
    ${editing ? '' : passwordHintsHtml()}
    <div class="muted" style="margin-top:6px;">${editing? `Editing ${editing.name} - use "Reset Password" to change their login password (Owner only).` : "This is a temporary password - they'll be required to set their own the first time they log in. Either an email or a mobile number is required so they have something to sign in with."}</div>
    ${myRole==="hr" ? `<div class="muted">Only the Owner can create or edit Owner or HR accounts.</div>` : ""}
    ${myRole==="ops_manager" ? `<div class="muted">Only the Owner can create or edit Owner, Operations Manager, or HR accounts.</div>` : ""}
    ` : `<div class="muted" style="margin-top:6px;">You have view-only access to People - only the Owner, Operations Manager, and HR can make changes here.</div>`}
  </div>
  ${await driversCardHtml()}`;
}
async function addPerson(evt){
  evt.preventDefault();
  const password = document.getElementById("newPersonPassword").value;
  const policyErr = passwordPolicyError(password);
  if(policyErr){ alert(policyErr); return false; }
  const body = {
    name: document.getElementById("newPersonName").value,
    role: document.getElementById("newPersonRole").value,
    siteId: document.getElementById("newPersonSite").value || null,
    email: document.getElementById("newPersonEmail").value,
    phone: document.getElementById("newPersonPhone").value,
    dateOfJoining: document.getElementById("newPersonDoj").value,
    password,
  };
  try{
    const u = await api("/users", {method:"POST", body: JSON.stringify(body)});
    meta.users.push(u);
    await renderMain();
  }catch(e){ alert(e.message); }
  return false;
}
function startEditPerson(id){ editingUserId = id; renderMain(); window.scrollTo(0, document.body.scrollHeight); }
function cancelEditPerson(){ editingUserId = null; renderMain(); }
async function saveEditPerson(evt){
  evt.preventDefault();
  const body = {
    name: document.getElementById("newPersonName").value,
    role: document.getElementById("newPersonRole").value,
    siteId: document.getElementById("newPersonSite").value || null,
    email: document.getElementById("newPersonEmail").value,
    phone: document.getElementById("newPersonPhone").value,
    dateOfJoining: document.getElementById("newPersonDoj").value,
  };
  try{
    const u = await api(`/users/${editingUserId}`, {method:"PATCH", body: JSON.stringify(body)});
    const idx = meta.users.findIndex(x=>x.id===editingUserId);
    meta.users[idx] = u;
    editingUserId = null;
    await renderMain();
  }catch(e){ alert(e.message); }
  return false;
}
async function setPersonActive(id, active){
  const u = meta.users.find(x=>x.id===id);
  if(!active && !confirm(`Deactivate ${u.name}? They won't be able to log in anymore, but their history stays intact. You can reactivate them later.`)) return;
  try{
    const updated = await api(`/users/${id}`, {method:"PATCH", body: JSON.stringify({active})});
    const idx = meta.users.findIndex(x=>x.id===id);
    meta.users[idx] = updated;
    await renderMain();
  }catch(e){ alert(e.message); }
}
// Owner-only "full control" password reset - doesn't need the person's old
// password, but forces them to set a brand new one of their own the next
// time they log in (mustChangePassword flips back on server-side).
async function resetStaffPassword(id, name){
  const newPassword = prompt(`Set a new temporary password for ${name}. They'll be required to set their own the next time they log in.\n\nMust be more than 8 characters with letters, numbers and symbols.`);
  if(newPassword===null) return;
  const policyErr = passwordPolicyError(newPassword);
  if(policyErr){ alert(policyErr); return; }
  try{
    const updated = await api(`/users/${id}/reset-password`, {method:"PATCH", body: JSON.stringify({newPassword})});
    const idx = meta.users.findIndex(x=>x.id===id);
    if(idx>=0) meta.users[idx] = updated;
    alert(`Password reset for ${name}.`);
    await renderMain();
  }catch(e){ alert(e.message); }
}

// of joining, driving level) plus a read-only mileage/efficiency summary.
// Performance score is shown but not editable here - that's reserved for a
// future client-ratings feature to populate on the driver dashboard.
const DRIVING_LEVELS = ["Trainee","Standard","Senior","Expert"];
let editingDriverId = null;
async function fetchDriverMileageSummary(){
  try{
    const rows = await api("/drivers/mileage-summary");
    const map = {};
    rows.forEach(r=>{ map[r.driverId] = r; });
    return map;
  }catch(e){ return {}; }
}
function driverMileageLabel(summary){
  if(!summary || !summary.fillCount) return `<span class="muted">No fuel records yet</span>`;
  const belowNote = summary.belowStandardCount>0 ? ` <span class="badge low">${summary.belowStandardCount} below standard</span>` : "";
  return `${summary.avgMileage} km/l avg (${summary.fillCount} fill${summary.fillCount===1?'':'s'})${belowNote}`;
}
async function driversCardHtml(){
  const myRole = currentUser.role;
  const canEditAtAll = myRole==="owner" || myRole==="ops_manager" || myRole==="hr";
  const mileageSummary = await fetchDriverMileageSummary();
  // Most recently joined first - drivers without a recorded joining date
  // (older data, backfilled blank) sort to the end rather than the top.
  const sorted = [...meta.drivers].sort((a,b)=>{
    if(!a.dateOfJoining && !b.dateOfJoining) return 0;
    if(!a.dateOfJoining) return 1;
    if(!b.dateOfJoining) return -1;
    return b.dateOfJoining.localeCompare(a.dateOfJoining);
  });
  const rows = sorted.map(d=>{
    const summary = mileageSummary[d.id];
    const isActive = d.active !== false;
    return `<tr ${isActive?'':'style="opacity:.6;background:#fafafa"'}>
      <td><b>${d.name}</b></td>
      <td>${d.phone || "-"}</td>
      <td>${d.licenseNumber || "-"}</td>
      <td>${d.dateOfJoining || "-"}</td>
      <td>${d.drivingLevel || "-"}</td>
      <td>${d.performanceScore!=null ? d.performanceScore : '<span class="muted">Not yet rated</span>'}</td>
      <td>${driverMileageLabel(summary)}</td>
      <td>${isActive ? '<span class="badge ok">Active</span>' : '<span class="badge fail">Left</span>'}</td>
      <td>${canEditAtAll ? `<button class="btn small secondary" onclick="toggleDriverDetails('${d.id}')">${editingDriverId===d.id?'Close':'Details'}</button>` : ''}</td>
    </tr>
    ${editingDriverId===d.id ? `<tr><td colspan="9">${driverEditorHtml(d)}</td></tr>` : ''}`;
  }).join("");
  return `

// Employment lifecycle (join/leave/rehire history) and uniform-issue
// tracking, shown at the bottom of a driver's Details panel. The driver's
// `id` never changes across leave/rejoin cycles - `employmentHistory` is an
// append-only list of stints, so HR can always see the full history before
// deciding whether to let someone rejoin.
function monthsBetweenDatesClient(fromStr, toStr){
  if(!fromStr) return null;
  const from = new Date(fromStr+"T00:00:00Z");
  const to = new Date((toStr||todayStr())+"T00:00:00Z");
  let months = (to.getUTCFullYear()-from.getUTCFullYear())*12 + (to.getUTCMonth()-from.getUTCMonth());
  if(to.getUTCDate() < from.getUTCDate()) months -= 1;
  return Math.max(0, months);
}
function driverLifecycleUniformHtml(d){
  const isActive = d.active !== false;
  const hist = Array.isArray(d.employmentHistory) ? d.employmentHistory : [];
  const currentStint = hist.length ? hist[hist.length-1] : null;
  const uniforms = Array.isArray(d.uniformHistory) ? d.uniformHistory : [];
  const currentUniform = uniforms.length ? uniforms[uniforms.length-1] : null;
  const uniformMonths = currentUniform ? monthsBetweenDatesClient(currentUniform.issuedDate, todayStr()) : null;
  const uniformDue = isActive && currentUniform && uniformMonths!=null && uniformMonths>=12;

  const historyRows = hist.slice().reverse().map(s=>`
    <tr>
      <td>${s.joinedDate||'-'}</td>
      <td>${s.leftDate||'<span class="muted">Currently active</span>'}</td>
      <td>${s.exitReason||'-'}</td>
      <td>${s.rehireEligible===null||s.rehireEligible===undefined?'-':(s.rehireEligible?'<span class="badge ok">Yes</span>':'<span class="badge fail">No</span>')}</td>
    </tr>`).join("");

  const uniformRows = uniforms.slice().reverse().map(u=>`
    <tr>
      <td>${u.issuedDate}</td>
      <td>₹${u.cost}</td>
      <td>${u.deductionAppliedOnExit!=null ? `₹${u.deductionAppliedOnExit} deducted (left after ${u.exitMonthsElapsed} mo.)` : '<span class="muted">-</span>'}</td>
    </tr>`).join("");

  return `
  <div style="margin-top:14px;border-top:1px solid #eee;padding-top:12px;">
    <h3 style="margin:0 0 6px;">Employment status</h3>
    <div style="margin-bottom:8px;">
      ${isActive ? `<span class="badge ok">Active</span> since ${currentStint?currentStint.joinedDate:'-'}` : `<span class="badge fail">Left</span> on ${currentStint?currentStint.leftDate:'-'}${currentStint&&currentStint.exitReason?' - '+currentStint.exitReason:''}`}
    </div>
    <table><tr><th>Joined</th><th>Left</th><th>Exit reason</th><th>Rehire eligible</th></tr>
      ${historyRows || "<tr><td colspan='4' class='empty'>No history yet.</td></tr>"}
    </table>
    <div style="margin-top:8px;">
      ${isActive
        ? `<button type="button" class="btn small secondary" onclick="markDriverLeft('${d.id}')">Mark as Left</button>`
        : `<button type="button" class="btn small" onclick="reactivateDriver('${d.id}')">Reactivate</button>`}
    </div>

    <h3 style="margin:16px 0 6px;">Uniform</h3>
    ${currentUniform
      ? `<div style="margin-bottom:8px;">Current pair issued <b>${currentUniform.issuedDate}</b> (₹${currentUniform.cost}), ${uniformMonths} month${uniformMonths===1?'':'s'} ago.
         ${uniformDue ? `<span class="badge fail" style="margin-left:6px;">New pair due - notify the uniform vendor</span>` : ''}</div>`
      : `<div class="muted" style="margin-bottom:8px;">No uniform recorded yet.</div>`}
    <table><tr><th>Issued</th><th>Cost</th><th>Deduction on exit</th></tr>
      ${uniformRows || "<tr><td colspan='3' class='empty'>No uniform history yet.</td></tr>"}
    </table>
    ${isActive ? `<div style="margin-top:8px;"><button type="button" class="btn small secondary" onclick="issueDriverUniform('${d.id}')">${currentUniform?'Issue New Uniform':'Issue Uniform'}</button></div>` : ''}
  </div>`;
}
async function issueDriverUniform(id){
