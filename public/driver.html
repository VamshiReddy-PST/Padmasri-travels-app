<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Padmasri Travels - Driver App</title>
<meta name="theme-color" content="#2B2E1F" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@1,500;1,600;1,700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2B2E1F; --accent:#4C6A2B; --accent-dark:#3A5220; --accent-light:#E9EDA8; --green:#2E7D32;
    --amber:#b8860b; --red:#c0392b; --grey:#6b6b5e; --bg:#FBF8E3; --card:#ffffff;
    --border:#ECE6C8; --purple:#6C63FF; --purple-light:#E7E5FF;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Poppins',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:#1a1a1a;-webkit-tap-highlight-color:transparent;}
  .accent-script{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:600;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:40px;}
  header.topbar{background:var(--ink);color:#fff;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  header.topbar .brand{font-weight:700;font-size:17px;}
  header.topbar .who{font-size:12.5px;opacity:.9;text-align:right;}
  main{padding:16px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 4px 14px rgba(43,46,31,.06);}
  h1.page-title{font-size:19px;margin:2px 0 16px;color:var(--ink);text-align:center;}
  h2.section-title{font-size:15px;margin:0 0 12px;color:var(--ink);}
  .muted{color:var(--grey);font-size:12.5px;}
  .banner{background:#FBF3D6;border:1px solid #EBDA9B;color:#7a5a00;padding:12px 14px;border-radius:14px;font-size:13.5px;margin-bottom:16px;}
  .banner.error{background:#fbe4e1;border-color:#eab3ab;color:#7a2115;}
  .banner.ok{background:#E9F3DC;border-color:#C4DBA0;color:#3A5220;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);margin-bottom:6px;font-weight:600;}
  .field input{width:100%;padding:14px 12px;border:1px solid var(--border);background:#fff;border-radius:14px;font-size:18px;text-align:center;letter-spacing:1px;}
  .big-btn{width:100%;background:var(--accent);color:#fff;border:none;padding:16px;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;}
  .big-btn:hover{background:var(--accent-dark);}
  .big-btn:disabled{opacity:.45;cursor:not-allowed;}
  .big-btn.secondary{background:#fff;color:var(--accent);border:2px solid var(--accent);}
  .big-btn.danger{background:var(--red);}
  .swipe-track{position:relative;width:100%;height:58px;background:var(--accent-light);border:1px solid var(--border);border-radius:29px;overflow:hidden;margin-top:6px;user-select:none;}
  .swipe-track .swipe-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink);font-weight:700;font-size:14px;letter-spacing:.3px;pointer-events:none;}
  .swipe-track.logout .swipe-label{color:#fff;}
  .swipe-track.logout{background:#f6d9d4;}
  .swipe-thumb{position:absolute;top:3px;left:3px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:grab;box-shadow:0 1px 4px rgba(0,0,0,.25);touch-action:none;}
  .swipe-track.logout .swipe-thumb{background:var(--red);}
  .countdown{font-size:34px;font-weight:800;color:var(--ink);text-align:center;margin:6px 0 14px;letter-spacing:1px;}
  .countdown.warn{color:var(--red);}
  .photo-box{border:2px dashed #C9C2A0;border-radius:14px;padding:14px;text-align:center;background:#FCFBF2;margin-bottom:14px;}
  .photo-box img{max-width:100%;max-height:180px;border-radius:8px;margin-top:10px;}
  .trip-item{border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
  .trip-item .date{font-weight:700;color:var(--ink);font-size:14px;}
  .trip-item .desc{font-size:13px;color:#333;margin-top:2px;}
  .trip-item .meta{font-size:11.5px;color:var(--grey);margin-top:4px;}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px;}
  .badge.upcoming{background:#FBF3D6;color:var(--amber);}
  .badge.in_progress{background:var(--purple-light);color:var(--purple);}
  .badge.completed{background:#E9F3DC;color:var(--green);}
  .badge.pending{background:#FBF3D6;color:var(--amber);}
  .badge.approved{background:#E9F3DC;color:var(--green);}
  .badge.rejected{background:#fbe4e1;color:var(--red);}
  .driver-tabbar{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  .driver-tabbar button{flex:0 0 auto;background:#fff;border:1px solid var(--border);color:var(--grey);padding:9px 14px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .driver-tabbar button.active{background:var(--accent-light);color:var(--ink);border-color:var(--accent-light);font-weight:700;}
  .trip-point{margin-top:10px;padding:10px 12px;background:#FCFBF2;border:1px solid var(--border);border-radius:12px;}
  .trip-point-label{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.4px;}
  .trip-point a{font-size:12px;}
  .doc-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F1ECD4;font-size:13px;}
  .doc-row:last-child{border-bottom:none;}
  .doc-row .dl-link{background:var(--accent);color:#fff;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  table th{text-align:left;padding:7px 5px;color:var(--ink);border-bottom:2px solid var(--border);font-size:11.5px;}
  table td{padding:7px 5px;border-bottom:1px solid #F1ECD4;}
  .trip-actions{margin-top:10px;display:flex;gap:8px;}
  .trip-actions button{flex:1;padding:9px;border-radius:10px;border:1px solid var(--accent);background:#fff;color:var(--accent);font-size:12.5px;font-weight:600;cursor:pointer;}
  .empty{text-align:center;color:var(--grey);padding:20px 10px;font-size:13px;}
  .status-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--grey);}
  .status-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--green);}
  .status-pill .dot.off{background:#c9c9c9;}
  .footer-note{font-size:11px;color:#9a9576;text-align:center;padding:18px 10px 4px;}
  .footer-note a{color:var(--accent);}
  .month-picker{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .month-picker input{flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;font-size:14px;}
  .payslip-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F1ECD4;font-size:13.5px;}
  .payslip-row.total{font-weight:700;color:var(--ink);border-top:2px solid var(--border);border-bottom:none;padding-top:10px;margin-top:4px;}
  .dl-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;}
  .dl-row button{min-width:100px;}
  .dl-row button{flex:1;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="odoOpenInput" accept="image/*" capture="environment" style="display:none" />
<input type="file" id="odoCloseInput" accept="image/*" capture="environment" style="display:none" />
<script>
/* =========================================================================
   PADMASRI TRAVELS - DRIVER APP
   Deliberately separate from index.html and its login system: drivers sign
   in with just their mobile number + a 4-digit PIN (default 1234, never
   forced to change - see server.js backfillDefaults for why). Everything
   here talks to /api/driver-auth/* and /api/driver-auth/trips, /payslip -
   a completely different session (driverSessions on the server) from the
   staff app's token.
   ========================================================================= */

const API = "/api";
let driverToken = localStorage.getItem("driverAuthToken") || null;
let driver = null;
let shift = null;
let lastError = "";
// Which sub-tab is showing once the shift is active (on_trip/ready_to_logout).
let driverTab = "current";
let currentTrip = null;
let tripsMonth = new Date().toISOString().slice(0,7);
let monthTrips = { upcoming: [], completed: [] };
let myLeaveRequests = [];
let attendanceMonth = new Date().toISOString().slice(0,7);
let attendanceRows = [];
let documentsData = null;
const DOC_TYPE_LABELS = { RC:"RC", Permit:"Permit", Fitness:"Fitness Certificate", Tax:"Road Tax", PUC:"PUC", TemporaryPermit:"Temporary Permit", BorderTax:"Border Tax" };
let lastPos = { lat: null, lng: null };
let locationOk = false;
let pingTimer = null;
let pollTimer = null;
let capturedOpenPhoto = null;
let capturedClosePhoto = null;
// Whatever the driver has typed so far into the odometer fields, kept
// outside the DOM so a re-render (the countdown ticking, a location poll,
// a photo capture completing) never wipes out an in-progress reading.
let odoOpenDraft = "";
let odoCloseDraft = "";
let busy = false;
let payslipMonth = new Date().toISOString().slice(0,7);
let payslip = null;
let payslipLoading = false;

async function api(path, opts={}){
  const headers = Object.assign({"Content-Type":"application/json"}, opts.headers||{});
  if(driverToken) headers["Authorization"] = "Bearer " + driverToken;
  const res = await fetch(API+path, Object.assign({}, opts, {headers}));
  if(res.status === 401){
    resetSession();
    render();
    throw new Error("Session expired - please log in again.");
  }
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || ("Request failed ("+res.status+")"));
  return data;
}

function resetSession(){
  driverToken = null; driver = null; shift = null;
  odoOpenDraft = ""; odoCloseDraft = "";
  driverTab = "current"; currentTrip = null;
  monthTrips = { upcoming: [], completed: [] }; myLeaveRequests = [];
  attendanceRows = []; documentsData = null; payslip = null;
  localStorage.removeItem("driverAuthToken");
  stopLocationPings(); stopPolling();
}

// ---------- location ----------
function getPosition(timeoutMs){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){ resolve({lat:null,lng:null}); return; }
    const timer = setTimeout(()=>resolve({lat:lastPos.lat,lng:lastPos.lng}), timeoutMs||8000);
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        clearTimeout(timer);
        const p = {lat: pos.coords.latitude, lng: pos.coords.longitude};
        lastPos = p; locationOk = true;
        resolve(p);
      },
      ()=>{ clearTimeout(timer); locationOk = false; resolve({lat:lastPos.lat,lng:lastPos.lng}); },
      {enableHighAccuracy:true, timeout:(timeoutMs||8000)-500, maximumAge:5000}
    );
  });
}
function startLocationPings(){
  stopLocationPings();
  pingTimer = setInterval(async ()=>{
    if(!driverToken || !shift || shift.status==="closed") return;
    const p = await getPosition(6000);
    if(typeof p.lat!=="number" || typeof p.lng!=="number") return;
    api("/driver-auth/location-ping", {method:"POST", body: JSON.stringify(p)}).catch(()=>{});
  }, 10000);
}
function stopLocationPings(){ if(pingTimer){ clearInterval(pingTimer); pingTimer=null; } }

// ---------- polling (keeps whichever tab is open fresh, catches auto-expiry) ----------
// Runs the whole time the driver is logged in, including while
// awaiting_odometer - the driver can now freely browse Upcoming Trips /
// Profile / Documents during that 10-minute window instead of being stuck
// on a blocking odometer screen, so this is what notices the server auto-
// closing the shift if the window runs out while they're on another tab.
// This used to skip awaiting_odometer to protect the odometer input from
// being wiped by a re-render mid-type; that's now handled by odoOpenDraft
// surviving any re-render, so it's safe to poll here too.
function startPolling(){
  stopPolling();
  pollTimer = setInterval(refreshMe, 15000);
}
function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }
async function refreshMe(){
  if(!driverToken) return;
  try{
    const m = await api("/driver-auth/me");
    driver = m.driver; shift = m.shift;
    if(shift && shift.status!=="closed") await loadActiveTabData();
    render();
  }catch(e){ /* api() already resets session on 401 */ }
}
// Fetches whatever data the currently-visible driver-app tab needs. Called
// both when switching tabs and by the 15s poll, so whichever tab is open
// always has fresh data without re-fetching every tab on every poll.
async function loadActiveTabData(){
  if(driverTab==="upcoming") await Promise.all([fetchMonthTrips(), fetchMyLeaveRequests()]);
  else if(driverTab==="profile") await Promise.all([fetchPayslip(), fetchAttendance()]);
  else if(driverTab==="documents") await fetchDocuments();
  else await fetchCurrentTrip(); // "current" tab, and the default
}
async function setDriverTab(tab){
  driverTab = tab;
  render(); // show a loading state immediately, then fill in once fetched
  await loadActiveTabData();
  render();
}
async function fetchCurrentTrip(){
  try{ currentTrip = await api("/driver-auth/trips/current"); }catch(e){ currentTrip = null; }
}
async function fetchMonthTrips(){
  try{ monthTrips = await api(`/driver-auth/trips?month=${tripsMonth}`); }catch(e){ monthTrips = {upcoming:[],completed:[]}; }
}
async function fetchMyLeaveRequests(){
  try{ myLeaveRequests = await api("/driver-auth/leave-requests"); }catch(e){ myLeaveRequests = []; }
}
async function setTripsMonth(v){
  tripsMonth = v || new Date().toISOString().slice(0,7);
  await fetchMonthTrips();
  render();
}
async function requestLeaveForTrip(tripId, date){
  const reason = prompt("Reason for leave request (optional):", "");
  if(reason===null) return;
  try{
    await api("/driver-auth/leave-request", {method:"POST", body: JSON.stringify({date, tripId, reason})});
    await fetchMyLeaveRequests();
    render();
    alert("Leave request submitted - your Site Supervisor / Operations Manager will review it.");
  }catch(e){ alert(e.message); }
}
async function fetchAttendance(){
  try{ const r = await api(`/driver-auth/attendance?month=${attendanceMonth}`); attendanceRows = r.rows; }
  catch(e){ attendanceRows = []; }
}
async function setAttendanceMonth(v){
  attendanceMonth = v || new Date().toISOString().slice(0,7);
  await fetchAttendance();
  render();
}
async function fetchDocuments(){
  try{ documentsData = await api("/driver-auth/documents"); }catch(e){ documentsData = null; }
}

// ---------- boot ----------
async function boot(){
  if(!driverToken){ render(); return; }
  try{
    const m = await api("/driver-auth/me");
    driver = m.driver; shift = m.shift;
    if(shift && shift.status!=="closed"){
      // Land straight on the tab bar (Current Trip active) no matter which
      // stage the shift is in - awaiting_odometer no longer blocks access
      // to Upcoming Trips / Profile / Documents.
      startLocationPings(); startPolling();
      driverTab = "current";
      await fetchCurrentTrip();
    }
    render();
  }catch(e){
    resetSession(); render();
  }
}

// ---------- image capture (matches the supervisor app's downscale pattern) ----------
function downscaleImage(file, maxW, quality, cb){
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement("canvas");
      canvas.width = img.width*scale; canvas.height = img.height*scale;
      canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
      cb(canvas.toDataURL("image/jpeg",quality));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function captureOpenPhoto(){ document.getElementById("odoOpenInput").click(); }
function captureClosePhoto(){ document.getElementById("odoCloseInput").click(); }
document.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById("odoOpenInput").addEventListener("change", (e)=>{
    const f = e.target.files[0]; if(!f) return;
    downscaleImage(f, 640, 0.7, (dataUrl)=>{ capturedOpenPhoto = dataUrl; render(); });
    e.target.value = "";
  });
  document.getElementById("odoCloseInput").addEventListener("change", (e)=>{
    const f = e.target.files[0]; if(!f) return;
    downscaleImage(f, 640, 0.7, (dataUrl)=>{ capturedClosePhoto = dataUrl; render(); });
    e.target.value = "";
  });
  boot();
});

// ---------- swipe-to-confirm control ----------
// A simple slide-to-confirm gesture (pointer events, works for touch and
// mouse) - deliberately the only way to log in/out, since a plain button
// tap is too easy to fire by accident while the phone is being handled.
function initSwipe(trackId, onConfirm){
  const track = document.getElementById(trackId);
  if(!track) return;
  const thumb = track.querySelector(".swipe-thumb");
  const maxX = track.clientWidth - thumb.clientWidth - 6;
  let startX = 0, curX = 0, dragging = false;
  function setX(x){ curX = Math.max(0, Math.min(maxX, x)); thumb.style.transform = `translateX(${curX}px)`; }
  function onDown(e){
    dragging = true;
    startX = (e.touches? e.touches[0].clientX : e.clientX) - curX;
    thumb.style.cursor = "grabbing";
  }
  function onMove(e){
    if(!dragging) return;
    const x = (e.touches? e.touches[0].clientX : e.clientX) - startX;
    setX(x);
  }
  function onUp(){
    if(!dragging) return;
    dragging = false;
    thumb.style.cursor = "grab";
    if(curX >= maxX*0.82){
      setX(maxX);
      onConfirm();
    } else {
      setX(0);
    }
  }
  thumb.addEventListener("mousedown", onDown);
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
  thumb.addEventListener("touchstart", onDown, {passive:true});
  window.addEventListener("touchmove", onMove, {passive:true});
  window.addEventListener("touchend", onUp);
  setX(0);
}

// ---------- actions ----------
async function doDriverLogin(){
  if(busy) return;
  lastError = "";
  const phone = (document.getElementById("driverPhone")||{}).value || "";
  const pin = (document.getElementById("driverPin")||{}).value || "";
  if(!phone.trim() || !pin.trim()){ lastError = "Enter your mobile number and PIN."; render(); return; }
  busy = true; render();
  try{
    const pos = await getPosition(6000);
    const r = await api("/driver-auth/login", {method:"POST", body: JSON.stringify({phone: phone.trim(), pin: pin.trim(), lat: pos.lat, lng: pos.lng})});
    driverToken = r.token; driver = r.driver; shift = r.shift;
    localStorage.setItem("driverAuthToken", driverToken);
    startLocationPings(); startPolling();
    driverTab = "current";
    await fetchCurrentTrip();
  }catch(e){
    lastError = e.message;
  }
  busy = false; render();
}
async function submitOdometerOpen(){
  if(busy) return;
  lastError = "";
  const odometer = (document.getElementById("odoOpenValue")||{}).value;
  if(!odometer){ lastError = "Enter the opening odometer reading."; render(); return; }
  if(!capturedOpenPhoto){ lastError = "Take a photo of the odometer reading first."; render(); return; }
  busy = true; render();
  try{
    const pos = await getPosition(6000);
    shift = await api("/driver-auth/odometer-open", {method:"POST", body: JSON.stringify({odometer:Number(odometer), photo:capturedOpenPhoto, lat:pos.lat, lng:pos.lng})});
    capturedOpenPhoto = null;
    odoOpenDraft = "";
    driverTab = "current";
    await fetchCurrentTrip();
  }catch(e){ lastError = e.message; }
  busy = false; render();
}
// Used both by the Upcoming Trips tab ("Start Trip") and the Current Trip
// tab ("Mark Trip Completed") - refreshes both after any status change so
// whichever tab the driver switches to next is already up to date.
async function markTripStatus(tripId, status){
  if(busy) return;
  busy = true; render();
  try{
    await api(`/driver-auth/trips/${tripId}/status`, {method:"POST", body: JSON.stringify({status})});
    await Promise.all([fetchCurrentTrip(), fetchMonthTrips()]);
  }catch(e){ lastError = e.message; }
  busy = false; render();
}
async function submitOdometerClose(){
  if(busy) return;
  lastError = "";
  const odometer = (document.getElementById("odoCloseValue")||{}).value;
  if(!odometer){ lastError = "Enter the closing odometer reading."; render(); return; }
  if(!capturedClosePhoto){ lastError = "Take a photo of the odometer reading first."; render(); return; }
  busy = true; render();
  try{
    shift = await api("/driver-auth/odometer-close", {method:"POST", body: JSON.stringify({odometer:Number(odometer), photo:capturedClosePhoto})});
    capturedClosePhoto = null;
    odoCloseDraft = "";
  }catch(e){ lastError = e.message; }
  busy = false; render();
}
async function doDriverLogout(){
  if(busy) return;
  lastError = "";
  busy = true; render();
  try{
    const pos = await getPosition(6000);
    await api("/driver-auth/logout", {method:"POST", body: JSON.stringify(pos)});
    resetSession();
  }catch(e){ lastError = e.message; }
  busy = false; render();
}
async function setPayslipMonth(v){ payslipMonth = v; payslip = null; await fetchPayslip(); }
async function fetchPayslip(){
  payslipLoading = true; render();
  try{ payslip = await api(`/driver-auth/payslip?month=${payslipMonth}`); }
  catch(e){ payslip = null; }
  payslipLoading = false; render();
}
async function downloadDriverPayslip(format){
  try{
    const headers = {};
    if(driverToken) headers["Authorization"] = "Bearer " + driverToken;
    const res = await fetch(`${API}/driver-auth/payslip/download?month=${payslipMonth}&format=${format}`, {headers});
    if(!res.ok){ const d = await res.json().catch(()=>({})); throw new Error(d.error || "Download failed."); }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `payslip_${payslipMonth}.${format==="xlsx"?"xlsx":format==="pdf"?"pdf":"csv"}`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }catch(e){ alert(e.message); }
}

// ---------- rendering ----------
function money(n){ return "₹" + Math.round(n||0).toLocaleString("en-IN"); }
function fmtTime(iso){ if(!iso) return "-"; const d = new Date(iso); return d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}); }
function fmtDate(s){ if(!s) return "-"; const d = new Date(s+"T00:00:00"); return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"}); }

function render(){
  const app = document.getElementById("app");
  app.innerHTML = topbarHtml() + `<main>${bodyHtml()}</main>` + footerHtml();
  setTimeout(()=>{
    if(!driverToken) initSwipe("loginSwipe", doDriverLogin);
    if(shift && shift.status==="ready_to_logout") initSwipe("logoutSwipe", doDriverLogout);
  }, 0);
}

function topbarHtml(){
  const dot = locationOk ? "" : " off";
  return `<header class="topbar">
    <div class="brand">Padmasri <span class="accent-script">Travels</span></div>
    ${driver ? `<div class="who">${driver.name}<br/><span class="status-pill"><span class="dot${dot}"></span>${locationOk?"Location on":"Location off"}</span></div>` : `<div class="who">Driver App</div>`}
  </header>`;
}

function footerHtml(){
  return `<div class="footer-note">Staff member? <a href="/">Go to the Supervisor App</a></div>`;
}

function errorBannerHtml(){
  return lastError ? `<div class="banner error">${lastError}</div>` : "";
}

function bodyHtml(){
  if(!driverToken || !driver) return loginScreen();
  if(!shift || shift.status==="closed") return loggedOutScreen();
  // Every other stage (awaiting_odometer, on_trip, ready_to_logout) lands
  // on the tab bar - odometer entry lives inside the Current Trip tab now,
  // it no longer blocks Upcoming Trips / Profile / Documents.
  return activeShiftScreen();
}

function loginScreen(){
  return `
  <h1 class="page-title">Driver Login</h1>
  ${errorBannerHtml()}
  <div class="card">
    <div class="field">
      <label>Mobile Number</label>
      <input type="tel" id="driverPhone" placeholder="10-digit mobile number" inputmode="numeric" maxlength="10" />
    </div>
    <div class="field">
      <label>PIN</label>
      <input type="password" id="driverPin" placeholder="4-digit PIN" inputmode="numeric" maxlength="4" />
    </div>
    <p class="muted" style="text-align:center;margin:4px 0 14px;">${busy? '<span class="spinner"></span>Logging in...' : "Slide the button all the way to log in"}</p>
    <div class="swipe-track" id="loginSwipe">
      <div class="swipe-label">Swipe to Login &rarr;</div>
      <div class="swipe-thumb">&rarr;</div>
    </div>
  </div>`;
}

function loggedOutScreen(){
  // Session closed (either the driver logged out cleanly, or the 10-minute
  // odometer window expired and the shift was auto-closed) - back to login.
  const reasonHtml = (shift && shift.autoClosedReason) ? `<div class="banner error">${shift.autoClosedReason}</div>` : "";
  driverToken = null; localStorage.removeItem("driverAuthToken");
  return reasonHtml + loginScreen();
}

function odometerCountdownParts(){
  const loginAt = new Date(shift.loginAt).getTime();
  const remainMs = Math.max(0, loginAt + 10*60*1000 - Date.now());
  const mm = String(Math.floor(remainMs/60000)).padStart(2,"0");
  const ss = String(Math.floor((remainMs%60000)/1000)).padStart(2,"0");
  return { remainMs, text: `${mm}:${ss}` };
}
function activeShiftScreen(){
  return `
  <h1 class="page-title">Welcome, <span class="accent-script">${driver.name}</span></h1>
  ${errorBannerHtml()}
  ${driverTabBarHtml()}
  ${driverTabContentHtml()}
  `;
}

// 4 tabs, deliberately - Attendance/Payroll/Settings are folded into one
// "Profile" tab so the driver isn't choosing between 6 things.
const DRIVER_TABS = [
  ["current","Current Trip"], ["upcoming","Upcoming Trips"], ["profile","Profile"], ["documents","Documents"],
];
function driverTabBarHtml(){
  return `<div class="driver-tabbar">${DRIVER_TABS.map(([k,l])=>
    `<button class="${driverTab===k?'active':''}" onclick="setDriverTab('${k}')">${l}</button>`
  ).join("")}</div>`;
}
function driverTabContentHtml(){
  if(driverTab==="upcoming") return upcomingTripsTabHtml();
  if(driverTab==="profile") return profileTabHtml();
  if(driverTab==="documents") return documentsTabHtml();
  return currentTripTabHtml();
}

// ---------- Current Trip tab ----------
// This is the landing tab right after login. While the shift is still
// awaiting_odometer, it's where the opening-odometer gate (with its
// 10-minute countdown) lives now - it no longer blocks the other tabs,
// so the driver can check Documents/Profile/Upcoming Trips while that
// countdown is still running if they want to.
function currentTripTabHtml(){
  if(shift.status==="awaiting_odometer") return odometerOpenCardHtml();
  let tripHtml;
  if(!currentTrip){
    tripHtml = `<div class="card"><h2 class="section-title">Current Trip</h2><div class="empty">No trip currently running. Start one from the Upcoming Trips tab.</div></div>`;
  } else {
    const t = currentTrip;
    tripHtml = `
    <div class="card">
      <h2 class="section-title">Current Trip</h2>
      <p class="muted">${fmtDate(t.date)}${t.scheduledTime? " &middot; "+t.scheduledTime : ""}${t.vehicleReg? " &middot; "+t.vehicleReg : ""}</p>
      ${(t.clientName || t.siteName || t.route) ? `
      <div class="doc-row" style="display:block;">
        ${t.clientName ? `<div><b>Client:</b> ${t.clientName}</div>` : ""}
        ${t.siteName ? `<div><b>Site:</b> ${t.siteName}</div>` : ""}
        ${t.route ? `<div><b>Route:</b> ${t.route}</div>` : ""}
      </div>` : ""}
      ${t.supervisorName ? `
      <div class="doc-row" style="display:block;">
        <div><b>Site Supervisor:</b> ${t.supervisorName}${t.supervisorPhone ? ` &middot; <a href="tel:${t.supervisorPhone}">${t.supervisorPhone}</a>` : ""}</div>
      </div>` : ""}
      <div class="trip-point">
        <div class="trip-point-label">Pickup Point</div>
        <div>${t.pickupPoint || "Not specified"}</div>
        ${t.pickupPoint ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t.pickupPoint)}" target="_blank" rel="noopener">Open in Maps</a>` : ""}
      </div>
      <div class="trip-point">
        <div class="trip-point-label">Drop Point</div>
        <div>${t.dropPoint || "Not specified"}</div>
        ${t.dropPoint ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t.dropPoint)}" target="_blank" rel="noopener">Open in Maps</a>` : ""}
      </div>
      ${t.notes ? `<p class="muted" style="margin-top:10px;">Notes: ${t.notes}</p>` : ""}
      <button class="big-btn" style="margin-top:14px;" ${busy?"disabled":""} onclick="markTripStatus('${t.id}','completed')">${busy?'<span class="spinner"></span>Saving...':"Mark Trip Completed"}</button>
    </div>`;
  }
  const shiftHtml = shift.status==="ready_to_logout" ? logoutCardHtml() : closingOdometerCardHtml();
  return tripHtml + shiftHtml;
}
function odometerOpenCardHtml(){
  const { remainMs, text } = odometerCountdownParts();
  return `
  <div class="card">
    <h2 class="section-title">Enter Opening Odometer Reading</h2>
    <p class="muted">You must enter this within 10 minutes of logging in, or you'll be logged out automatically. You can still check the other tabs while this counts down.</p>
    <div class="countdown${remainMs<120000?" warn":""}" id="odoCountdown">${text}</div>
    <div class="field">
      <label>Odometer Reading (km)</label>
      <input type="text" id="odoOpenValue" value="${odoOpenDraft}" placeholder="e.g. 45210" inputmode="numeric" pattern="[0-9]*" maxlength="7" autocomplete="off" oninput="odoOpenDraft=this.value=this.value.replace(/[^0-9]/g,'');" />
    </div>
    <div class="photo-box">
      ${capturedOpenPhoto ? `<img src="${capturedOpenPhoto}"/><br/>` : ""}
      <button type="button" class="big-btn secondary" style="margin-top:${capturedOpenPhoto?'10px':'0'};" onclick="captureOpenPhoto()">${capturedOpenPhoto? "📷 Retake Photo" : "📷 Take Odometer Photo"}</button>
    </div>
    <button class="big-btn" ${busy?"disabled":""} onclick="submitOdometerOpen()">${busy?'<span class="spinner"></span>Starting...':"Start Trip"}</button>
  </div>`;
}

// ---------- Upcoming Trips tab ----------
function upcomingTripsTabHtml(){
  const up = monthTrips.upcoming || [];
  const done = monthTrips.completed || [];
  const rowHtml = (t) => `
    <div class="trip-item">
      <div class="date">${fmtDate(t.date)}${t.scheduledTime? " &middot; "+t.scheduledTime : ""}</div>
      <div class="desc">${t.pickupPoint || "Pickup TBD"} &rarr; ${t.dropPoint || "Drop TBD"}</div>
      <span class="badge ${t.status}">${t.status==="in_progress"?"In Progress":"Upcoming"}</span>
      ${t.status==="upcoming" ? `
      <div class="trip-actions">
        <button ${busy?"disabled":""} onclick="markTripStatus('${t.id}','in_progress')">Start Trip</button>
        <button ${busy?"disabled":""} onclick="requestLeaveForTrip('${t.id}','${t.date}')">Request Leave</button>
      </div>` : ""}
    </div>`;
  const leaveRowHtml = (l) => `
    <div class="trip-item">
      <div class="date">${fmtDate(l.start)}</div>
      <div class="desc">${l.reason || "Leave requested"}</div>
      <span class="badge ${l.status}">${l.status.toUpperCase()}</span>
    </div>`;
  return `
  <div class="card">
    <h2 class="section-title">Upcoming Trips</h2>
    <div class="month-picker"><input type="month" value="${tripsMonth}" onchange="setTripsMonth(this.value)" /></div>
    ${up.length===0 ? `<div class="empty">No trips allocated for this month yet.</div>` : up.map(rowHtml).join("")}
    ${done.length ? `<p class="muted" style="margin-top:10px;">Completed this month</p>` + done.map(rowHtml).join("") : ""}
  </div>
  <div class="card">
    <h2 class="section-title">My Leave Requests</h2>
    ${myLeaveRequests.length===0 ? `<div class="empty">No leave requests yet.</div>` : myLeaveRequests.map(leaveRowHtml).join("")}
  </div>`;
}

// ---------- Profile tab (Attendance + Payroll + Settings combined) ----------
function attendanceCardHtml(){
  const rows = attendanceRows.map(r=>`
    <tr>
      <td>${fmtDate(r.date)}</td>
      <td>${fmtTime(r.loginAt)}</td>
      <td>${r.logoutAt ? fmtTime(r.logoutAt) : (r.autoClosedReason ? "Auto-closed" : "-")}</td>
      <td>${r.hours!=null ? r.hours+" hrs" : "-"}</td>
      <td>${r.distanceKm!=null ? r.distanceKm+" km" : "-"}</td>
    </tr>`).join("");
  return `
  <div class="card">
    <h2 class="section-title">Attendance</h2>
    <div class="month-picker"><input type="month" value="${attendanceMonth}" onchange="setAttendanceMonth(this.value)" /></div>
    ${attendanceRows.length===0 ? `<div class="empty">No attendance records for this month.</div>` : `
    <table>
      <tr><th>Date</th><th>Login</th><th>Logout</th><th>Hours</th><th>Distance</th></tr>
      ${rows}
    </table>`}
  </div>`;
}
function accountInfoCardHtml(){
  const dot = locationOk ? "" : " off";
  const shiftOpen = shift && (shift.status==="awaiting_odometer" || shift.status==="on_trip");
  const logoutNote = shift && shift.status==="ready_to_logout"
    ? "Your closing odometer reading is saved - tap Log Out below to finish."
    : shiftOpen
      ? "Your shift is still open today (closing odometer reading not submitted yet). Tapping Log Out will sign you out of this device - your shift stays open so you (or the office) can finish closing it later. To fully end your day, go to the Current Trip tab and save your closing odometer reading first."
      : "";
  return `
  <div class="card">
    <h2 class="section-title">Account Info</h2>
    <div class="doc-row"><div>Name</div><div>${driver.name}</div></div>
    <div class="doc-row"><div>Mobile Number</div><div>${driver.phone || "-"}</div></div>
    <div class="doc-row"><div>License Number</div><div>${driver.licenseNumber || "-"}</div></div>
    <div class="doc-row"><div>Driving Level</div><div>${driver.drivingLevel || "-"}</div></div>
    <div class="doc-row"><div>Location Tracking</div><div class="status-pill"><span class="dot${dot}"></span>${locationOk?"On":"Off"}</div></div>
    ${logoutNote ? `<p class="muted" style="margin-top:12px;">${logoutNote}</p>` : ""}
    <button class="big-btn danger" style="margin-top:14px;" ${busy?"disabled":""} onclick="handleAccountLogout()">${busy?'<span class="spinner"></span>Logging out...':"Log Out"}</button>
  </div>`;
}
// Always-available Logout from the Profile tab. If the shift is already
// closed out (or there's no shift), this fully signs the driver out via the
// backend, same as the swipe control. If the shift is still open (odometer
// not yet closed), we can't silently end it - the office needs that closing
// reading for mileage/fuel tracking - so this just clears the session on
// this device; the driver's shift stays active and boot() will pick right
// back up where they left off next time they log in (any device).
async function handleAccountLogout(){
  if(busy) return;
  if(shift && shift.status==="ready_to_logout"){ await doDriverLogout(); return; }
  if(shift && (shift.status==="awaiting_odometer" || shift.status==="on_trip")){
    const ok = confirm("Your shift is still open today (closing odometer reading not submitted). Sign out of this device now? Your shift will stay open so you can finish it later.");
    if(!ok) return;
  }
  resetSession();
  render();
}
function profileTabHtml(){
  return payslipCardHtml() + attendanceCardHtml() + accountInfoCardHtml();
}

// ---------- Documents tab ----------
function docRowHtml(label, number, url){
  return `
  <div class="doc-row">
    <div><b>${label}</b>${number ? ` <span class="muted">(${number})</span>` : ""}</div>
    ${url ? `<a href="${url}" target="_blank" rel="noopener" class="dl-link">Download</a>` : `<span class="muted">Not uploaded yet</span>`}
  </div>`;
}
function documentsTabHtml(){
  if(!documentsData) return `<div class="card"><h2 class="section-title">Documents</h2><div class="empty"><span class="spinner"></span>Loading...</div></div>`;
  const p = documentsData.personal;
  const personalHtml = [
    docRowHtml("Driving License", p.licenseNumber, p.licenseCopyUrl),
    docRowHtml("Aadhar Card", p.aadharNumber, p.aadharCopyUrl),
    docRowHtml("PAN Card", p.panNumber, p.panCopyUrl),
    docRowHtml("Bank Cancelled Cheque", "", p.bankChequeUrl),
    docRowHtml("UAN / PF Certificate", p.uanNumber, p.pfCertificateUrl),
    docRowHtml("ESI Certificate", p.esiNumber, p.esiCertificateUrl),
  ].join("");
  const bankHtml = (p.bankAccountNumber || p.bankIfsc || p.bankAccountHolderName) ? `
    <div class="doc-row" style="display:block;">
      <b>Account Details</b>
      <div class="muted" style="margin-top:4px;">
        ${p.bankAccountHolderName ? `Name: ${p.bankAccountHolderName}<br/>` : ""}
        ${p.bankAccountNumber ? `A/C No: ${p.bankAccountNumber}<br/>` : ""}
        ${p.bankIfsc ? `IFSC: ${p.bankIfsc}` : ""}
      </div>
    </div>` : "";
  const v = documentsData.vehicle;
  const vehicleHtml = v
    ? Object.keys(v.docs).map(docType=>{
        const doc = v.docs[docType];
        return docRowHtml(DOC_TYPE_LABELS[docType] || docType, doc.number, doc.copyUrl) +
          (doc.expiry ? `<div class="muted" style="margin:-6px 0 8px;">Expiry: ${doc.expiry}</div>` : "");
      }).join("")
    : `<div class="empty">You're not currently mapped to a vehicle.</div>`;
  return `
  <div class="card">
    <h2 class="section-title">My Documents</h2>
    ${personalHtml}
    ${bankHtml}
  </div>
  <div class="card">
    <h2 class="section-title">Vehicle Documents${v ? " - "+v.reg : ""}</h2>
    <p class="muted">For RTA checks. View/download only.</p>
    ${vehicleHtml}
  </div>`;
}

function closingOdometerCardHtml(){
  return `
  <div class="card">
    <h2 class="section-title">End Shift</h2>
    <p class="muted">Opening reading: <strong>${shift.odometerOpen} km</strong> at ${fmtTime(shift.odometerOpenAt)}</p>
    <p class="muted">Once your trip(s) are done, enter the closing odometer reading with a photo to finish your shift.</p>
    <div class="field">
      <label>Closing Odometer Reading (km)</label>
      <input type="text" id="odoCloseValue" value="${odoCloseDraft}" placeholder="e.g. 45340" inputmode="numeric" pattern="[0-9]*" maxlength="7" autocomplete="off" oninput="odoCloseDraft=this.value=this.value.replace(/[^0-9]/g,'');" />
    </div>
    <div class="photo-box">
      ${capturedClosePhoto ? `<img src="${capturedClosePhoto}"/><br/>` : ""}
      <button type="button" class="big-btn secondary" style="margin-top:${capturedClosePhoto?'10px':'0'};" onclick="captureClosePhoto()">${capturedClosePhoto? "📷 Retake Photo" : "📷 Take Odometer Photo"}</button>
    </div>
    <button class="big-btn" ${busy?"disabled":""} onclick="submitOdometerClose()">${busy?'<span class="spinner"></span>Saving...':"Save Closing Reading"}</button>
  </div>`;
}

function logoutCardHtml(){
  return `
  <div class="card">
    <h2 class="section-title">Ready to Log Out</h2>
    <p class="muted">Closing reading: <strong>${shift.odometerClose} km</strong> at ${fmtTime(shift.odometerCloseAt)}</p>
    <p class="muted" style="text-align:center;margin:4px 0 14px;">${busy? '<span class="spinner"></span>Logging out...' : "Slide the button all the way to log out"}</p>
    <div class="swipe-track logout" id="logoutSwipe">
      <div class="swipe-label">Swipe to Log Out &rarr;</div>
      <div class="swipe-thumb">&rarr;</div>
    </div>
  </div>`;
}

function payslipCardHtml(){
  let inner;
  if(payslipLoading) inner = `<div class="empty"><span class="spinner"></span>Loading...</div>`;
  else if(!payslip || !payslip.approved) inner = `<div class="empty">Your payslip for this month hasn't been approved by HR yet.</div>`;
  else {
    const p = payslip.payslip;
    inner = `
      ${p.earnings.map(e=>`<div class="payslip-row"><span>${e.label}</span><span>${money(e.amount)}</span></div>`).join("")}
      ${p.deductions.map(d=>`<div class="payslip-row"><span>${d.label}</span><span>-${money(d.amount)}</span></div>`).join("")}
      <div class="payslip-row total"><span>Net Pay</span><span>${money(p.netPay)}</span></div>
      <div class="dl-row">
        <button class="big-btn secondary" onclick="downloadDriverPayslip('pdf')">Download PDF</button>
        <button class="big-btn secondary" onclick="downloadDriverPayslip('csv')">Download CSV</button>
        <button class="big-btn secondary" onclick="downloadDriverPayslip('xlsx')">Download Excel</button>
      </div>`;
  }
  return `
  <div class="card">
    <h2 class="section-title">My Payslip</h2>
    <div class="month-picker">
      <input type="month" value="${payslipMonth}" onchange="setPayslipMonth(this.value)" />
    </div>
    ${inner}
  </div>`;
}

// Ticks the 10-minute countdown once a second WITHOUT a full re-render -
// updating the app's whole innerHTML every second was wiping out the
// odometer input as the driver typed into it (a fresh <input> with no
// value every tick left about one second to type before it reset). This
// only touches the countdown's own text/class, so the input (and its
// value, cursor position, focus) are never disturbed by the clock.
let odoExpiryHandled = false;
setInterval(()=>{
  if(!shift || shift.status!=="awaiting_odometer"){ odoExpiryHandled = false; return; }
  const el = document.getElementById("odoCountdown");
  if(!el) return; // this screen isn't the one currently on-screen right now
  const { remainMs, text } = odometerCountdownParts();
  el.textContent = text;
  el.classList.toggle("warn", remainMs < 120000);
  if(remainMs <= 0 && !odoExpiryHandled){
    odoExpiryHandled = true;
    refreshMe(); // picks up the server's auto-close and switches screens
  }
}, 1000);
</script>
</body>
</html>
